<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>학원 출결 보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{
  --bg:#FAF8F3;--card:#FFF;--border:#E6E1D6;--text:#232A3B;--muted:#9098A8;
  --green:#2FAE76;--green-bg:#E4F7EE;--green-bd:#2FAE76;
  --amber:#E8930A;--amber-bg:#FFF3DC;--amber-bd:#E8930A;
  --blue:#3B6FE0;--blue-bg:#E9EFFD;--blue-bd:#3B6FE0;
  --purple:#8B5CF6;--purple-bg:#F3EFFE;--purple-bd:#8B5CF6;
  --teal:#0EA5A0;--teal-bg:#E0F7F6;--teal-bd:#0EA5A0;
  --red:#C0392B;--red-bg:#FDEDED;--red-bd:#F2C2C2;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;}
.select-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px;}
.select-title{font-size:1rem;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;font-weight:700;}
.select-buttons{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.sel-btn{width:200px;padding:28px 16px;border-radius:18px;background:var(--card);border:1px solid var(--border);cursor:pointer;text-align:center;transition:transform .15s,border-color .15s;}
.sel-btn:active{transform:scale(.96);}
.sel-btn:hover{border-color:var(--green);}
.sel-btn .emoji{font-size:2.2rem;display:block;margin-bottom:8px;}
.sel-btn .label{font-size:1.1rem;font-weight:700;}
.sel-btn .sub{font-size:.78rem;color:var(--muted);margin-top:4px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:8px;}
.dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}
.brand-text{font-weight:700;letter-spacing:.06em;font-size:.9rem;color:var(--muted);text-transform:uppercase;}
.clk{font-family:'Space Grotesk',monospace;font-size:1.3rem;font-weight:600;}
.back-link{font-size:.8rem;color:var(--muted);cursor:pointer;text-decoration:underline;}
.kp-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0 12px;}
.kp-display{width:220px;height:60px;border-radius:14px;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.9rem;font-weight:700;letter-spacing:.2em;margin-bottom:16px;}
.kp-display .ph{color:var(--muted);font-size:1rem;letter-spacing:normal;font-weight:500;}
.kp-grid{display:grid;grid-template-columns:repeat(3,72px);gap:10px;}
.kp-key{width:72px;height:72px;border-radius:50%;background:var(--card);border:1px solid var(--border);font-size:1.4rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s,background .12s;}
.kp-key:active{transform:scale(.91);}
.kp-key.wide{font-size:.95rem;}
.kp-key.go{background:var(--green);border-color:var(--green);color:#fff;}
.kp-key.cl{color:var(--muted);}
.kp-result{margin-top:14px;min-height:24px;font-size:.95rem;font-weight:700;text-align:center;}
.kp-result.ok{color:var(--green);}
.kp-result.err{color:var(--red);}
.tv-wrap{padding:24px 32px 48px;}
.tv-hdr{display:flex;align-items:baseline;justify-content:space-between;margin:16px 0 24px;}
.tv-hdr h1{font-size:1.7rem;font-weight:900;}
.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.card{border-radius:14px;padding:18px 18px 14px;border:1px solid var(--border);background:#F2EFE7;transition:background .5s,border-color .5s;}
.card.studying{background:var(--green-bg);border-color:var(--green-bd);}
.card.warn-time{background:var(--amber-bg);border-color:var(--amber-bd);}
.card.warn-mission{background:var(--purple-bg);border-color:var(--purple-bd);}
.card.done-time{background:var(--blue-bg);border-color:var(--blue-bd);}
.card.done-mission{background:var(--teal-bg);border-color:var(--teal-bd);}
.s-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.card.studying .s-label{color:var(--green);}
.card.warn-time .s-label{color:var(--amber);}
.card.warn-mission .s-label{color:var(--purple);}
.card.done-time .s-label{color:var(--blue);}
.card.done-mission .s-label{color:var(--teal);}
.c-name{font-size:1.35rem;font-weight:700;margin:4px 0 2px;}
.c-leave{font-size:.78rem;color:var(--muted);margin-bottom:8px;}
.c-timer{font-size:2.2rem;font-weight:700;}
.c-timer.sm{font-size:1.4rem;}
.m-row{display:flex;align-items:center;gap:6px;margin-top:8px;}
.m-pct{font-size:.78rem;font-weight:700;}
.card.studying .m-pct{color:var(--green);}
.card.warn-mission .m-pct{color:var(--purple);}
.card.done-mission .m-pct{color:var(--teal);}
.bar{flex:1;height:5px;border-radius:4px;background:rgba(0,0,0,.08);overflow:hidden;}
.bar-f{height:100%;border-radius:4px;}
.card.studying .bar-f{background:var(--green);}
.card.warn-time .bar-f{background:var(--amber);}
.card.warn-mission .bar-f{background:var(--purple);}
.card.done-time .bar-f{background:var(--blue);}
.card.done-mission .bar-f{background:var(--teal);}
.empty{text-align:center;padding:70px 20px;color:var(--muted);}
.empty .big{font-size:2.8rem;margin-bottom:10px;}
.alert-bar{margin-top:24px;border-radius:12px;border:1px solid var(--red-bd);background:var(--red-bg);padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.a-label{font-size:.74rem;font-weight:800;letter-spacing:.08em;color:var(--red);text-transform:uppercase;white-space:nowrap;}
.a-items{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
.a-chip{background:#fff;border:1px solid #E8A6A6;color:var(--red);border-radius:999px;padding:5px 12px;font-size:.85rem;font-weight:700;}
.ms-wrap{padding:18px 18px 80px;max-width:560px;margin:0 auto;}
.ms-hero{text-align:center;padding:16px 0 12px;}
.ms-hero .ms-name{font-size:1.5rem;font-weight:900;}
.ms-hero .ms-sub{font-size:.82rem;color:var(--muted);margin-top:4px;}
.ms-progress{display:flex;align-items:center;gap:10px;padding:12px 0 4px;}
.ms-prog-bar{flex:1;height:8px;border-radius:6px;background:var(--border);overflow:hidden;}
.ms-prog-fill{height:100%;background:var(--green);border-radius:6px;transition:width .4s ease;}
.ms-prog-txt{font-size:.82rem;font-weight:700;color:var(--green);white-space:nowrap;}
.m-list{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.m-item{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;}
.m-item.done{background:var(--green-bg);border-color:var(--green-bd);}
.m-item-top{display:flex;align-items:center;gap:12px;cursor:pointer;}
.m-circle{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem;}
.m-item.done .m-circle{background:var(--green);border-color:var(--green);color:#fff;}
.m-text{font-size:1rem;font-weight:600;}
.m-item.done .m-text{text-decoration:line-through;color:var(--muted);}
.score-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.score-row input{width:70px;padding:7px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:1rem;font-weight:700;text-align:center;}
.score-row .max-label{font-size:.9rem;color:var(--muted);}
.score-row button{padding:7px 14px;background:var(--green);border:none;color:#fff;font-weight:700;border-radius:8px;cursor:pointer;font-size:.85rem;}
.score-done-row{font-size:.82rem;color:var(--green);font-weight:700;margin-top:6px;}
.undo-btn{font-size:.75rem;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;margin-left:8px;}
.book-panel{margin-top:20px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.book-panel-title{font-size:.9rem;font-weight:700;margin-bottom:12px;}
.book-input-row{display:flex;gap:8px;margin-bottom:12px;}
.book-input-row input{flex:1;padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:1rem;font-weight:700;}
.book-input-row button{padding:8px 14px;background:var(--blue);border:none;color:#fff;font-weight:700;border-radius:8px;cursor:pointer;}
.book-chips{display:flex;flex-direction:column;gap:6px;}
.book-chip{display:flex;align-items:center;justify-content:space-between;background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:8px;padding:8px 12px;}
.bc-num{font-weight:700;color:var(--blue);font-size:.82rem;margin-right:6px;}
.bc-title{font-size:.88rem;font-weight:600;}
.bc-del{background:none;border:none;color:var(--muted);cursor:pointer;}
.book-msg{font-size:.82rem;color:var(--red);margin-top:4px;}
.btn-checkout{width:100%;margin-top:16px;padding:14px;border-radius:14px;background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);font-weight:700;font-size:.95rem;cursor:pointer;}
.celebration{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.cele-emoji{font-size:5rem;animation:bounce .6s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-16px)}}
.cele-title{font-size:2rem;font-weight:900;margin:16px 0 6px;}
.cele-sub{font-size:1rem;color:var(--muted);margin-bottom:28px;}
.cele-btn{padding:14px 36px;background:var(--green);border:none;color:#fff;font-weight:700;font-size:1.05rem;border-radius:14px;cursor:pointer;}
.confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:299;}
.pad-wrap{padding:18px 16px 60px;max-width:720px;margin:0 auto;}
.sec-title{font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:22px 0 10px;}
.admin-toggle{display:inline-flex;align-items:center;gap:7px;margin-top:24px;padding:9px 14px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);cursor:pointer;font-size:.82rem;}
.ap{margin-top:16px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;}
.a-row{display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap;}
.a-row input,.a-row select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:8px;font-size:.9rem;flex:1;min-width:75px;}
.a-row button{background:var(--green);border:none;color:#fff;font-weight:700;padding:9px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;font-size:.9rem;}
.r-list{margin-top:12px;display:flex;flex-direction:column;gap:7px;}
.r-wrap{background:var(--bg);border-radius:8px;overflow:hidden;}
.r-item{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;flex-wrap:wrap;gap:6px;}
.r-acts{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.r-sched,.r-mission-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 9px;font-size:.74rem;cursor:pointer;}
.r-num{color:var(--blue);font-weight:700;margin-right:5px;font-family:'Space Grotesk',monospace;}
.r-name{font-weight:600;}
.r-dur{color:var(--muted);font-size:.82rem;margin-left:6px;}
.r-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:.82rem;}
.r-type{font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:999px;margin-left:5px;}
.r-type.m60{background:var(--blue-bg);color:var(--blue);}
.r-type.m90{background:var(--purple-bg);color:var(--purple);}
.r-type.endtime{background:var(--amber-bg);color:var(--amber);}
.r-type.mission{background:var(--teal-bg);color:var(--teal);}
.exp-panel{background:var(--bg);border-top:1px solid var(--border);padding:11px;}
.sched-row{display:flex;flex-wrap:wrap;gap:9px;align-items:flex-end;}
.sched-cell{display:flex;flex-direction:column;gap:3px;font-size:.72rem;color:var(--muted);}
.sched-cell input[type="time"]{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 7px;border-radius:6px;font-size:.82rem;}
.m-day-block{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:8px;}
.m-day-lbl{font-size:.76rem;font-weight:700;color:var(--muted);margin-bottom:7px;}
.m-tmpl-item{display:flex;align-items:center;justify-content:space-between;font-size:.85rem;padding:5px 7px;background:var(--bg);border-radius:5px;margin-bottom:4px;}
.mi-del{background:none;border:none;color:var(--muted);cursor:pointer;}
.m-add-area{border:1px dashed var(--border);border-radius:8px;padding:10px;margin-top:6px;}
.m-add-label{font-size:.72rem;color:var(--muted);margin-bottom:6px;}
.m-add-row{display:flex;gap:5px;flex-wrap:wrap;}
.m-add-row input,.m-add-row select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:6px;font-size:.82rem;}
.m-add-row input{flex:1;min-width:80px;}
.m-add-row button{background:var(--green);border:none;color:#fff;font-weight:700;padding:5px 11px;border-radius:6px;cursor:pointer;}
.pin-overlay{position:fixed;inset:0;background:rgba(10,14,26,.5);display:flex;align-items:center;justify-content:center;z-index:200;}
.pin-box{background:var(--card);border-radius:20px;padding:28px 24px;width:280px;}
.pin-box h3{font-size:1.05rem;font-weight:800;margin-bottom:4px;}
.pin-box p{font-size:.82rem;color:var(--muted);margin-bottom:16px;}
.pin-dots{display:flex;gap:9px;justify-content:center;margin-bottom:16px;}
.p-dot{width:13px;height:13px;border-radius:50%;background:var(--border);transition:background .2s;}
.p-dot.filled{background:var(--green);}
.pin-kp{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.p-key{height:50px;border-radius:11px;background:var(--bg);border:1px solid var(--border);font-size:1.15rem;font-weight:700;cursor:pointer;}
.p-key:active{background:var(--border);}
.p-key.cancel{color:var(--muted);font-size:.88rem;}
.pin-err{color:var(--red);font-size:.82rem;text-align:center;margin-top:8px;min-height:18px;}
.review-sheet{position:fixed;inset:0;background:rgba(10,14,26,.5);display:flex;align-items:flex-end;justify-content:center;z-index:500;}
.review-inner{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:24px 20px 36px;max-height:90vh;overflow-y:auto;}
.review-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;text-align:left;font-size:.92rem;font-weight:600;width:100%;margin-bottom:9px;}
.review-btn .re{font-size:1.3rem;}
.review-cancel{width:100%;padding:12px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);cursor:pointer;font-size:.9rem;margin-top:4px;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--green);color:var(--text);padding:11px 18px;border-radius:9px;font-size:.88rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<canvas class="confetti-canvas" id="confetti-canvas"></canvas>
<script>
/* ════════════════════════════════════════
   설정값
════════════════════════════════════════ */
var FIREBASE = "https://hakwoncheck-default-rtdb.firebaseio.com";
var WD_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];
var WD_LABELS = [['mon','월'],['tue','화'],['wed','수'],['thu','목'],['fri','금'],['sat','토'],['sun','일']];
var ADMIN_PIN = '1234';
var BOOK_REVIEWS = [
  {idx:1,emoji:'⭐',text:'재미있어서 친구에게 추천하고 싶어요'},
  {idx:2,emoji:'📚',text:'이 작가의 시리즈를 더 읽고 싶어요'},
  {idx:3,emoji:'😊',text:'영어 공부가 더 재미있어졌어요'},
  {idx:4,emoji:'💪',text:'어려웠지만 끝까지 읽어서 뿌듯해요'},
  {idx:5,emoji:'⏰',text:'시간 가는 줄 몰랐어요'},
  {idx:6,emoji:'🎨',text:'그림이나 내용이 인상적이었어요'},
  {idx:7,emoji:'📖',text:'새로운 단어를 많이 배웠어요'},
  {idx:8,emoji:'🌟',text:'선생님께 꼭 추천하고 싶어요'},
  {idx:9,emoji:'😐',text:'보통이었어요'},
  {idx:10,emoji:'😅',text:'이 책은 별로였어요'}
];

/* ════════════════════════════════════════
   유틸 함수 (var로 선언 = 호이스팅 보장)
════════════════════════════════════════ */
var tvIv, tvClkIv, padIv, toastT;
var bookLibCache = {};
var padRoster = [], padSessions = {};
var adminOpen = false, pinUnlocked = false;
var schedOpen = {}, missOpen = {};
var pkv = '', skv = '';
var pendingBook = null;
var pinV = '';

function uid(){ return Math.random().toString(36).slice(2,9); }
function todayKey(){ var d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function monthKey(){ var d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1); }
function todayWD(){ return WD_KEYS[new Date().getDay()]; }
function pad2(n){ return String(n).padStart(2,'0'); }
function fmtClock(){ return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
function fmtTs(ts){ var d=new Date(ts); return pad2(d.getHours())+':'+pad2(d.getMinutes()); }
function fmtTimer(sec){ var s=Math.max(0,Math.floor(sec)); return pad2(Math.floor(s/60))+':'+pad2(s%60); }
function esc(s){ return String(s||'').replace(/[&<>"']/g,function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);}); }
function computeEnd(stu,start){
  if(stu.type==='m60') return start+60*60000;
  if(stu.type==='m90') return start+90*60000;
  if((stu.type==='endtime'||stu.type==='mission')&&stu.endTimeVal){
    var p=stu.endTimeVal.split(':'); var d=new Date(start); d.setHours(parseInt(p[0]),parseInt(p[1]),0,0); return d.getTime();
  }
  return start+60*60000;
}
function missionFromTemplate(m){
  if(typeof m==='string') return {text:m,parentLabel:'',type:'check',scoreMax:0};
  return {text:m.text||'',parentLabel:m.parentLabel||'',type:m.type||'check',scoreMax:parseInt(m.scoreMax||0,10)};
}
function showToast(msg){
  var t=document.getElementById('toast'); if(!t) return;
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove('show');},2200);
}

/* ════════════════════════════════════════
   Firebase REST
════════════════════════════════════════ */
function fbGet(p){ return fetch(FIREBASE+'/'+p+'.json').then(function(r){return r.json();}).catch(function(){return null;}); }
function fbSet(p,d){ return fetch(FIREBASE+'/'+p+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(function(){showToast('⚠️ 저장 실패');}); }
function loadRoster(){ return fbGet('roster').then(function(d){return Array.isArray(d)?d.filter(Boolean):[];}); }
function saveRoster(l){ return fbSet('roster',l); }
function loadSessions(){ return fbGet('sessions').then(function(d){return (d&&typeof d==='object')?d:{};}); }
function saveSessions(o){ return fbSet('sessions',o); }
function loadBookLibrary(){ return fbGet('booklibrary').then(function(d){return (d&&typeof d==='object')?d:{};}); }
function saveBookLibrary(o){ return fbSet('booklibrary',o); }
function saveAttendance(sid,dk,data){ return fbSet('attendance/'+sid+'/'+dk,data); }

/* ════════════════════════════════════════
   세션 자동 정리 (날짜 바뀌면)
════════════════════════════════════════ */
function cleanupOldSessions(){
  loadSessions().then(function(sessions){
    var today=todayKey(); var changed=false;
    Object.keys(sessions).forEach(function(id){
      var s=sessions[id]; if(!s||!s.startTime) return;
      var d=new Date(s.startTime);
      var sd=d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
      if(sd!==today){ delete sessions[id]; changed=true; }
    });
    if(changed) saveSessions(sessions);
  }).catch(function(){});
}

function renderTV(){
  document.getElementById('root').innerHTML=
    '<div class="topbar"><div class="brand"><span class="dot"></span><span class="brand-text">지금 공부 중</span></div><div class="clk" id="clk">'+fmtClock()+'</div></div>'+
    '<div class="tv-wrap"><div class="tv-hdr"><h1>오늘의 학습 현황</h1><span id="tv-cnt" style="color:var(--muted);font-size:.95rem;"></span></div><div class="board" id="board"></div><div id="alert-zone"></div></div>';
  clearInterval(tvClkIv);
  tvClkIv=setInterval(function(){var c=document.getElementById('clk');if(c)c.textContent=fmtClock();},1000);
  tickTV();
  tvIv=setInterval(tickTV,3000);
}
function tickTV(){
  Promise.all([loadSessions(),loadRoster()]).then(function(res){
    var sessions=res[0]; var roster=res[1];
    var board=document.getElementById('board'); if(!board) return;
    var ids=Object.keys(sessions);
    var cnt=document.getElementById('tv-cnt');
    if(cnt) cnt.textContent=ids.length?ids.length+'명 학습 중':'';
    if(!ids.length){
      board.innerHTML='<div class="empty"><div class="big">🌤️</div>아직 등원한 학생이 없어요</div>';
      document.getElementById('alert-zone').innerHTML=''; return;
    }
    board.innerHTML=ids.map(function(id){
      var s=sessions[id]; var now=Date.now();
      var end=s.endTime||s.startTime+3600000;
      var tot=(end-s.startTime)/1000; var rem=(end-now)/1000;
      var pct=Math.max(0,Math.min(100,rem/tot*100));
      var ms=s.missions||[]; var mTot=ms.length;
      var mDone=ms.filter(function(m){return m.done;}).length;
      var mPct=mTot?Math.round(mDone/mTot*100):100;
      var timeDone=rem<=0; var missionDone=mTot>0&&mDone===mTot;
      var lastOne=mTot>0&&mDone===mTot-1&&!timeDone;
      var cls,lbl,timerHtml;
      if(s.type==='mission'){
        if(missionDone){cls='done-mission';lbl='미션 완료 🎉';timerHtml='<div class="c-timer sm">모든 미션 완료!</div>';}
        else if(lastOne){cls='warn-mission';lbl='마지막 미션';timerHtml='<div class="c-timer">'+fmtTimer(rem)+'</div>';}
        else if(timeDone){cls='done-time';lbl='시간 종료';timerHtml='<div class="c-timer sm">시간이 다 됐어요</div>';}
        else{cls='studying';lbl='학습 중';timerHtml='<div class="c-timer">'+fmtTimer(rem)+'</div>';}
      }else{
        if(timeDone){cls='done-time';lbl='하원 시간';timerHtml='<div class="c-timer sm">수업 종료</div>';}
        else if(rem<=300){cls='warn-time';lbl='곧 종료';timerHtml='<div class="c-timer">'+fmtTimer(rem)+'</div>';}
        else{cls='studying';lbl='학습 중';timerHtml='<div class="c-timer">'+fmtTimer(rem)+'</div>';}
      }
      var bars=mTot?
        '<div class="m-row"><span class="m-pct">'+mPct+'%</span><div class="bar"><div class="bar-f" style="width:'+mPct+'%"></div></div></div>':
        '<div class="bar" style="margin-top:8px"><div class="bar-f" style="width:'+pct+'%"></div></div>';
      return '<div class="card '+cls+'"><div class="s-label">'+lbl+'</div><div class="c-name">'+esc(s.name)+'</div><div class="c-leave">예상 귀가 '+fmtTs(end)+'</div>'+timerHtml+bars+'</div>';
    }).join('');
    // 출석 확인 필요
    var today=todayWD(); var now2=Date.now();
    var overdue=roster.filter(function(stu){
      if(sessions[stu.id]) return false;
      var sc=stu.schedule&&stu.schedule[today]; if(!sc) return false;
      var p=sc.split(':'); var e=new Date(); e.setHours(parseInt(p[0]),parseInt(p[1]),0,0);
      return now2-e.getTime()>=5*60000;
    });
    var az=document.getElementById('alert-zone');
    az.innerHTML=overdue.length?
      '<div class="alert-bar"><div class="a-label">⚠ 출석 확인 필요</div><div class="a-items">'+
      overdue.map(function(o){return '<span class="a-chip">'+esc(o.number)+' '+esc(o.name)+' 예정 '+o.schedule[today]+'</span>';}).join('')+
      '</div></div>':'';
  });
}

function renderStudentKP(){
  Promise.all([loadRoster(),loadSessions()]).then(function(res){
    padRoster=res[0]; padSessions=res[1];
    document.getElementById('root').innerHTML=
      '<div class="topbar"><div class="brand"><span class="dot"></span><span class="brand-text">미션 체크</span></div><div class="back-link" onclick="setMode(\'\')">← 처음으로</div></div>'+
      '<div class="pad-wrap"><div class="sec-title">학번을 입력하고 내 미션을 확인하세요</div>'+
      '<div class="kp-wrap"><div class="kp-display" id="kpd"><span class="ph">학번 입력</span></div>'+
      '<div class="kp-grid" id="kpg"></div><div class="kp-result" id="kpr"></div></div></div>';
    buildKP('s');
  });
}
function buildKP(mode){
  var id=mode==='s'?'kpg':'kpg';
  var g=document.getElementById('kpg'); if(!g) return;
  var keys=['1','2','3','4','5','6','7','8','9','지우기','0','확인'];
  g.innerHTML=keys.map(function(k){
    if(k==='지우기') return '<div class="kp-key wide cl" onclick="kClear(\''+mode+'\')">지우기</div>';
    if(k==='확인') return '<div class="kp-key wide go" onclick="kConfirm(\''+mode+'\')">확인</div>';
    return '<div class="kp-key" onclick="kPress(\''+mode+'\',\''+k+'\')">'+k+'</div>';
  }).join('');
}
function kPress(mode,d){
  if(mode==='s'){ if(skv.length>=6) return; skv+=d; }
  else{ if(pkv.length>=6) return; pkv+=d; }
  kUpdate(mode); kResult(mode,'','');
}
function kClear(mode){ if(mode==='s') skv=''; else pkv=''; kUpdate(mode); kResult(mode,'',''); }
function kUpdate(mode){
  var v=mode==='s'?skv:pkv;
  var d=document.getElementById('kpd'); if(d) d.innerHTML=v||'<span class="ph">학번 입력</span>';
}
function kResult(mode,msg,type){
  var e=document.getElementById('kpr'); if(!e) return;
  e.textContent=msg; e.className='kp-result'+(type?' '+type:'');
}
function kConfirm(mode){
  if(mode==='s'){
    if(!skv){ kResult('s','학번을 입력해주세요','err'); return; }
    var stu=padRoster.find(function(s){return s.number===skv;});
    if(!stu){ kResult('s','등록되지 않은 학번이에요','err'); skv=''; kUpdate('s'); return; }
    skv=''; kUpdate('s');
    loadSessions().then(function(sessions){
      padSessions=sessions;
      if(!padSessions[stu.id]){
        var start=Date.now();
        var tmpl=(stu.missions&&stu.missions[todayWD()])||[];
        var missions=tmpl.map(function(m,i){ var t=missionFromTemplate(m); return Object.assign({id:'m'+i},t,{done:false,score:null}); });
        padSessions[stu.id]={name:stu.name,number:stu.number,type:stu.type||'m60',level:stu.level||'저학년',startTime:start,endTime:computeEnd(stu,start),missions:missions,books:[]};
        saveSessions(padSessions).then(function(){ window.location.hash='smission:'+stu.id; render(); });
      } else {
        window.location.hash='smission:'+stu.id; render();
      }
    });
  } else {
    if(!pkv){ kResult('p','학번을 입력해주세요','err'); return; }
    var stu2=padRoster.find(function(s){return s.number===pkv;});
    if(!stu2){ kResult('p','등록되지 않은 학번이에요','err'); pkv=''; kUpdate('p'); return; }
    pkv=''; kUpdate('p');
    loadSessions().then(function(sessions){
      padSessions=sessions;
      if(padSessions[stu2.id]){
        if(confirm(stu2.name+' 학생을 하원 처리할까요?')){
          var sess=padSessions[stu2.id]; var ms2=sess.missions||[];
          var scores={listening:[],vocabulary:[]};
          ms2.forEach(function(m){ if(m.done&&m.scoreMax){ if(m.type==='listening') scores.listening.push({score:m.score||0,max:m.scoreMax}); if(m.type==='vocabulary') scores.vocabulary.push({score:m.score||0,max:m.scoreMax}); }});
          saveAttendance(stu2.id,todayKey(),{name:stu2.name,level:sess.level||stu2.level||'저학년',checkIn:sess.startTime,checkOut:Date.now(),missionsTotal:ms2.length,missionsDone:ms2.filter(function(m){return m.done;}).length,missions:ms2.map(function(m){return {text:m.text,parentLabel:m.parentLabel||'',type:m.type||'check',done:m.done,score:m.score||null,scoreMax:m.scoreMax||0};}),books:sess.books||[],scores:scores,month:monthKey()});
          delete padSessions[stu2.id];
          saveSessions(padSessions).then(function(){ showToast(stu2.name+' 하원 처리'); kResult('p',stu2.name+' 하원 완료','ok'); });
        }
      } else {
        var start2=Date.now();
        var tmpl2=(stu2.missions&&stu2.missions[todayWD()])||[];
        var missions2=tmpl2.map(function(m,i){ var t=missionFromTemplate(m); return Object.assign({id:'m'+i},t,{done:false,score:null}); });
        padSessions[stu2.id]={name:stu2.name,number:stu2.number,type:stu2.type||'m60',level:stu2.level||'저학년',startTime:start2,endTime:computeEnd(stu2,start2),missions:missions2,books:[]};
        saveSessions(padSessions).then(function(){ showToast(stu2.name+' 출석 완료'); kResult('p',stu2.name+' 출석!','ok'); });
      }
    });
  }
}

/* ════════════════════════════════════════
   학생 미션 화면
════════════════════════════════════════ */
function renderStudentMission(sid){
  Promise.all([loadRoster(),loadSessions(),loadBookLibrary()]).then(function(res){
    var roster=res[0]; var sessions=res[1]; bookLibCache=res[2]||{};
    var stu=roster.find(function(s){return s.id===sid;});
    if(!stu){ setMode('student'); return; }
    var sess=sessions[sid];
    if(!sess){ setMode('student'); return; }
    if(!sess.missions||sess.missions.length===0){
      var tmpl=(stu.missions&&stu.missions[todayWD()])||[];
      if(tmpl.length>0){
        sess.missions=tmpl.map(function(m,i){ var t=missionFromTemplate(m); return Object.assign({id:'m'+i},t,{done:false,score:null}); });
        loadSessions().then(function(s2){ if(s2[sid]){ s2[sid].missions=sess.missions; saveSessions(s2); }});
      }
    }
    var ms=sess.missions||[];
    var mDone=ms.filter(function(m){return m.done;}).length;
    var allDone=ms.length>0&&mDone===ms.length;
    var pct=ms.length?Math.round(mDone/ms.length*100):0;
    var books=sess.books||[];
    var todayKO=['일','월','화','수','목','금','토'][new Date().getDay()]+'요일';

    var html='<div class="topbar"><div class="brand"><span class="dot"></span><span class="brand-text">내 미션</span></div><div class="back-link" onclick="setMode(\'student\')">← 돌아가기</div></div>'+
      '<div class="ms-wrap"><div class="ms-hero"><div class="ms-name">👋 '+esc(stu.name)+'</div><div class="ms-sub">예상 귀가 '+fmtTs(sess.endTime)+' &nbsp;·&nbsp; 미션을 모두 완료해요!</div></div>';

    if(ms.length){
      html+='<div class="ms-progress"><div class="ms-prog-bar"><div class="ms-prog-fill" style="width:'+pct+'%"></div></div><div class="ms-prog-txt">'+mDone+'/'+ms.length+'</div></div>';
      html+='<div class="m-list">'+ms.map(function(m,i){ return renderMItem(m,i,sid); }).join('')+'</div>';
    } else {
      html+='<div style="color:var(--muted);text-align:center;padding:24px 0;line-height:1.8;"><div style="font-size:1.2rem;margin-bottom:6px;">📭</div>오늘('+todayKO+') 등록된 미션이 없어요.</div>';
    }

    html+='<div class="book-panel"><div class="book-panel-title">📚 오늘 읽은 책</div>'+
      '<div class="book-input-row"><input type="number" id="book-num-input" placeholder="책 번호 입력" min="1"><button onclick="addBook(\''+sid+'\')">+ 추가</button></div>'+
      '<div id="book-msg" class="book-msg"></div>'+
      '<div class="book-chips" id="book-chips">'+
      books.map(function(b,i){
        return '<div class="book-chip"><div><span class="bc-num">No.'+esc(String(b.number))+'</span><span class="bc-title">'+esc(b.title)+'</span>'+(b.level?' <span style="font-size:.72rem;color:var(--muted);">'+esc(b.level)+'</span>':'')+
          (b.reviewEmoji?'<div style="font-size:.78rem;color:var(--muted);">'+esc(b.reviewEmoji)+' '+esc(b.reviewText)+'</div>':'')+
          '</div><button class="bc-del" onclick="removeBook(\''+sid+'\','+i+')">✕</button></div>';
      }).join('')+'</div></div>';
    html+='<button class="btn-checkout" onclick="stuCheckout(\''+sid+'\')">🏠 하원 처리</button></div>';

    document.getElementById('root').innerHTML=html;
    if(allDone) showCelebration(stu.name,sid);
  });
}

function renderMItem(m,i,sid){
  if(m.type==='check'||!m.type){
    return '<div class="m-item'+(m.done?' done':'')+'"><div class="m-item-top" onclick="toggleSM(\''+sid+'\','+i+')"><div class="m-circle">'+(m.done?'✓':'')+'</div><div class="m-text">'+esc(m.text)+'</div></div></div>';
  }
  var label=m.type==='listening'?'듣기 점수':'단어 점수';
  if(m.done){
    var rate=m.scoreMax?Math.round((m.score||0)/m.scoreMax*100):0;
    return '<div class="m-item done"><div class="m-item-top"><div class="m-circle">✓</div><div class="m-text">'+esc(m.text)+'</div></div>'+
      '<div class="score-done-row">'+label+': '+m.score+'점 / '+m.scoreMax+'점 ('+rate+'%)<button class="undo-btn" onclick="undoSM(\''+sid+'\','+i+')">다시하기</button></div></div>';
  }
  return '<div class="m-item"><div class="m-item-top"><div class="m-circle"></div><div class="m-text">'+esc(m.text)+'</div></div>'+
    '<div class="score-row"><input type="number" id="score-'+i+'" min="0" max="'+m.scoreMax+'" placeholder="0"><span class="max-label">/ '+m.scoreMax+'점</span>'+
    '<button onclick="submitScore(\''+sid+'\','+i+')">완료</button></div></div>';
}

function toggleSM(sid,idx){
  loadSessions().then(function(sessions){
    var sess=sessions[sid]; if(!sess||!sess.missions) return;
    sess.missions[idx].done=!sess.missions[idx].done;
    saveSessions(sessions).then(function(){ renderStudentMission(sid); });
  });
}
function submitScore(sid,idx){
  var inp=document.getElementById('score-'+idx);
  var val=parseInt(inp?inp.value:'',10);
  loadSessions().then(function(sessions){
    var sess=sessions[sid]; if(!sess||!sess.missions) return;
    var m=sess.missions[idx];
    if(isNaN(val)||val<0||val>m.scoreMax){ showToast('0~'+m.scoreMax+' 사이의 점수를 입력해주세요'); return; }
    m.done=true; m.score=val;
    saveSessions(sessions).then(function(){ renderStudentMission(sid); });
  });
}
function undoSM(sid,idx){
  loadSessions().then(function(sessions){
    var sess=sessions[sid]; if(!sess||!sess.missions) return;
    sess.missions[idx].done=false; sess.missions[idx].score=null;
    saveSessions(sessions).then(function(){ renderStudentMission(sid); });
  });
}

function addBook(sid){
  var inp=document.getElementById('book-num-input');
  var num=parseInt(inp?inp.value:'',10);
  var msg=document.getElementById('book-msg');
  if(!num){ if(msg) msg.textContent='책 번호를 입력해주세요'; return; }
  var info=bookLibCache[String(num)];
  if(!info){ if(msg) msg.textContent='No.'+num+' 번 책을 찾을 수 없어요'; return; }
  var title=typeof info==='object'?info.title:info;
  var level=typeof info==='object'?info.level:'';
  var wordCount=typeof info==='object'?parseInt(info.wordCount||0,10):0;
  loadSessions().then(function(sessions){
    var sess=sessions[sid]; if(!sess) return;
    if(!sess.books) sess.books=[];
    if(sess.books.find(function(b){return b.number===num;})){ if(msg) msg.textContent='이미 추가된 책이에요'; return; }
    if(inp) inp.value=''; if(msg) msg.textContent='';
    pendingBook={sid:sid,number:num,title:title,level:level,wordCount:wordCount};
    showReviewPicker();
  });
}
function showReviewPicker(){
  var old=document.getElementById('review-sheet'); if(old) old.remove();
  if(!pendingBook) return;
  var b=pendingBook;
  var div=document.createElement('div'); div.className='review-sheet'; div.id='review-sheet';
  div.innerHTML='<div class="review-inner">'+
    '<div style="font-size:.82rem;color:var(--blue);font-weight:700;margin-bottom:4px;">No.'+esc(String(b.number))+(b.level?' · '+esc(b.level):'')+(b.wordCount?' · '+b.wordCount.toLocaleString()+'어휘':'')+'</div>'+
    '<div style="font-size:1.1rem;font-weight:900;margin-bottom:4px;">'+esc(b.title)+'</div>'+
    '<div style="font-size:.88rem;color:var(--muted);margin-bottom:18px;">이 책을 읽은 감상을 골라주세요! 📖</div>'+
    BOOK_REVIEWS.map(function(r){return '<button class="review-btn" onclick="selectReview('+r.idx+')"><span class="re">'+r.emoji+'</span><span>'+r.text+'</span></button>';}).join('')+
    '<button class="review-cancel" onclick="document.getElementById(\'review-sheet\').remove()">취소</button></div>';
  document.body.appendChild(div);
}
function selectReview(idx){
  document.getElementById('review-sheet')&&document.getElementById('review-sheet').remove();
  if(!pendingBook) return;
  var b=pendingBook; pendingBook=null;
  var r=BOOK_REVIEWS.find(function(x){return x.idx===idx;})||BOOK_REVIEWS[8];
  loadSessions().then(function(sessions){
    var sess=sessions[b.sid]; if(!sess) return;
    if(!sess.books) sess.books=[];
    sess.books.push({number:b.number,title:b.title,level:b.level,wordCount:b.wordCount,reviewIdx:r.idx,reviewEmoji:r.emoji,reviewText:r.text});
    saveSessions(sessions).then(function(){ renderStudentMission(b.sid); });
  });
}
function removeBook(sid,idx){
  loadSessions().then(function(sessions){
    var sess=sessions[sid]; if(!sess||!sess.books) return;
    sess.books.splice(idx,1);
    saveSessions(sessions).then(function(){ renderStudentMission(sid); });
  });
}
function stuCheckout(sid){
  if(!confirm('하원 처리할까요?')) return;
  loadSessions().then(function(sessions){
    var sess=sessions[sid];
    if(sess){
      var ms=sess.missions||[];
      var scores={listening:[],vocabulary:[]};
      ms.forEach(function(m){ if(m.done&&m.scoreMax){ if(m.type==='listening') scores.listening.push({score:m.score||0,max:m.scoreMax}); if(m.type==='vocabulary') scores.vocabulary.push({score:m.score||0,max:m.scoreMax}); }});
      saveAttendance(sid,todayKey(),{name:sess.name,level:sess.level||'저학년',checkIn:sess.startTime,checkOut:Date.now(),missionsTotal:ms.length,missionsDone:ms.filter(function(m){return m.done;}).length,missions:ms.map(function(m){return {text:m.text,parentLabel:m.parentLabel||'',type:m.type||'check',done:m.done,score:m.score||null,scoreMax:m.scoreMax||0};}),books:sess.books||[],scores:scores,month:monthKey()});
      delete sessions[sid];
      saveSessions(sessions).then(function(){ showToast('하원 처리 완료!'); setMode('student'); });
    }
  });
}

function showCelebration(name,sid){
  var old=document.getElementById('cele'); if(old) old.remove();
  var div=document.createElement('div'); div.className='celebration'; div.id='cele';
  div.innerHTML='<div class="cele-emoji">🎉</div><div class="cele-title">'+esc(name)+', 완료!</div><div class="cele-sub">오늘 모든 미션을 다 끝냈어요! 🌟</div><button class="cele-btn" onclick="closeCele()">확인</button>';
  document.body.appendChild(div); startConfetti(); setTimeout(stopConfetti,4000);
}
function closeCele(){ var e=document.getElementById('cele'); if(e) e.remove(); stopConfetti(); }
var confettiAnim;
function startConfetti(){
  var canvas=document.getElementById('confetti-canvas'); if(!canvas) return;
  var ctx=canvas.getContext('2d'); canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  var pieces=[];
  for(var i=0;i<120;i++) pieces.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,r:Math.random()*7+3,c:'hsl('+Math.floor(Math.random()*360)+',80%,60%)',vx:(Math.random()-.5)*3,vy:Math.random()*4+2,rot:Math.random()*360,vr:(Math.random()-.5)*6});
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(function(p){ p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;} ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180); ctx.fillStyle=p.c; ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r); ctx.restore(); });
    confettiAnim=requestAnimationFrame(draw);
  }
  cancelAnimationFrame(confettiAnim); draw();
}
function stopConfetti(){ cancelAnimationFrame(confettiAnim); var c=document.getElementById('confetti-canvas'); if(c) c.getContext('2d').clearRect(0,0,c.width,c.height); }

      '<div class="pad-wrap"><div class="sec-title">학번을 입력하세요</div>'+

      '<div class="kp-grid" id="kpg"></div><div class="kp-result" id="kpr"></div></div>'+

/* ── Admin / PIN ── */
function toggleAdmin(){
  if(adminOpen){ adminOpen=false; pinUnlocked=false; document.getElementById('admin-panel').style.display='none'; return; }
  if(pinUnlocked){ adminOpen=true; document.getElementById('admin-panel').style.display='block'; drawAdmin(); return; }
  showPin();
}
function showPin(){
  pinV='';
  var o=document.createElement('div'); o.className='pin-overlay'; o.id='pin-ov';
  o.innerHTML='<div class="pin-box"><h3>🔒 관리자 확인</h3><p>PIN을 입력해주세요</p>'+
    '<div class="pin-dots" id="pdots">'+'<div class="p-dot"></div>'.repeat(ADMIN_PIN.length)+'</div>'+
    '<div class="pin-kp">'+[1,2,3,4,5,6,7,8,9,'취소',0,'⌫'].map(function(k){return '<button class="p-key'+(k==='취소'?' cancel':'')+'" onclick="doPinKey(\''+k+'\')">'+k+'</button>';}).join('')+'</div>'+
    '<div class="pin-err" id="perr"></div></div>';
  document.body.appendChild(o);
}
function doPinKey(k){
  if(k==='취소'){ document.getElementById('pin-ov')&&document.getElementById('pin-ov').remove(); return; }
  if(k==='⌫'){ pinV=pinV.slice(0,-1); updDots(); return; }
  if(pinV.length>=ADMIN_PIN.length) return;
  pinV+=k; updDots();
  if(pinV.length===ADMIN_PIN.length){
    if(pinV===ADMIN_PIN){
      document.getElementById('pin-ov')&&document.getElementById('pin-ov').remove();
      pinUnlocked=true; adminOpen=true;
      document.getElementById('admin-panel').style.display='block'; drawAdmin();
    } else {
      document.getElementById('perr').textContent='PIN이 틀렸습니다';
      setTimeout(function(){ pinV=''; updDots(); var e=document.getElementById('perr'); if(e) e.textContent=''; },1000);
    }
  }
}
function updDots(){ document.querySelectorAll('.p-dot').forEach(function(d,i){ d.classList.toggle('filled',i<pinV.length); }); }

  var typeLabel=function(t){return {'m60':'60분형','m90':'90분형','endtime':'귀가지정','mission':'미션형'}[t]||'60분형';};
  var durLabel=function(s){return s.type==='endtime'?'귀가 '+(s.endTimeVal||''):s.type==='m90'?'90분':s.type==='mission'?(s.endTimeVal?'귀가 '+s.endTimeVal:'미션기반'):'60분';};
  p.innerHTML='<div class="ap">'+
    '<div class="sec-title" style="margin-top:0;">새 학생 등록</div>'+
    '<div class="a-row"><input id="nn" type="text" inputmode="numeric" placeholder="학번" maxlength="6"><input id="nm" type="text" placeholder="이름"></div>'+
    '<div class="a-row"><select id="nt" onchange="onTC()"><option value="m60">60분형</option><option value="m90">90분형</option><option value="endtime">귀가시간 지정형</option><option value="mission">미션형</option></select>'+
    '<select id="nlv"><option value="저학년">저학년</option><option value="고학년">고학년</option></select>'+
    '<span id="et-wrap" style="display:none;flex:1;"><input id="net" type="time" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:8px;font-size:.9rem;"></span>'+
    '<span id="met-wrap" style="display:none;flex:1;"><input id="nmet" type="time" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:8px;font-size:.9rem;"></span></div>'+
    '<div class="a-row"><button onclick="addStu()">+ 학생 추가</button><button onclick="setMode(\'report\')" style="background:var(--blue);">📊 월말 리포트</button></div>'+
    '<div style="font-size:.76rem;color:var(--muted);margin-bottom:10px;">📚 도서 목록 등록·관리는 academy_books.html 파일을 이용해주세요.</div>'+
    '<div class="sec-title">등록된 학생</div>'+
    '<div class="r-list">'+
    (padRoster.length?padRoster.map(function(s){
      return '<div class="r-wrap"><div class="r-item">'+
        '<span><span class="r-num">'+esc(s.number)+'</span><span class="r-name">'+esc(s.name)+'</span>'+
        '<span class="r-type '+(s.type||'m60')+'">'+typeLabel(s.type)+'</span>'+
        '<span style="font-size:.7rem;color:var(--muted);margin-left:4px;">'+(s.level||'저학년')+'</span>'+
        '<span class="r-dur">'+durLabel(s)+'</span></span>'+
        '<span class="r-acts">'+
        '<button class="r-sched" onclick="togSched(\''+s.id+'\')">등원시간표</button>'+
        '<button class="r-mission-btn" onclick="togMiss(\''+s.id+'\')">미션</button>'+
        '<button class="r-del" onclick="delStu(\''+s.id+'\')">삭제</button>'+
        '</span></div>'+
        (schedOpen[s.id]?drawSchedRow(s):'')+
        (missOpen[s.id]?drawMissPanel(s):'')+
        '</div>';
    }).join(''):'<div style="color:var(--muted);font-size:.82rem;">등록된 학생이 없습니다</div>')+
    '</div></div>';
}

function onTC(){ var t=document.getElementById('nt')&&document.getElementById('nt').value; if(document.getElementById('et-wrap')) document.getElementById('et-wrap').style.display=t==='endtime'?'flex':'none'; if(document.getElementById('met-wrap')) document.getElementById('met-wrap').style.display=t==='mission'?'flex':'none'; }
function addStu(){
  var num=(document.getElementById('nn').value||'').trim();
  var name=(document.getElementById('nm').value||'').trim();
  var type=document.getElementById('nt').value;
  var level=document.getElementById('nlv').value;
  if(!num){showToast('학번을 입력해주세요');return;}
  if(!name){showToast('이름을 입력해주세요');return;}
  if(padRoster.find(function(s){return s.number===num;})){showToast('이미 사용 중인 학번('+num+')');return;}
  var etv='';
  if(type==='endtime'){etv=(document.getElementById('net')&&document.getElementById('net').value||'').trim();if(!etv){showToast('귀가 시각을 입력해주세요');return;}}
  if(type==='mission') etv=(document.getElementById('nmet')&&document.getElementById('nmet').value||'').trim();
  padRoster.push({id:uid(),number:num,name:name,type:type,level:level,endTimeVal:etv,schedule:{},missions:{}});
  saveRoster(padRoster).then(function(){showToast(name+' 등록 완료');drawAdmin();});
}
function delStu(id){
  var s=padRoster.find(function(x){return x.id===id;});
  if(!confirm((s?s.name:'이 학생')+'을 삭제할까요?')) return;
  padRoster=padRoster.filter(function(x){return x.id!==id;});
  if(padSessions[id]){delete padSessions[id];saveSessions(padSessions);}
  saveRoster(padRoster).then(function(){showToast('삭제됨');drawAdmin();});
}
function togSched(id){schedOpen[id]=!schedOpen[id];drawAdmin();}
function togMiss(id){missOpen[id]=!missOpen[id];drawAdmin();}
function drawSchedRow(s){
  return '<div class="exp-panel"><div class="sched-row">'+
    WD_LABELS.map(function(kl){return '<label class="sched-cell"><span style="font-weight:700;">'+kl[1]+'요일</span><input type="time" value="'+((s.schedule&&s.schedule[kl[0]])||'')+'" onchange="setSched(\''+s.id+'\',\''+kl[0]+'\',this.value)"></label>';}).join('')+
    '<div style="flex-basis:100%;font-size:.68rem;color:var(--muted);margin-top:3px;">등원 안 하는 요일은 비워두세요.</div></div></div>';
}
function setSched(id,k,v){
  var s=padRoster.find(function(x){return x.id===id;}); if(!s) return;
  if(!s.schedule) s.schedule={};
  s.schedule[k]=v||'';
  saveRoster(padRoster).then(function(){showToast('저장됨');});
}
function drawMissPanel(s){
  var mb=s.missions||{};
  var typeOpts='<option value="check">일반 체크</option><option value="listening">듣기 점수</option><option value="vocabulary">단어 점수</option>';
  return '<div class="exp-panel"><div class="sec-title" style="margin-top:0;">요일별 미션 (매주 반복)</div>'+
    WD_LABELS.map(function(kl){
      var k=kl[0]; var l=kl[1];
      var items=(mb[k]||[]).map(function(m,i){
        var tm=typeof m==='object'?m:{text:m,parentLabel:'',type:'check',scoreMax:0};
        var typeKo={check:'체크',listening:'듣기',vocabulary:'단어'}[tm.type]||'체크';
        return '<div class="m-tmpl-item"><span><span style="font-size:.7rem;background:var(--blue-bg);color:var(--blue);border-radius:4px;padding:1px 5px;margin-right:4px;">'+typeKo+'</span>'+
          '<b>'+esc(tm.text)+'</b>'+(tm.parentLabel?' <span style="color:var(--muted);font-size:.76rem;">→ '+esc(tm.parentLabel)+'</span>':'')+
          (tm.scoreMax?' <span style="color:var(--muted);font-size:.76rem;">/'+tm.scoreMax+'점</span>':'')+'</span>'+
          '<button class="mi-del" onclick="delMiss(\''+s.id+'\',\''+k+'\','+i+')">✕</button></div>';
      }).join('')||'<div style="color:var(--muted);font-size:.78rem;margin-bottom:4px;">미션 없음</div>';
      return '<div class="m-day-block"><div class="m-day-lbl">'+l+'요일</div>'+items+
        '<div class="m-add-area"><div class="m-add-label">새 미션 추가</div>'+
        '<div class="m-add-row" style="margin-bottom:5px;"><select id="mt-'+s.id+'-'+k+'" style="max-width:100px;">'+typeOpts+'</select>'+
        '<input type="text" placeholder="미션 이름 (내부용)" id="mi-'+s.id+'-'+k+'"></div>'+
        '<div class="m-add-row"><input type="text" placeholder="학부모 표시명 (선택)" id="mi-pl-'+s.id+'-'+k+'">'+
        '<input type="number" placeholder="만점" id="mi-max-'+s.id+'-'+k+'" style="max-width:70px;" min="1">'+
        '<button onclick="addMiss(\''+s.id+'\',\''+k+'\')">+ 추가</button></div></div></div>';
    }).join('')+'</div>';
}
function addMiss(sid,day){
  var type=(document.getElementById('mt-'+sid+'-'+day)&&document.getElementById('mt-'+sid+'-'+day).value)||'check';
  var txt=(document.getElementById('mi-'+sid+'-'+day)&&document.getElementById('mi-'+sid+'-'+day).value||'').trim();
  var pl=(document.getElementById('mi-pl-'+sid+'-'+day)&&document.getElementById('mi-pl-'+sid+'-'+day).value||'').trim();
  var scoreMax=parseInt((document.getElementById('mi-max-'+sid+'-'+day)&&document.getElementById('mi-max-'+sid+'-'+day).value)||'0',10);
  if(!txt){showToast('미션 이름을 입력해주세요');return;}
  if((type==='listening'||type==='vocabulary')&&!scoreMax){showToast('점수형은 만점을 입력해주세요');return;}
  var s=padRoster.find(function(x){return x.id===sid;}); if(!s) return;
  if(!s.missions) s.missions={};
  if(!s.missions[day]) s.missions[day]=[];
  s.missions[day].push({text:txt,parentLabel:pl,type:type,scoreMax:type==='check'?0:scoreMax});
  saveRoster(padRoster).then(function(){showToast('미션 추가됨');drawAdmin();});
}
function delMiss(sid,day,idx){
  var s=padRoster.find(function(x){return x.id===sid;});
  if(!s||!s.missions||!s.missions[day]) return;
  s.missions[day].splice(idx,1);
  saveRoster(padRoster).then(function(){drawAdmin();});
}
