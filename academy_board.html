<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>학원 출결 보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{
  --bg:#FAF8F3;--card:#FFF;--border:#E6E1D6;--text:#232A3B;--muted:#9098A8;
  --green:#2FAE76;--green-bg:#E4F7EE;--green-bd:#2FAE76;
  --amber:#E8930A;--amber-bg:#FFF3DC;--amber-bd:#E8930A;
  --blue:#3B6FE0;--blue-bg:#E9EFFD;--blue-bd:#3B6FE0;
  --purple:#8B5CF6;--purple-bg:#F3EFFE;--purple-bd:#8B5CF6;
  --teal:#0EA5A0;--teal-bg:#E0F7F6;--teal-bd:#0EA5A0;
  --red:#C0392B;--red-bg:#FDEDED;--red-bd:#F2C2C2;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;}
.mono{font-family:'Space Grotesk',monospace;font-variant-numeric:tabular-nums;}
.select-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px;}
.select-title{font-size:1rem;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;font-weight:700;}
.select-buttons{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.sel-btn{width:200px;padding:28px 16px;border-radius:18px;background:var(--card);border:1px solid var(--border);cursor:pointer;text-align:center;transition:transform .15s,border-color .15s;}
.sel-btn:active{transform:scale(.96);}
.sel-btn:hover{border-color:var(--green);}
.sel-btn .emoji{font-size:2.2rem;display:block;margin-bottom:8px;}
.sel-btn .label{font-size:1.1rem;font-weight:700;}
.sel-btn .sub{font-size:.78rem;color:var(--muted);margin-top:4px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:8px;}
.dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}
.brand-text{font-weight:700;letter-spacing:.06em;font-size:.9rem;color:var(--muted);text-transform:uppercase;}
.clk{font-family:'Space Grotesk',monospace;font-size:1.3rem;font-weight:600;}
.back-link{font-size:.8rem;color:var(--muted);cursor:pointer;text-decoration:underline;}
.kp-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0 12px;}
.kp-display{width:220px;height:60px;border-radius:14px;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.9rem;font-weight:700;letter-spacing:.2em;margin-bottom:16px;}
.kp-display .ph{color:var(--muted);font-size:1rem;letter-spacing:normal;font-weight:500;}
.kp-grid{display:grid;grid-template-columns:repeat(3,72px);gap:10px;}
.kp-key{width:72px;height:72px;border-radius:50%;background:var(--card);border:1px solid var(--border);font-size:1.4rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s,background .12s;}
.kp-key:active{transform:scale(.91);}
.kp-key.wide{font-size:.95rem;}
.kp-key.go{background:var(--green);border-color:var(--green);color:#fff;}
.kp-key.cl{color:var(--muted);}
.kp-result{margin-top:14px;min-height:24px;font-size:.95rem;font-weight:700;text-align:center;}
.kp-result.ok{color:var(--green);}
.kp-result.err{color:var(--red);}
/* TV */
.tv-wrap{padding:24px 32px 48px;}
.tv-hdr{display:flex;align-items:baseline;justify-content:space-between;margin:16px 0 24px;}
.tv-hdr h1{font-size:1.7rem;font-weight:900;}
.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.card{border-radius:14px;padding:18px 18px 14px;border:1px solid var(--border);background:#F2EFE7;transition:background .5s,border-color .5s;}
.card.studying{background:var(--green-bg);border-color:var(--green-bd);}
.card.warn-time{background:var(--amber-bg);border-color:var(--amber-bd);}
.card.warn-mission{background:var(--purple-bg);border-color:var(--purple-bd);}
.card.done-time{background:var(--blue-bg);border-color:var(--blue-bd);}
.card.done-mission{background:var(--teal-bg);border-color:var(--teal-bd);}
.s-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.card.studying .s-label{color:var(--green);}
.card.warn-time .s-label{color:var(--amber);}
.card.warn-mission .s-label{color:var(--purple);}
.card.done-time .s-label{color:var(--blue);}
.card.done-mission .s-label{color:var(--teal);}
.c-name{font-size:1.35rem;font-weight:700;margin:4px 0 2px;}
.c-leave{font-size:.78rem;color:var(--muted);margin-bottom:8px;}
.c-timer{font-size:2.2rem;font-weight:700;}
.c-timer.sm{font-size:1.4rem;}
.m-row{display:flex;align-items:center;gap:6px;margin-top:8px;}
.m-pct{font-size:.78rem;font-weight:700;}
.card.studying .m-pct{color:var(--green);}
.card.warn-mission .m-pct{color:var(--purple);}
.card.done-mission .m-pct{color:var(--teal);}
.bar{flex:1;height:5px;border-radius:4px;background:rgba(0,0,0,.08);overflow:hidden;}
.bar-f{height:100%;border-radius:4px;transition:width 1s linear;}
.card.studying .bar-f{background:var(--green);}
.card.warn-time .bar-f{background:var(--amber);}
.card.warn-mission .bar-f{background:var(--purple);}
.card.done-time .bar-f{background:var(--blue);}
.card.done-mission .bar-f{background:var(--teal);}
.empty{text-align:center;padding:70px 20px;color:var(--muted);}
.empty .big{font-size:2.8rem;margin-bottom:10px;}
.alert-bar{margin-top:24px;border-radius:12px;border:1px solid var(--red-bd);background:var(--red-bg);padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.a-label{font-size:.74rem;font-weight:800;letter-spacing:.08em;color:var(--red);text-transform:uppercase;white-space:nowrap;}
.a-items{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
.a-chip{background:#fff;border:1px solid #E8A6A6;color:var(--red);border-radius:999px;padding:5px 12px;font-size:.85rem;font-weight:700;display:flex;gap:5px;align-items:baseline;}
/* Mission screen */
.ms-wrap{padding:18px 18px 80px;max-width:560px;margin:0 auto;}
.ms-hero{text-align:center;padding:16px 0 12px;}
.ms-hero .ms-name{font-size:1.5rem;font-weight:900;}
.ms-hero .ms-sub{font-size:.82rem;color:var(--muted);margin-top:4px;}
.ms-progress{display:flex;align-items:center;gap:10px;padding:12px 0 4px;}
.ms-prog-bar{flex:1;height:8px;border-radius:6px;background:var(--border);overflow:hidden;}
.ms-prog-fill{height:100%;background:var(--green);border-radius:6px;transition:width .4s ease;}
.ms-prog-txt{font-size:.82rem;font-weight:700;color:var(--green);white-space:nowrap;}
.m-list{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.m-item{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;}
.m-item.done{background:var(--green-bg);border-color:var(--green-bd);}
.m-item-top{display:flex;align-items:center;gap:12px;cursor:pointer;}
.m-circle{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem;transition:background .18s,border-color .18s;}
.m-item.done .m-circle{background:var(--green);border-color:var(--green);color:#fff;}
.m-text{font-size:1rem;font-weight:600;}
.m-item.done .m-text{text-decoration:line-through;color:var(--muted);}
.score-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.score-row input{width:70px;padding:7px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:1rem;font-weight:700;text-align:center;}
.score-row .max-label{font-size:.9rem;color:var(--muted);}
.score-row button{padding:7px 14px;background:var(--green);border:none;color:#fff;font-weight:700;border-radius:8px;cursor:pointer;font-size:.85rem;}
.score-done-row{font-size:.82rem;color:var(--green);font-weight:700;margin-top:6px;}
.undo-btn{font-size:.75rem;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;margin-left:8px;}
/* Book panel */
.book-panel{margin-top:20px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.book-panel-title{font-size:.9rem;font-weight:700;margin-bottom:12px;}
.book-input-row{display:flex;gap:8px;margin-bottom:12px;}
.book-input-row input{flex:1;padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:1rem;font-weight:700;}
.book-input-row button{padding:8px 14px;background:var(--blue);border:none;color:#fff;font-weight:700;border-radius:8px;cursor:pointer;}
.book-chips{display:flex;flex-direction:column;gap:6px;}
.book-chip{display:flex;align-items:center;justify-content:space-between;background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:8px;padding:8px 12px;}
.book-chip .bc-num{font-weight:700;color:var(--blue);font-size:.82rem;margin-right:6px;}
.book-chip .bc-title{font-size:.88rem;font-weight:600;}
.bc-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;}
.book-msg{font-size:.82rem;color:var(--red);margin-top:4px;}
.btn-checkout{width:100%;margin-top:16px;padding:14px;border-radius:14px;background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);font-weight:700;font-size:.95rem;cursor:pointer;}
/* Celebration */
.celebration{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.cele-emoji{font-size:5rem;animation:bounce .6s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-16px)}}
.cele-title{font-size:2rem;font-weight:900;margin:16px 0 6px;}
.cele-sub{font-size:1rem;color:var(--muted);margin-bottom:28px;}
.cele-btn{padding:14px 36px;background:var(--green);border:none;color:#fff;font-weight:700;font-size:1.05rem;border-radius:14px;cursor:pointer;}
.confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:299;}
/* Pad admin */
.pad-wrap{padding:18px 16px 60px;max-width:720px;margin:0 auto;}
.sec-title{font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:22px 0 10px;}
.admin-toggle{display:inline-flex;align-items:center;gap:7px;margin-top:24px;padding:9px 14px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);cursor:pointer;font-size:.82rem;}
.ap{margin-top:16px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;}
.a-row{display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap;}
.a-row input,.a-row select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:8px;font-size:.9rem;flex:1;min-width:75px;}
.a-row button{background:var(--green);border:none;color:#fff;font-weight:700;padding:9px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;font-size:.9rem;}
.r-list{margin-top:12px;display:flex;flex-direction:column;gap:7px;}
.r-wrap{background:var(--bg);border-radius:8px;overflow:hidden;}
.r-item{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;flex-wrap:wrap;gap:6px;}
.r-acts{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.r-sched,.r-mission-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 9px;font-size:.74rem;cursor:pointer;}
.r-num{color:var(--blue);font-weight:700;margin-right:5px;font-family:'Space Grotesk',monospace;}
.r-name{font-weight:600;}
.r-dur{color:var(--muted);font-size:.82rem;margin-left:6px;}
.r-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:.82rem;}
.r-type{font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:999px;margin-left:5px;}
.r-type.m60{background:var(--blue-bg);color:var(--blue);}
.r-type.m90{background:var(--purple-bg);color:var(--purple);}
.r-type.endtime{background:var(--amber-bg);color:var(--amber);}
.r-type.mission{background:var(--teal-bg);color:var(--teal);}
.exp-panel{background:var(--bg);border-top:1px solid var(--border);padding:11px;}
.sched-row{display:flex;flex-wrap:wrap;gap:9px;align-items:flex-end;}
.sched-cell{display:flex;flex-direction:column;gap:3px;font-size:.72rem;color:var(--muted);}
.sched-cell input[type="time"]{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 7px;border-radius:6px;font-size:.82rem;}
.m-day-block{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:8px;}
.m-day-lbl{font-size:.76rem;font-weight:700;color:var(--muted);margin-bottom:7px;}
.m-tmpl-item{display:flex;align-items:center;justify-content:space-between;font-size:.85rem;padding:5px 7px;background:var(--bg);border-radius:5px;margin-bottom:4px;}
.mi-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.78rem;}
.m-add-area{border:1px dashed var(--border);border-radius:8px;padding:10px;margin-top:6px;}
.m-add-label{font-size:.72rem;color:var(--muted);margin-bottom:6px;}
.m-add-row{display:flex;gap:5px;flex-wrap:wrap;}
.m-add-row input,.m-add-row select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:6px;font-size:.82rem;}
.m-add-row input{flex:1;min-width:80px;}
.m-add-row button{background:var(--green);border:none;color:#fff;font-weight:700;padding:5px 11px;border-radius:6px;cursor:pointer;font-size:.82rem;}
/* Book library */
.book-lib-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg);border-radius:6px;margin-bottom:4px;font-size:.88rem;}
.bk-num{font-weight:700;color:var(--blue);margin-right:6px;font-family:'Space Grotesk',monospace;}
/* PIN */
.pin-overlay{position:fixed;inset:0;background:rgba(10,14,26,.5);display:flex;align-items:center;justify-content:center;z-index:200;}
.pin-box{background:var(--card);border-radius:20px;padding:28px 24px;width:280px;}
.pin-box h3{font-size:1.05rem;font-weight:800;margin-bottom:4px;}
.pin-box p{font-size:.82rem;color:var(--muted);margin-bottom:16px;}
.pin-dots{display:flex;gap:9px;justify-content:center;margin-bottom:16px;}
.p-dot{width:13px;height:13px;border-radius:50%;background:var(--border);transition:background .2s;}
.p-dot.filled{background:var(--green);}
.pin-kp{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.p-key{height:50px;border-radius:11px;background:var(--bg);border:1px solid var(--border);font-size:1.15rem;font-weight:700;cursor:pointer;transition:background .12s;}
.p-key:active{background:var(--border);}
.p-key.cancel{color:var(--muted);font-size:.88rem;}
.pin-err{color:var(--red);font-size:.82rem;text-align:center;margin-top:8px;min-height:18px;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--green);color:var(--text);padding:11px 18px;border-radius:9px;font-size:.88rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<canvas class="confetti-canvas" id="confetti-canvas"></canvas>
<script>
const FIREBASE="https://hakwoncheck-default-rtdb.firebaseio.com";
const WD_KEYS=['sun','mon','tue','wed','thu','fri','sat'];
const WD_LABELS=[['mon','월'],['tue','화'],['wed','수'],['thu','목'],['fri','금'],['sat','토'],['sun','일']];
const ADMIN_PIN='1234';

// onclick에서 호출되는 함수들을 미리 전역에 등록 (함수 선언보다 앞서 호출될 수 있으므로)
['setMode','onTC','addStu','delStu','togSched','setSched','togMiss','addMiss','delMiss',
 'toggleAdmin','pinKey','skPress','skClear','skConfirm','pkPress','pkClear','pkConfirm',
 'toggleSM','submitScore','undoSM','addBook','removeBook','selectReview',
 'stuCheckout','closeCele','addBook_admin','delBook_admin','openEdit','closeEdit','saveEdit',
 'goPage','setLevel'
].forEach(fn=>{window[fn]=function(){
  if(typeof eval(fn)==='function')return eval(fn).apply(this,arguments);
  console.warn(fn+' not ready');
};});

async function fbGet(p){try{const r=await fetch(`${FIREBASE}/${p}.json`);return await r.json();}catch{return null;}}
async function fbSet(p,d){try{await fetch(`${FIREBASE}/${p}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});}catch{showToast('⚠️ 저장 실패');}}
async function loadRoster(){const d=await fbGet('roster');return Array.isArray(d)?d.filter(Boolean):[];}
async function saveRoster(l){await fbSet('roster',l);}
async function loadSessions(){const d=await fbGet('sessions');return d&&typeof d==='object'?d:{};}
async function saveSessions(o){await fbSet('sessions',o);}

// 날짜가 바뀌면 이전 날 세션을 자동으로 초기화 (백그라운드 실행)
async function cleanupOldSessions(){
  try{
    const sessions=await loadSessions();
    const today=todayKey();
    let changed=false;
    Object.keys(sessions).forEach(id=>{
      const s=sessions[id];
      if(!s||!s.startTime)return;
      const d=new Date(s.startTime);
      const sessionDay=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if(sessionDay!==today){delete sessions[id];changed=true;}
    });
    if(changed)await saveSessions(sessions);
  }catch(e){console.log('cleanup skipped',e);}
}

function getMode(){return window.location.hash.replace('#','')||null;}
function setMode(m){window.location.hash=m||'';render();}
window.setMode=setMode;
window.addEventListener('hashchange',render);

function render(){
  clearInterval(tvIv);clearInterval(tvClkIv);clearInterval(padIv);
  const m=getMode();
  if(m==='tv')renderTV();
  else if(m==='pad')renderPad();
  else if(m==='student')renderStudentKP();
  else if(m&&m.startsWith('smission:'))renderStudentMission(m.split(':')[1]);
  else renderSelect();
}

function renderSelect(){
  document.getElementById('root').innerHTML=`
    <div class="select-screen">
      <div class="select-title">학원 출결 보드</div>
      <div class="select-buttons">
        <div class="sel-btn" onclick="setMode('pad')"><span class="emoji">📋</span><div class="label">패드 모드</div><div class="sub">체크인 · 관리</div></div>
        <div class="sel-btn" onclick="setMode('student')"><span class="emoji">✅</span><div class="label">학생 미션</div><div class="sub">수업 중 미션 체크</div></div>
        <div class="sel-btn" onclick="setMode('tv')"><span class="emoji">🖥️</span><div class="label">모니터</div><div class="sub">교실 전광판</div></div>
      </div>
    </div>`;}

/* ══ TV ══ */
async function renderTV(){
  document.getElementById('root').innerHTML=`
    <div class="topbar"><div class="brand"><span class="dot"></span><span class="brand-text">지금 공부 중</span></div><div class="clk mono" id="clk">${fmtClock()}</div></div>
    <div class="tv-wrap"><div class="tv-hdr"><h1>오늘의 학습 현황</h1><span id="tv-cnt" style="color:var(--muted);font-size:.95rem;"></span></div><div class="board" id="board"></div><div id="alert-zone"></div></div>`;
  clearInterval(tvClkIv);tvClkIv=setInterval(()=>{const c=document.getElementById('clk');if(c)c.textContent=fmtClock();},1000);
  await tickTV();tvIv=setInterval(tickTV,3000);
}
async function tickTV(){
  const[sessions,roster]=await Promise.all([loadSessions(),loadRoster()]);
  const board=document.getElementById('board');if(!board)return;
  const ids=Object.keys(sessions);
  const cnt=document.getElementById('tv-cnt');if(cnt)cnt.textContent=ids.length?`${ids.length}명 학습 중`:'';
  if(!ids.length){board.innerHTML=`<div class="empty"><div class="big">🌤️</div>아직 등원한 학생이 없어요</div>`;document.getElementById('alert-zone').innerHTML='';return;}
  board.innerHTML=ids.map(id=>{
    const s=sessions[id],now=Date.now(),end=s.endTime||s.startTime+3600000;
    const tot=(end-s.startTime)/1000,rem=(end-now)/1000,pct=Math.max(0,Math.min(100,rem/tot*100));
    const ms=s.missions||[],mTot=ms.length,mDone=ms.filter(m=>m.done).length,mPct=mTot?Math.round(mDone/mTot*100):100;
    const timeDone=rem<=0,missionDone=mTot>0&&mDone===mTot,lastOne=mTot>0&&mDone===mTot-1&&!timeDone;
    let cls,lbl,timerHtml;
    if(s.type==='mission'){
      if(missionDone){cls='done-mission';lbl='미션 완료 🎉';timerHtml=`<div class="c-timer sm mono">모든 미션 완료!</div>`;}
      else if(lastOne){cls='warn-mission';lbl='마지막 미션';timerHtml=`<div class="c-timer mono">${fmtTimer(rem)}</div>`;}
      else if(timeDone){cls='done-time';lbl='시간 종료';timerHtml=`<div class="c-timer sm mono">시간이 다 됐어요</div>`;}
      else{cls='studying';lbl='학습 중';timerHtml=`<div class="c-timer mono">${fmtTimer(rem)}</div>`;}
    }else{
      if(timeDone){cls='done-time';lbl='하원 시간';timerHtml=`<div class="c-timer sm mono">수업 종료</div>`;}
      else if(rem<=300){cls='warn-time';lbl='곧 종료';timerHtml=`<div class="c-timer mono">${fmtTimer(rem)}</div>`;}
      else{cls='studying';lbl='학습 중';timerHtml=`<div class="c-timer mono">${fmtTimer(rem)}</div>`;}
    }
    const bars=mTot?`<div class="m-row"><span class="m-pct">${mPct}%</span><div class="bar"><div class="bar-f" style="width:${mPct}%"></div></div></div>`
      :`<div class="bar" style="margin-top:8px"><div class="bar-f" style="width:${pct}%"></div></div>`;
    return`<div class="card ${cls}"><div class="s-label">${lbl}</div><div class="c-name">${esc(s.name)}</div><div class="c-leave mono">예상 귀가 ${fmtTs(end)}</div>${timerHtml}${bars}</div>`;
  }).join('');
  const today=todayWD(),now=Date.now();
  const overdue=roster.filter(stu=>{if(sessions[stu.id])return false;const sc=stu.schedule&&stu.schedule[today];if(!sc)return false;const[h,m]=sc.split(':').map(Number);const e=new Date();e.setHours(h,m,0,0);return now-e.getTime()>=5*60000;});
  document.getElementById('alert-zone').innerHTML=overdue.length?`<div class="alert-bar"><div class="a-label">⚠ 출석 확인 필요</div><div class="a-items">${overdue.map(o=>`<span class="a-chip"><span>${esc(o.number)}</span><span>${esc(o.name)}</span><span style="opacity:.7;font-size:.76rem">예정 ${o.schedule[today]}</span></span>`).join('')}</div></div>`:'';
}

function renderMissionItem(m,i,sid){
  if(m.type==='check'||!m.type){

        <div class="m-text">${esc(m.text)}</div>
      </div>
    </div>`;
  }
  // Score type (listening / vocabulary)
  const label=m.type==='listening'?'듣기 점수':'단어 점수';
  if(m.done){
    const rate=m.scoreMax?Math.round((m.score||0)/m.scoreMax*100):0;
    return`<div class="m-item done">
      <div class="m-item-top">
        <div class="m-circle">✓</div>
        <div class="m-text">${esc(m.text)}</div>
      </div>
      <div class="score-done-row">${label}: ${m.score}점 / ${m.scoreMax}점 (${rate}%)<button class="undo-btn" onclick="undoSM('${sid}',${i})">다시하기</button></div>
    </div>`;
  }
  return`<div class="m-item">
    <div class="m-item-top">
      <div class="m-circle"></div>
      <div class="m-text">${esc(m.text)}</div>
    </div>

async function toggleSM(sid,idx){
  const sessions=await loadSessions();
  const sess=sessions[sid];if(!sess||!sess.missions)return;
  if(sess.missions[idx].type&&sess.missions[idx].type!=='check')return;
  sess.missions[idx].done=!sess.missions[idx].done;
  await saveSessions(sessions);
  await renderStudentMission(sid);
}

async function submitScore(sid,idx){
  const inp=document.getElementById(`score-${idx}`);
  const val=parseInt(inp?.value||'',10);
  const sessions=await loadSessions();
  const sess=sessions[sid];if(!sess||!sess.missions)return;
  const m=sess.missions[idx];
  if(isNaN(val)||val<0||val>m.scoreMax){showToast(`0~${m.scoreMax} 사이의 점수를 입력해주세요`);return;}
  m.done=true;m.score=val;
  await saveSessions(sessions);
  await renderStudentMission(sid);
}

async function undoSM(sid,idx){
  const sessions=await loadSessions();
  const sess=sessions[sid];if(!sess||!sess.missions)return;
  sess.missions[idx].done=false;sess.missions[idx].score=null;
  await saveSessions(sessions);

    await saveAttendance(sid,todayKey(),{
      name:sess.name,level:sess.level||'저학년',checkIn:sess.startTime,checkOut:Date.now(),

let confettiAnim;
function startConfetti(){const canvas=document.getElementById('confetti-canvas');if(!canvas)return;const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const pieces=Array.from({length:120},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,r:Math.random()*7+3,c:`hsl(${Math.random()*360},80%,60%)`,vx:(Math.random()-.5)*3,vy:Math.random()*4+2,rot:Math.random()*360,vr:(Math.random()-.5)*6}));function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.c;ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);ctx.restore();});confettiAnim=requestAnimationFrame(draw);}cancelAnimationFrame(confettiAnim);draw();}
function stopConfetti(){cancelAnimationFrame(confettiAnim);const c=document.getElementById('confetti-canvas');if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);}

      const sess=padSessions[stu.id];const ms=sess.missions||[];
      const scores={listening:[],vocabulary:[]};
      ms.forEach(m=>{if(m.done&&m.scoreMax){if(m.type==='listening')scores.listening.push({score:m.score||0,max:m.scoreMax});if(m.type==='vocabulary')scores.vocabulary.push({score:m.score||0,max:m.scoreMax});}});
      await saveAttendance(stu.id,todayKey(),{name:stu.name,level:sess.level||stu.level||'저학년',checkIn:sess.startTime,checkOut:Date.now(),missionsTotal:ms.length,missionsDone:ms.filter(m=>m.done).length,missions:ms.map(m=>({text:m.text,parentLabel:m.parentLabel||'',type:m.type||'check',done:m.done,score:m.score||null,scoreMax:m.scoreMax||0})),books:sess.books||[],scores,month:monthKey()});
      delete padSessions[stu.id];await saveSessions(padSessions);showToast(`${stu.name} 하원 처리`);pkRes(`${stu.name} 하원 완료`,'ok');
    }
  }else{
    const start=Date.now();
    const tmpl=(stu.missions&&stu.missions[todayWD()])||[];
    const missions=tmpl.map((m,i)=>{const t=missionFromTemplate(m);return{id:`m${i}`,...t,done:false,score:null};});
    padSessions[stu.id]={name:stu.name,number:stu.number,type:stu.type||'m60',level:stu.level||'저학년',startTime:start,endTime:computeEnd(stu,start),missions,books:[]};
    await saveSessions(padSessions);showToast(`${stu.name} 출석 완료`);pkRes(`${stu.name} 출석!`,'ok');
  }
}

/* ── Admin / PIN ── */
let pinV='';
function toggleAdmin(){
  if(adminOpen){adminOpen=false;pinUnlocked=false;document.getElementById('admin-panel').style.display='none';return;}
  if(pinUnlocked){adminOpen=true;document.getElementById('admin-panel').style.display='block';drawAdmin();return;}
  showPin(false);
}
function showPin(forReport){
  pinV='';
  const o=document.createElement('div');o.className='pin-overlay';o.id='pin-ov';
  o.innerHTML=`<div class="pin-box"><h3>🔒 관리자 확인</h3><p>PIN을 입력해주세요</p><div class="pin-dots" id="pdots">${'<div class="p-dot"></div>'.repeat(ADMIN_PIN.length)}</div><div class="pin-kp">${[1,2,3,4,5,6,7,8,9,'취소',0,'⌫'].map(k=>`<button class="p-key ${k==='취소'?'cancel':''}" onclick="pinKey('${k}')">${k}</button>`).join('')}</div><div class="pin-err" id="perr"></div></div>`;
  document.body.appendChild(o);
}
function pinKey(k){
  if(k==='취소'){document.getElementById('pin-ov')?.remove();return;}
  if(k==='⌫'){pinV=pinV.slice(0,-1);updDots();return;}
  if(pinV.length>=ADMIN_PIN.length)return;
  pinV+=k;updDots();
  if(pinV.length===ADMIN_PIN.length){
    if(pinV===ADMIN_PIN){document.getElementById('pin-ov')?.remove();pinUnlocked=true;adminOpen=true;document.getElementById('admin-panel').style.display='block';drawAdmin();}
    else{document.getElementById('perr').textContent='PIN이 틀렸습니다';setTimeout(()=>{pinV='';updDots();const e=document.getElementById('perr');if(e)e.textContent='';},1000);}
  }
}
function updDots(){document.querySelectorAll('.p-dot').forEach((d,i)=>d.classList.toggle('filled',i<pinV.length));}

async function drawAdmin(){
  const p=document.getElementById('admin-panel');
  const typeLabel=(t)=>({'m60':'60분형','m90':'90분형','endtime':'귀가지정','mission':'미션형'}[t]||'60분형');
  const durLabel=(s)=>s.type==='endtime'?`귀가 ${s.endTimeVal||''}`:s.type==='m90'?'90분':s.type==='mission'?(s.endTimeVal?`귀가 ${s.endTimeVal}`:'미션기반'):'60분';
  p.innerHTML=`<div class="ap">
    <div class="sec-title" style="margin-top:0;">새 학생 등록</div>
    <div class="a-row">
      <input id="nn" type="text" inputmode="numeric" placeholder="학번" maxlength="6">
      <input id="nm" type="text" placeholder="이름">
    </div>
    <div class="a-row">
      <select id="nt" onchange="onTC()">
        <option value="m60">60분형</option><option value="m90">90분형</option>
        <option value="endtime">귀가시간 지정형</option><option value="mission">미션형</option>
      </select>
      <select id="nlv"><option value="저학년">저학년</option><option value="고학년">고학년</option></select>
      <span id="et-wrap" style="display:none;flex:1;"><input id="net" type="time" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:8px;font-size:.9rem;"></span>
      <span id="met-wrap" style="display:none;flex:1;"><input id="nmet" type="time" placeholder="귀가시각(선택)" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:8px;font-size:.9rem;"></span>
    </div>
    <div class="a-row"><button onclick="addStu()">+ 학생 추가</button><button onclick="setMode('report')" style="background:var(--blue);">📊 월말 리포트</button></div>
    <div style="font-size:.76rem;color:var(--muted);margin-bottom:10px;">📚 도서 목록 등록·관리는 <b>academy_books.html</b> 파일을 이용해주세요.</div>

    <div class="sec-title">등록된 학생</div>
    <div class="r-list">
      ${padRoster.map(s=>`<div class="r-wrap">
        <div class="r-item">
          <span><span class="r-num">${esc(s.number)}</span><span class="r-name">${esc(s.name)}</span><span class="r-type ${s.type||'m60'}">${typeLabel(s.type)}</span><span style="font-size:.7rem;color:var(--muted);margin-left:4px;">${s.level||'저학년'}</span><span class="r-dur">${durLabel(s)}</span></span>
          <span class="r-acts">
            <button class="r-sched" onclick="togSched('${s.id}')">등원시간표</button>
            <button class="r-mission-btn" onclick="togMiss('${s.id}')">미션</button>
            <button class="r-del" onclick="delStu('${s.id}')">삭제</button>
          </span>
        </div>
        ${schedOpen[s.id]?drawSchedRow(s):''}
        ${missOpen[s.id]?drawMissPanel(s):''}
      </div>`).join('')||'<div style="color:var(--muted);font-size:.82rem;">등록된 학생이 없습니다</div>'}
    </div>
  </div>`;}

function onTC(){const t=document.getElementById('nt')?.value;document.getElementById('et-wrap').style.display=t==='endtime'?'flex':'none';document.getElementById('met-wrap').style.display=t==='mission'?'flex':'none';}

async function addStu(){
  const num=(document.getElementById('nn').value||'').trim();
  const name=(document.getElementById('nm').value||'').trim();
  const type=document.getElementById('nt').value;
  const level=document.getElementById('nlv').value;
  if(!num){showToast('학번을 입력해주세요');return;}
  if(!name){showToast('이름을 입력해주세요');return;}
  if(padRoster.some(s=>s.number===num)){showToast(`이미 사용 중인 학번(${num})`);return;}
  let etv='';
  if(type==='endtime'){etv=(document.getElementById('net')?.value||'').trim();if(!etv){showToast('귀가 시각을 입력해주세요');return;}}
  if(type==='mission')etv=(document.getElementById('nmet')?.value||'').trim();
  padRoster.push({id:uid(),number:num,name,type,level,endTimeVal:etv,schedule:{},missions:{}});
  await saveRoster(padRoster);showToast(`${name} 등록 완료`);drawAdmin();
}
async function delStu(id){
  const s=padRoster.find(x=>x.id===id);if(!confirm(`${s?.name||'이 학생'}을 삭제할까요?`))return;
  padRoster=padRoster.filter(x=>x.id!==id);
  if(padSessions[id]){delete padSessions[id];await saveSessions(padSessions);}
  await saveRoster(padRoster);showToast('삭제됨');drawAdmin();
}

async function addBook_admin(){
  const num=parseInt(document.getElementById('bk-num').value||'',10);
  const title=(document.getElementById('bk-title').value||'').trim();
  if(!num||!title){showToast('번호와 제목을 입력해주세요');return;}
  const lib=await loadBookLibrary();
  lib[String(num)]=title;
  await saveBookLibrary(lib);showToast(`No.${num} 도서 추가됨`);drawAdmin();
}
async function delBook_admin(num){
  const lib=await loadBookLibrary();delete lib[String(num)];await saveBookLibrary(lib);showToast('삭제됨');drawAdmin();
}

function togSched(id){schedOpen[id]=!schedOpen[id];drawAdmin();}
function togMiss(id){missOpen[id]=!missOpen[id];drawAdmin();}
function drawSchedRow(s){return`<div class="exp-panel"><div class="sched-row">${WD_LABELS.map(([k,l])=>`<label class="sched-cell"><span style="font-weight:700;">${l}요일</span><input type="time" value="${(s.schedule&&s.schedule[k])||''}" onchange="setSched('${s.id}','${k}',this.value)"></label>`).join('')}<div style="flex-basis:100%;font-size:.68rem;color:var(--muted);margin-top:3px;">등원 안 하는 요일은 비워두세요.</div></div></div>`;}
async function setSched(id,k,v){const s=padRoster.find(x=>x.id===id);if(!s)return;if(!s.schedule)s.schedule={};s.schedule[k]=v||'';await saveRoster(padRoster);showToast('저장됨');}

function drawMissPanel(s){
  const mb=s.missions||{};
  const typeOpts=`<option value="check">일반 체크</option><option value="listening">듣기 점수</option><option value="vocabulary">단어 점수</option>`;
  return`<div class="exp-panel">
    <div class="sec-title" style="margin-top:0;">요일별 미션 (매주 반복)</div>
    <div style="font-size:.72rem;color:var(--muted);margin-bottom:8px;">💡 점수형은 학생이 직접 점수를 입력해요. 학부모 표시명을 비우면 내부 이름이 그대로 표시됩니다.</div>
    ${WD_LABELS.map(([k,l])=>`
      <div class="m-day-block">
        <div class="m-day-lbl">${l}요일</div>
        ${(mb[k]||[]).map((m,i)=>{
          const tm=typeof m==='object'?m:{text:m,parentLabel:'',type:'check',scoreMax:0};
          const typeKo={check:'체크',listening:'듣기',vocabulary:'단어'}[tm.type]||'체크';
          return`<div class="m-tmpl-item">
            <span>
              <span style="font-size:.7rem;background:var(--blue-bg);color:var(--blue);border-radius:4px;padding:1px 5px;margin-right:4px;">${typeKo}</span>
              <b>${esc(tm.text)}</b>
              ${tm.parentLabel?`<span style="color:var(--muted);font-size:.76rem;"> → ${esc(tm.parentLabel)}</span>`:''}
              ${tm.scoreMax?`<span style="color:var(--muted);font-size:.76rem;"> /${tm.scoreMax}점</span>`:''}
            </span>
            <button class="mi-del" onclick="delMiss('${s.id}','${k}',${i})">✕</button>
          </div>`;
        }).join('')||'<div style="color:var(--muted);font-size:.78rem;margin-bottom:4px;">미션 없음</div>'}
        <div class="m-add-area">
          <div class="m-add-label">새 미션 추가</div>
          <div class="m-add-row" style="margin-bottom:5px;">
            <select id="mt-${s.id}-${k}" style="max-width:100px;">${typeOpts}</select>
            <input type="text" placeholder="미션 이름 (내부용)" id="mi-${s.id}-${k}">
          </div>
          <div class="m-add-row">
            <input type="text" placeholder="학부모 표시명 (선택)" id="mi-pl-${s.id}-${k}">
            <input type="number" placeholder="만점" id="mi-max-${s.id}-${k}" style="max-width:70px;" min="1">
            <button onclick="addMiss('${s.id}','${k}')">+ 추가</button>
          </div>
        </div>
      </div>`).join('')}
  </div>`;}

async function addMiss(sid,day){
  const type=(document.getElementById(`mt-${sid}-${day}`)?.value||'check');
  const txt=(document.getElementById(`mi-${sid}-${day}`)?.value||'').trim();
  const pl=(document.getElementById(`mi-pl-${sid}-${day}`)?.value||'').trim();
  const scoreMax=parseInt(document.getElementById(`mi-max-${sid}-${day}`)?.value||'0',10);
  if(!txt){showToast('미션 이름을 입력해주세요');return;}
  if((type==='listening'||type==='vocabulary')&&!scoreMax){showToast('점수형은 만점을 입력해주세요');return;}
  const s=padRoster.find(x=>x.id===sid);if(!s)return;
  if(!s.missions)s.missions={};if(!s.missions[day])s.missions[day]=[];
  s.missions[day].push({text:txt,parentLabel:pl,type,scoreMax:type==='check'?0:scoreMax});
  await saveRoster(padRoster);showToast('미션 추가됨');drawAdmin();
}
async function delMiss(sid,day,idx){const s=padRoster.find(x=>x.id===sid);if(!s||!s.missions?.[day])return;s.missions[day].splice(idx,1);await saveRoster(padRoster);drawAdmin();}

cleanupOldSessions(); // 앱 시작 시 백그라운드로 이전 날 세션 정리
render();
