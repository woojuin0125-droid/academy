<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>학원 출결</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #f7f8fa;
    --card: #ffffff;
    --card-line: #e2e5ea;
    --text: #1c1e24;
    --muted: #6b7280;
    --accent: #2f6fed;
    --good: #2FAE76;
    --warn: #F5A623;
    --late: #E5484D;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Sans KR', sans-serif;
    overflow:hidden;
  }
  .hidden{ display:none !important; }

  /* ---------- 체크인(패드) 모드 ---------- */
  #view-checkin{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
  }
  #ci-display{
    font-family:'Space Grotesk', sans-serif;
    font-size:56px;
    font-weight:700;
    letter-spacing:6px;
    min-height:72px;
    margin-bottom:24px;
    color:var(--muted);
  }
  #ci-display.filled{ color:var(--text); }
  #ci-msg{
    font-size:26px;
    font-weight:700;
    line-height:1.5;
    max-width:520px;
    min-height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #ci-msg.ok{ color:var(--good); }
  #ci-msg.warn{ color:var(--warn); }
  #ci-msg.err{ color:var(--late); }

  .keypad{
    display:grid;
    grid-template-columns:repeat(3, 96px);
    gap:14px;
    margin-top:20px;
  }
  .keypad button{
    width:96px; height:96px;
    border-radius:20px;
    border:1px solid var(--card-line);
    background:var(--card);
    color:var(--text);
    font-size:32px;
    font-weight:700;
    font-family:'Space Grotesk', sans-serif;
  }
  .keypad button:active{ background:var(--accent); color:#ffffff; }
  .keypad .wide{ font-size:20px; }

  /* ---------- TV 모니터 모드 ---------- */
  #view-tv{
    height:100vh;
    padding:28px 32px;
    display:flex;
    flex-direction:column;
  }
  #tv-clock{
    font-family:'Space Grotesk', sans-serif;
    font-size:22px;
    color:var(--muted);
    margin-bottom:18px;
  }
  #tv-grid{
    flex:1;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:18px;
    align-content:start;
    overflow:hidden;
  }
  .stu-card{
    background:var(--card);
    border:2px solid var(--card-line);
    border-radius:18px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
  }
  .stu-card .name{
    font-size:24px;
    font-weight:900;
    margin-bottom:10px;
  }
  .stu-card .row{
    display:flex;
    justify-content:space-between;
    font-size:16px;
    color:var(--muted);
    margin-top:6px;
  }
  .stu-card .row b{ color:var(--text); }
  .stu-card.state-warn{ border-color:var(--warn); background:#fff6e0; }
  .stu-card.state-warn .name{ color:var(--warn); }
  .stu-card.state-done{ border-color:var(--good); }

  #tv-late{
    margin-top:16px;
    font-size:16px;
  }
  #tv-late .late-name{
    display:inline-block;
    color:var(--late);
    font-weight:700;
    margin-right:14px;
  }
</style>
</head>
<body>

<!-- 학생 체크인 화면 (패드) -->
<div id="view-checkin" class="hidden">
  <div id="ci-display"></div>
  <div id="ci-msg"></div>
  <div class="keypad">
    <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
    <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
    <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
    <button data-k="clear" class="wide">지우기</button>
    <button data-k="0">0</button>
    <button data-k="enter" class="wide">확인</button>
  </div>
</div>

<!-- TV 모니터 화면 -->
<div id="view-tv" class="hidden">
  <div id="tv-clock"></div>
  <div id="tv-grid"></div>
  <div id="tv-late"></div>
</div>

<script>
// ================= 공통 =================
var FIREBASE = 'https://hakwoncheck-default-rtdb.firebaseio.com';
var WD_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];

function fbGet(path){
  return fetch(FIREBASE + '/' + path + '.json')
    .then(function(r){ return r.json(); })
    .catch(function(){ return null; });
}
function fbSet(path, data){
  return fetch(FIREBASE + '/' + path + '.json', {
    method:'PUT',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify(data)
  });
}
function pad2(n){ return String(n).padStart(2,'0'); }
function todayKey(){
  var d = new Date();
  return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
}
function monthKey(){
  var d = new Date();
  return d.getFullYear() + '-' + pad2(d.getMonth()+1);
}
function todayWD(){ return WD_KEYS[new Date().getDay()]; }

// 12시간제 표기: "오후 2:15" 형태
function fmt12(date){
  var h = date.getHours();
  var m = date.getMinutes();
  var ap = h < 12 ? '오전' : '오후';
  var h12 = h % 12; if (h12 === 0) h12 = 12;
  return ap + ' ' + h12 + ':' + pad2(m);
}
function fmtMinutes(mins){
  if (mins < 60) return mins + '분';
  var h = Math.floor(mins/60), m = mins % 60;
  return h + '시간' + (m ? ' ' + m + '분' : '');
}

// 하원 계산 (본 모듈 전용 규칙: mission 타입은 durationMin + 5분 버퍼)
function computeEnd(stu, startTime){
  if (stu.type === 'endtime') {
    var today = todayWD();
    var timeVal = (stu.endTimeByDay && stu.endTimeByDay[today]) || stu.endTimeVal || '';
    if (timeVal) {
      var parts = timeVal.split(':');
      var d = new Date(startTime);
      d.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
      return d.getTime();
    }
    return startTime + 60*60000;
  }
  if (stu.type === 'mission') {
    var mins = (stu.durationMin === 90) ? 90 : 60;
    return startTime + (mins + 5) * 60000; // durationMin + 5분 버퍼 (2026-07 확정)
  }
  return startTime + 60*60000;
}

function isMissionComplete(m){
  if (m.category === 'homework') {
    return m.status === 'done' || m.status === 'none' || m.status === 'doneAtAcademy';
  }
  return !!m.done;
}
function missionProgress(missions){
  missions = missions || [];
  var total = missions.length, done = 0;
  missions.forEach(function(m){ if (isMissionComplete(m)) done++; });
  return { done: done, total: total, allDone: total > 0 ? (done === total) : true };
}

// 하원 가능 여부 판정 (타입별)
function canCheckOut(stu, session, now){
  var end = computeEnd(stu, session.startTime);
  if (stu.type === 'endtime') {
    // 하원시간 5분 전부터는 미션 여부와 무관하게 무조건 하원 가능
    return now >= (end - 5*60000);
  }
  if (stu.type === 'mission') {
    var prog = missionProgress(session.missions);
    return now >= end && prog.allDone;
  }
  return now >= end;
}

// ================= 모드 분기 =================
var params = new URLSearchParams(location.search);
var MODE = params.get('mode') === 'tv' ? 'tv' : 'checkin';

if (MODE === 'tv') {
  document.getElementById('view-tv').classList.remove('hidden');
  initTV();
} else {
  document.getElementById('view-checkin').classList.remove('hidden');
  initCheckin();
}

// ================= 체크인(패드) 모드 =================
function initCheckin(){
  var buf = '';
  var display = document.getElementById('ci-display');
  var msg = document.getElementById('ci-msg');
  var busy = false;

  function render(){
    display.textContent = buf || '번호를 입력하세요';
    display.className = buf ? 'filled' : '';
  }
  function showMsg(text, cls){
    msg.textContent = text;
    msg.className = cls || '';
  }
  function resetSoon(){
    setTimeout(function(){
      buf = '';
      render();
      showMsg('', '');
    }, 4000);
  }

  render();

  document.querySelectorAll('.keypad button').forEach(function(btn){
    btn.addEventListener('click', function(){
      var k = btn.getAttribute('data-k');
      if (busy) return;
      if (k === 'clear') { buf = ''; render(); return; }
      if (k === 'enter') { submit(); return; }
      if (buf.length < 10) buf += k;
      render();
    });
  });

  function submit(){
    if (!buf) return;
    busy = true;
    showMsg('확인 중...', '');
    handleSubmit(buf).then(function(result){
      showMsg(result.text, result.cls);
      buf = '';
      render();
      resetSoon();
    }).catch(function(){
      showMsg('오류가 발생했습니다. 다시 시도해주세요.', 'err');
      buf = '';
      render();
      resetSoon();
    }).finally(function(){
      busy = false;
    });
  }

  function handleSubmit(numStr){
    return fbGet('roster').then(function(roster){
      roster = roster || [];
      var stu = roster.find(function(s){ return s.number === numStr; });
      if (!stu) return { text:'등록되지 않은 번호입니다.', cls:'err' };

      return fbGet('sessions').then(function(sessions){
        sessions = sessions || {};
        var existing = sessions[stu.id];

        if (!existing) {
          return doCheckIn(stu, sessions);
        } else {
          return doCheckOut(stu, existing, sessions);
        }
      });
    });
  }

  function doCheckIn(stu, sessions){
    var now = Date.now();
    var end = computeEnd(stu, now);
    var remainMin = Math.max(0, Math.round((end - now) / 60000));

    var today = todayWD();
    var tmpl = (stu.missions && stu.missions[today]) || [];
    var missions = tmpl.map(function(m, i){
      return {
        id: 'm' + i,
        text: m.text || '',
        category: m.category || 'other',
        type: m.type || 'check',
        scoreMax: parseInt(m.scoreMax || 0, 10),
        parentLabel: m.parentLabel || '',
        done: false,
        score: null
      };
    });

    var session = {
      name: stu.name,
      number: stu.number,
      type: stu.type,
      level: stu.level || '',
      startTime: now,
      endTime: end,
      missions: missions,
      books: []
    };

    return fbSet('sessions/' + stu.id, session).then(function(){
      return { text: stu.name + '님, 등원했습니다.\n남은 학습시간 약 ' + fmtMinutes(remainMin), cls:'ok' };
    });
  }

  function doCheckOut(stu, session, sessions){
    var now = Date.now();
    if (!canCheckOut(stu, session, now)) {
      if (stu.type === 'mission') {
        var prog = missionProgress(session.missions);
        if (!prog.allDone) {
          return Promise.resolve({ text:'아직 미션이 끝나지 않았어요. 마저 완료해볼까요?', cls:'warn' });
        }
        return Promise.resolve({ text:'아직 하원 시간이 되지 않았어요.', cls:'warn' });
      }
      return Promise.resolve({ text:'아직 하원 시간이 되지 않았어요.', cls:'warn' });
    }

    var prog = missionProgress(session.missions);
    var attendance = {
      name: stu.name,
      level: stu.level || '',
      checkIn: session.startTime,
      checkOut: now,
      missionsTotal: prog.total,
      missionsDone: prog.done,
      missions: session.missions || [],
      books: session.books || [],
      scores: buildScores(session.missions),
      month: monthKey()
    };

    return fbSet('attendance/' + stu.id + '/' + todayKey(), attendance).then(function(){
      return fbSet('sessions/' + stu.id, null);
    }).then(function(){
      if (prog.allDone) {
        return { text:'미션을 완료했습니다.\n집에 가도 좋습니다.', cls:'ok' };
      }
      return { text:'오늘도 수고했습니다.\n내일 더 열심히 합시다.', cls:'ok' };
    });
  }

  function buildScores(missions){
    var out = {};
    (missions || []).forEach(function(m){
      if (m.score === null || m.score === undefined) return;
      if (m.type === 'listening' || m.type === 'vocabulary') {
        var key = m.type === 'listening' ? 'listening' : 'vocabulary';
        if (!out[key]) out[key] = [];
        out[key].push({ score: m.score, max: m.scoreMax || 0 });
      }
    });
    return out;
  }
}

// ================= TV 모니터 모드 =================
function initTV(){
  var clockEl = document.getElementById('tv-clock');
  var gridEl = document.getElementById('tv-grid');
  var lateEl = document.getElementById('tv-late');
  var roster = [];

  function tickClock(){
    clockEl.textContent = fmt12(new Date());
  }
  tickClock();
  setInterval(tickClock, 1000);

  function loadRoster(){
    return fbGet('roster').then(function(r){ roster = r || []; });
  }
  function rosterById(id){
    return roster.find(function(s){ return s.id === id; });
  }

  function render(){
    fbGet('sessions').then(function(sessions){
      sessions = sessions || {};
      var now = Date.now();
      gridEl.innerHTML = '';

      Object.keys(sessions).forEach(function(id){
        var s = sessions[id];
        if (!s || !s.startTime) return;

        // 3시간 경과 시 화면에서만 자동 제거
        if (now - s.startTime >= 3 * 60 * 60000) return;

        var stu = rosterById(id);
        var type = (stu && stu.type) || s.type;
        var end = stu ? computeEnd(stu, s.startTime) : s.endTime;
        var prog = missionProgress(s.missions);
        var pct = prog.total ? Math.round(prog.done / prog.total * 100) : 0;

        var state = 'studying';
        if (type === 'endtime') {
          if (now >= end - 5*60000) state = 'warn';
        } else if (type === 'mission') {
          if (now >= end && prog.allDone) state = 'done';
          else if (now >= end) state = 'warn'; // 시간은 됐는데 미션 남음
        }

        var remainMs = Math.max(0, end - now);
        var remainLabel = state === 'done' ? '하원 가능' : fmtMinutes(Math.ceil(remainMs/60000)) + ' 남음';

        var card = document.createElement('div');
        card.className = 'stu-card' + (state === 'warn' ? ' state-warn' : '') + (state === 'done' ? ' state-done' : '');
        card.innerHTML =
          '<div class="name">' + s.name + '</div>' +
          '<div class="row"><span>남은시간</span><b>' + remainLabel + '</b></div>' +
          '<div class="row"><span>미션 수행률</span><b>' + pct + '%</b></div>';
        gridEl.appendChild(card);
      });

      renderLate(sessions, now);
    });
  }

  function renderLate(sessions, now){
    var today = todayWD();
    var overdue = roster.filter(function(stu){
      if (sessions[stu.id]) return false;
      var sc = stu.schedule && stu.schedule[today];
      if (!sc) return false;
      var parts = sc.split(':');
      var expected = new Date();
      expected.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
      return now - expected.getTime() >= 5*60000;
    });
    if (!overdue.length) { lateEl.innerHTML = ''; return; }
    lateEl.innerHTML = '미체크인: ' + overdue.map(function(s){
      return '<span class="late-name">' + s.name + '</span>';
    }).join('');
  }

  loadRoster().then(render);
  setInterval(render, 3000);
  setInterval(loadRoster, 30000);
}
</script>
</body>
</html>
