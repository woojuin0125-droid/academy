<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>오늘의 미션 - Hello English Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8EC;
    --paper:#FFFFFF;
    --ink:#3A2E26;
    --ink-soft:#8A7A6C;
    --line:#F0E4D0;
    --coral:#FF7A59;
    --coral-dark:#E85F3D;
    --berry:#E8546B;
    --sun:#FFC93C;
    --leaf:#2FAE76;
    --gold:#F5A623;
    --mint:#6FCF97;
    --sky:#4FA8D8;
    --lavender:#9B8AC4;
    --peach:#FFB199;
    --butter:#FFD166;
    --slate:#8894A0;
    --shadow: 0 6px 20px rgba(58,46,38,0.08);
    --shadow-lg: 0 12px 36px rgba(58,46,38,0.16);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Noto Sans KR',sans-serif;
    overflow-x:hidden;
    min-height:100vh;
    user-select:none;
  }
  .display{font-family:'Do Hyeon',sans-serif; letter-spacing:0.5px;}
  .hidden{display:none !important;}
  button{font-family:inherit; cursor:pointer; border:none; background:none;}
  input{font-family:inherit;}

  /* ---------- 공통 레이아웃 ---------- */
  .screen{min-height:100vh; display:flex; flex-direction:column; align-items:center;}
  .wrap{width:100%; max-width:900px; padding:24px 20px 60px;}

  /* ---------- 로그인 화면 ---------- */
  #loginView{justify-content:center;}
  .login-card{
    background:var(--paper);
    border-radius:28px;
    box-shadow:var(--shadow-lg);
    padding:40px 32px;
    width:100%;
    max-width:380px;
    text-align:center;
  }
  .login-logo{font-size:44px; margin-bottom:6px;}
  .login-title{font-family:'Do Hyeon',sans-serif; font-size:28px; color:var(--coral-dark); margin:0 0 4px;}
  .login-sub{color:var(--ink-soft); font-size:14px; margin:0 0 24px;}
  .num-display{
    background:var(--cream);
    border:2px solid var(--line);
    border-radius:16px;
    font-family:'Do Hyeon',sans-serif;
    font-size:34px;
    letter-spacing:6px;
    padding:16px 10px;
    margin-bottom:18px;
    color:var(--ink);
    min-height:60px;
  }
  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .key{
    background:var(--cream);
    border:1px solid var(--line);
    border-radius:14px;
    font-family:'Do Hyeon',sans-serif;
    font-size:24px;
    padding:16px 0;
    color:var(--ink);
    transition:transform .08s ease, background .15s ease;
  }
  .key:active{transform:scale(0.93); background:#FFEFDD;}
  .key.wide{grid-column:span 1;}
  .key.func{background:transparent; color:var(--ink-soft); font-size:16px; font-family:'Noto Sans KR',sans-serif;}
  .btn-primary{
    width:100%;
    margin-top:16px;
    background:var(--coral);
    color:#fff;
    font-family:'Do Hyeon',sans-serif;
    font-size:20px;
    padding:16px 0;
    border-radius:16px;
    box-shadow:0 6px 16px rgba(255,122,89,0.35);
    transition:transform .08s ease;
  }
  .btn-primary:active{transform:scale(0.97);}
  .btn-primary:disabled{opacity:0.4;}
  .login-error{color:var(--berry); font-size:13px; margin-top:14px; min-height:18px; white-space:pre-line; line-height:1.5;}

  /* ---------- 미션 화면 ---------- */
  #missionView{align-items:stretch;}
  .top-bar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 4px 8px;
  }
  .logout-link{font-size:13px; color:var(--ink-soft); text-decoration:underline; opacity:0.7;}
  .date-tag{font-size:13px; color:var(--ink-soft);}

  .hero{
    background:var(--paper);
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:24px;
    display:flex; align-items:center; gap:20px;
    margin-bottom:20px;
  }
  .greet{flex:1;}
  .greet-name{font-family:'Do Hyeon',sans-serif; font-size:26px; color:var(--ink); margin:0 0 4px;}
  .greet-sub{font-size:14px; color:var(--ink-soft); margin:0;}
  .progress-count{font-size:13px; color:var(--coral-dark); font-weight:700; margin-top:8px;}

  .ring-wrap{position:relative; width:96px; height:96px; flex-shrink:0;}
  .ring{width:96px; height:96px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background 0.4s ease;}
  .ring-inner{
    width:76px; height:76px; border-radius:50%; background:var(--paper);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .ring-pct{font-family:'Do Hyeon',sans-serif; font-size:20px; color:var(--ink);}
  .ring-mood{font-size:18px; margin-top:-2px;}
  .ring-wrap.pulse{animation:ringPulse 1.1s ease-in-out infinite;}
  @keyframes ringPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}

  .section-title{
    font-family:'Do Hyeon',sans-serif; font-size:18px; color:var(--ink);
    margin:6px 4px 12px; display:flex; align-items:center; gap:8px;
  }

  .mission-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:14px; margin-bottom:28px;
  }
  .mission-card{
    background:var(--paper);
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:16px 16px 14px;
    position:relative;
    overflow:hidden;
    border:2px solid transparent;
    transition:border-color .25s ease, background .25s ease;
  }
  .mission-card.mc-done{border-color:var(--leaf); background:#F3FBF6;}
  .cat-chip{
    display:inline-block; font-size:12px; font-weight:700; color:#fff;
    padding:4px 10px; border-radius:999px; margin-bottom:8px;
  }
  .mission-text{font-size:15px; font-weight:700; color:var(--ink); margin-bottom:12px; line-height:1.4; min-height:22px;}

  .stamp-btn{
    width:100%; padding:14px 0; border-radius:14px;
    background:var(--cream); border:2px dashed var(--line);
    font-family:'Do Hyeon',sans-serif; font-size:16px; color:var(--ink-soft);
    transition:all .15s ease;
  }
  .stamp-btn:active{transform:scale(0.96);}
  .mc-done .stamp-btn{
    background:var(--leaf); border:2px solid var(--leaf); color:#fff;
  }

  .hw-pills{display:flex; flex-wrap:wrap; gap:6px;}
  .hw-pill{
    padding:8px 12px; border-radius:999px; font-size:13px; font-weight:700;
    background:var(--cream); border:1.5px solid var(--line); color:var(--ink-soft);
    transition:all .15s ease;
  }
  .hw-pill.active{background:var(--coral); border-color:var(--coral); color:#fff;}
  .hw-pill:active{transform:scale(0.94);}

  .stamp-pop{
    position:absolute; top:50%; left:50%; font-size:54px;
    transform:translate(-50%,-50%) scale(0.4) rotate(-18deg);
    opacity:0; pointer-events:none;
    animation:stampAnim .55s cubic-bezier(.2,1.4,.4,1) forwards;
  }
  @keyframes stampAnim{
    0%{opacity:0; transform:translate(-50%,-50%) scale(0.3) rotate(-18deg);}
    55%{opacity:1; transform:translate(-50%,-50%) scale(1.15) rotate(6deg);}
    100%{opacity:0; transform:translate(-50%,-50%) scale(1) rotate(0deg);}
  }
  .spark{
    position:absolute; width:6px; height:6px; border-radius:50%;
    pointer-events:none; animation:sparkOut .6s ease-out forwards;
  }
  @keyframes sparkOut{
    0%{opacity:1; transform:translate(0,0) scale(1);}
    100%{opacity:0; transform:translate(var(--dx),var(--dy)) scale(0.3);}
  }

  .empty-note{
    background:var(--paper); border-radius:20px; padding:28px; text-align:center;
    color:var(--ink-soft); box-shadow:var(--shadow); margin-bottom:24px;
  }

  /* ---------- 독서 기록 ---------- */
  .book-add-btn{
    width:100%; padding:18px; border-radius:20px;
    background:linear-gradient(135deg,var(--coral),var(--coral-dark));
    color:#fff; font-family:'Do Hyeon',sans-serif; font-size:17px;
    box-shadow:0 8px 20px rgba(255,122,89,0.3);
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-bottom:16px; transition:transform .1s ease;
  }
  .book-add-btn:active{transform:scale(0.97);}

  .book-list{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px;}
  .book-chip{
    background:var(--paper); border-radius:16px; box-shadow:var(--shadow);
    padding:14px; position:relative;
  }
  .book-chip .bc-del{
    position:absolute; top:8px; right:8px; width:22px; height:22px; border-radius:50%;
    background:var(--cream); color:var(--ink-soft); font-size:13px; line-height:22px; text-align:center;
  }
  .bc-title{font-weight:700; font-size:14px; margin:0 26px 4px 0; line-height:1.35;}
  .bc-level{font-size:11px; color:var(--ink-soft); margin-bottom:6px;}
  .bc-stars{color:var(--gold); font-size:15px; letter-spacing:1px;}

  /* ---------- 모달 공통 ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(58,46,38,0.42);
    display:flex; align-items:flex-end; justify-content:center; z-index:100;
  }
  @media (min-width:640px){ .modal-overlay{align-items:center;} }
  .modal-sheet{
    background:var(--paper); width:100%; max-width:400px;
    border-radius:26px 26px 0 0; padding:26px 24px 30px;
    box-shadow:0 -8px 30px rgba(0,0,0,0.15);
  }
  @media (min-width:640px){ .modal-sheet{border-radius:26px;} }
  .modal-title{font-family:'Do Hyeon',sans-serif; font-size:19px; margin:0 0 4px; text-align:center;}
  .modal-sub{font-size:13px; color:var(--ink-soft); text-align:center; margin:0 0 18px;}
  .ne-display{
    background:var(--cream); border:2px solid var(--line); border-radius:14px;
    font-family:'Do Hyeon',sans-serif; font-size:30px; letter-spacing:4px;
    text-align:center; padding:14px; margin-bottom:16px; min-height:52px;
  }
  .modal-actions{display:flex; gap:10px; margin-top:16px;}
  .btn-secondary{
    flex:1; padding:14px 0; border-radius:14px; background:var(--cream);
    color:var(--ink-soft); font-family:'Do Hyeon',sans-serif; font-size:16px;
  }
  .btn-confirm{
    flex:2; padding:14px 0; border-radius:14px; background:var(--coral);
    color:#fff; font-family:'Do Hyeon',sans-serif; font-size:16px;
  }

  .star-row{display:flex; justify-content:center; gap:10px; margin:18px 0 6px;}
  .star-pick{font-size:38px; color:var(--line); transition:transform .1s ease, color .15s ease;}
  .star-pick.on{color:var(--gold); transform:scale(1.1);}
  .book-preview{background:var(--cream); border-radius:14px; padding:14px; text-align:center; margin-bottom:6px;}
  .bp-title{font-weight:700; font-size:15px;}
  .bp-level{font-size:12px; color:var(--ink-soft); margin-top:2px;}

  /* ---------- 토스트 ---------- */
  #toast{
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:12px 20px; border-radius:14px;
    font-size:14px; opacity:0; pointer-events:none; transition:all .25s ease; z-index:200;
    max-width:88vw; text-align:center;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- 로딩 ---------- */
  #loadingOverlay{
    position:fixed; inset:0; background:rgba(255,248,236,0.85);
    display:flex; align-items:center; justify-content:center; z-index:300;
    font-family:'Do Hyeon',sans-serif; font-size:16px; color:var(--ink-soft);
  }

  /* ---------- 컨페티 ---------- */
  .confetti-piece{position:fixed; top:-20px; z-index:400; pointer-events:none; border-radius:2px;}
</style>
</head>
<body>

<!-- ============ 로그인 화면 ============ -->
<div id="loginView" class="screen">
  <div class="wrap" style="display:flex; justify-content:center;">
    <div class="login-card">
      <div class="login-logo">🎯</div>
      <h1 class="login-title">오늘의 미션</h1>
      <p class="login-sub">학번(고유번호)을 입력하고 시작해요</p>
      <div class="num-display" id="loginDisplay">&nbsp;</div>
      <div class="keypad" id="loginKeypad"></div>
      <button class="btn-primary" id="loginConfirmBtn">시작하기</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<!-- ============ 미션 화면 ============ -->
<div id="missionView" class="screen hidden">
  <div class="wrap">
    <div class="top-bar">
      <button class="logout-link" id="logoutBtn">다른 친구가 사용할래요</button>
      <span class="date-tag" id="dateTag"></span>
    </div>

    <div class="hero">
      <div class="greet">
        <p class="greet-name" id="greetName">-</p>
        <p class="greet-sub">오늘의 미션을 하나씩 완료해봐요!</p>
        <p class="progress-count" id="progressCount">0 / 0 완료</p>
      </div>
      <div class="ring-wrap" id="ringWrap">
        <div class="ring" id="ringEl">
          <div class="ring-inner">
            <span class="ring-pct" id="ringPct">0%</span>
            <span class="ring-mood" id="ringMood">😐</span>
          </div>
        </div>
      </div>
    </div>

    <div class="section-title">✅ 오늘의 미션</div>
    <div class="mission-grid" id="missionGrid"></div>
    <div class="empty-note hidden" id="emptyMissions">오늘은 예정된 미션이 없어요! 😊</div>

    <div class="section-title">📚 오늘 읽은 책</div>
    <button class="book-add-btn" id="addBookBtn"><span>➕</span><span>읽은 책 기록하기</span></button>
    <div class="book-list" id="bookList"></div>
  </div>
</div>

<!-- ============ 숫자 입력 모달 (로그인 외 공용: 책번호/점수) ============ -->
<div id="numEntryModal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <p class="modal-title" id="neTitle">입력</p>
    <p class="modal-sub" id="neSub"></p>
    <div class="ne-display" id="neDisplay">−</div>
    <div class="keypad" id="neKeypad"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="neCancelBtn">취소</button>
      <button class="btn-confirm" id="neConfirmBtn">확인</button>
    </div>
  </div>
</div>

<!-- ============ 별점 모달 ============ -->
<div id="starModal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <p class="modal-title">이 책 어땠어요?</p>
    <div class="book-preview">
      <div class="bp-title" id="bpTitle">-</div>
      <div class="bp-level" id="bpLevel"></div>
    </div>
    <div class="star-row" id="starRow"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="starCancelBtn">취소</button>
      <button class="btn-confirm" id="starConfirmBtn">기록하기</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="loadingOverlay" class="hidden"><span id="loadingText">불러오는 중...</span></div>

<script>
/* ============================================================
   설정 & 공통 유틸
   ============================================================ */
var FIREBASE = 'https://hakwoncheck-default-rtdb.firebaseio.com';

function fbGet(path){
  return fetch(FIREBASE + '/' + path + '.json')
    .then(function(r){ return r.json(); })
    .catch(function(){ return null; });
}
function fbPut(path, data){
  return fetch(FIREBASE + '/' + path + '.json', {
    method:'PUT',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify(data)
  }).catch(function(){ return null; });
}

function $(sel){ return document.querySelector(sel); }
function show(sel){ $(sel).classList.remove('hidden'); }
function hide(sel){ $(sel).classList.add('hidden'); }
function showView(name){
  if (name === 'login'){ show('#loginView'); hide('#missionView'); }
  else { hide('#loginView'); show('#missionView'); }
}
function showLoading(msg){ $('#loadingText').textContent = msg || '불러오는 중...'; show('#loadingOverlay'); }
function hideLoading(){ hide('#loadingOverlay'); }

var toastTimer = null;
function toast(msg){
  var t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function pad2(n){ return String(n).padStart(2,'0'); }

/* ============================================================
   카테고리 메타 (설계문서 §3-1 6개 학습영역 + 숙제)
   ============================================================ */
var CAT_META = {
  reading:   { label:'Reading',                color:'#6FCF97' },
  listening: { label:'Listening & Speaking',    color:'#4FA8D8' },
  writing:   { label:'Writing',                 color:'#9B8AC4' },
  grammar:   { label:'Grammar',                 color:'#FFB199' },
  phonics:   { label:'Phonics',                 color:'#FFD166' },
  words:     { label:'Words',                   color:'#8894A0' },
  homework:  { label:'숙제(Homework)',           color:'#FF7A59' }
};

var HW_STATES = [
  { v:'done',          label:'완료' },
  { v:'none',           label:'없음' },
  { v:'doneAtAcademy', label:'학원에서완료' },
  { v:'incomplete',    label:'미완료' },
  { v:'notBrought',    label:'미지참' }
];
var HW_SUCCESS = { done:true, none:true, doneAtAcademy:true };

function isMissionComplete(m){
  if (m.category === 'homework'){
    return m.status === 'done' || m.status === 'none' || m.status === 'doneAtAcademy';
  }
  return !!m.done;
}

/* ============================================================
   상태
   ============================================================ */
var state = {
  student: null,
  sessionId: null,
  session: null,
  confettiFired: false
};

/* ============================================================
   범용 숫자 키패드 렌더
   ============================================================ */
function buildKeypad(container, onDigit, onBackspace){
  var layout = ['1','2','3','4','5','6','7','8','9','⌫','0',''];
  container.innerHTML = '';
  layout.forEach(function(k){
    var btn = document.createElement('button');
    if (k === ''){ btn.style.visibility='hidden'; btn.className='key'; container.appendChild(btn); return; }
    btn.className = 'key' + (k === '⌫' ? ' func' : '');
    btn.textContent = k;
    btn.addEventListener('click', function(){
      if (k === '⌫') onBackspace(); else onDigit(k);
    });
    container.appendChild(btn);
  });
}

/* ============================================================
   로그인 화면
   ============================================================ */
var loginVal = '';
function updateLoginDisplay(){
  $('#loginDisplay').textContent = loginVal || '\u00A0';
  $('#loginConfirmBtn').disabled = loginVal.length === 0;
}
buildKeypad($('#loginKeypad'), function(d){
  if (loginVal.length < 6){ loginVal += d; updateLoginDisplay(); }
}, function(){
  loginVal = loginVal.slice(0,-1); updateLoginDisplay();
});
updateLoginDisplay();

$('#loginConfirmBtn').addEventListener('click', function(){
  if (!loginVal) return;
  $('#loginError').textContent = '';
  attemptLogin(loginVal);
});

function loginError(msg){
  hideLoading();
  $('#loginError').textContent = msg;
}

function attemptLogin(numStr){
  showLoading('확인 중...');
  fbGet('roster').then(function(roster){
    if (!roster){ loginError('학생 명단을 불러올 수 없어요. 선생님께 알려주세요.'); return; }
    var list = Array.isArray(roster) ? roster : Object.keys(roster).map(function(k){ return roster[k]; });
    var n = parseInt(numStr, 10);
    var stu = null;
    for (var i = 0; i < list.length; i++){
      if (list[i] && parseInt(list[i].number, 10) === n){ stu = list[i]; break; }
    }
    if (!stu){ loginError('등록되지 않은 번호예요. 다시 확인해 주세요.'); return; }

    fbGet('sessions/' + stu.id).then(function(session){
      if (!session){
        loginError(stu.name + ' 학생은 아직 출석 체크인이 안 됐어요.\n패드에서 먼저 출석을 확인해 주세요.');
        return;
      }
      var d = new Date(session.startTime);
      var today = new Date();
      var sameDay = d.getFullYear() === today.getFullYear() &&
                    d.getMonth() === today.getMonth() &&
                    d.getDate() === today.getDate();
      if (!sameDay){
        loginError('오늘 출석 기록을 찾을 수 없어요. 선생님께 알려주세요.');
        return;
      }
      state.student = stu;
      state.sessionId = stu.id;
      state.session = session;
      state.session.missions = state.session.missions || [];
      state.session.books = state.session.books || [];
      state.confettiFired = false;
      hideLoading();
      loginVal = '';
      updateLoginDisplay();
      $('#loginError').textContent = '';
      enterMissionView();
    }).catch(function(){ loginError('연결에 문제가 있어요. 다시 시도해 주세요.'); });
  }).catch(function(){ loginError('연결에 문제가 있어요. 다시 시도해 주세요.'); });
}

/* ============================================================
   미션 화면 진입 / 렌더
   ============================================================ */
function enterMissionView(){
  showView('mission');
  $('#greetName').textContent = state.student.name + ' 학생 안녕!';
  var now = new Date();
  var wd = ['일','월','화','수','목','금','토'][now.getDay()];
  $('#dateTag').textContent = (now.getMonth()+1) + '월 ' + now.getDate() + '일 (' + wd + ')';
  renderMissions();
  renderBooks();
  renderProgress();
}

function renderMissions(){
  var grid = $('#missionGrid');
  var missions = state.session.missions;
  grid.innerHTML = '';
  if (!missions.length){
    show('#emptyMissions');
    return;
  }
  hide('#emptyMissions');

  missions.forEach(function(m, idx){
    var meta = CAT_META[m.category] || { label: m.parentLabel || m.category, color:'#B7A99A' };
    var done = isMissionComplete(m);
    var card = document.createElement('div');
    card.className = 'mission-card' + (done ? ' mc-done' : '');
    card.setAttribute('data-idx', idx);

    var chip = '<span class="cat-chip" style="background:' + meta.color + '">' + (m.parentLabel || meta.label) + '</span>';
    var text = '<div class="mission-text">' + escapeHtml(m.text) + '</div>';
    var body = '';

    if (m.category === 'homework'){
      body = '<div class="hw-pills">' + HW_STATES.map(function(s){
        var active = m.status === s.v ? ' active' : '';
        return '<button class="hw-pill' + active + '" data-hw="' + s.v + '">' + s.label + '</button>';
      }).join('') + '</div>';
    } else if (m.type === 'listening' || m.type === 'vocabulary'){
      var scoreLabel = done ? (m.score + ' / ' + m.scoreMax + '점 ✓') : ('점수 입력하기 (만점 ' + m.scoreMax + '점)');
      body = '<button class="stamp-btn" data-action="score">' + scoreLabel + '</button>';
    } else {
      body = '<button class="stamp-btn" data-action="check">' + (done ? '완료! 참 잘했어요 🎉' : '탭해서 완료하기') + '</button>';
    }

    card.innerHTML = chip + text + body;
    grid.appendChild(card);

    // 이벤트 바인딩
    if (m.category === 'homework'){
      var pills = card.querySelectorAll('.hw-pill');
      pills.forEach(function(p){
        p.addEventListener('click', function(){
          setHomeworkStatus(idx, p.getAttribute('data-hw'));
        });
      });
    } else if (m.type === 'listening' || m.type === 'vocabulary'){
      card.querySelector('[data-action="score"]').addEventListener('click', function(){
        openScoreEntry(idx);
      });
    } else {
      card.querySelector('[data-action="check"]').addEventListener('click', function(){
        toggleCheckMission(idx, card);
      });
    }
  });
}

function escapeHtml(s){
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function saveMission(idx, m){
  fbPut('sessions/' + state.sessionId + '/missions/' + idx, m);
}

function toggleCheckMission(idx, cardEl){
  var m = state.session.missions[idx];
  m.done = !m.done;
  saveMission(idx, m);
  renderMissions();
  if (m.done){
    stampBurst(idx);
    checkAllDone();
  } else {
    renderProgress();
  }
}

function setHomeworkStatus(idx, val){
  var m = state.session.missions[idx];
  var wasDone = isMissionComplete(m);
  m.status = val;
  m.done = !!HW_SUCCESS[val];
  saveMission(idx, m);
  renderMissions();
  if (!wasDone && isMissionComplete(m)){
    stampBurst(idx);
  }
  checkAllDone();
}

function openScoreEntry(idx){
  var m = state.session.missions[idx];
  var maxLen = String(m.scoreMax || 100).length;
  openNumberEntry(m.text, maxLen, '만점 ' + m.scoreMax + '점 중 몇 점?', function(val){
    var score = parseInt(val, 10);
    if (isNaN(score)) return;
    if (score > m.scoreMax) score = m.scoreMax;
    if (score < 0) score = 0;
    m.score = score;
    m.done = true;
    saveMission(idx, m);
    renderMissions();
    stampBurst(idx);
    checkAllDone();
  });
}

/* ---------- 스탬프(완료) 마이크로 애니메이션 ---------- */
var STAMP_EMOJI = ['✅','🌟','💯','👍','🎉'];
function stampBurst(idx){
  var card = document.querySelector('.mission-card[data-idx="' + idx + '"]');
  if (!card) return;
  var stamp = document.createElement('div');
  stamp.className = 'stamp-pop';
  stamp.textContent = STAMP_EMOJI[Math.floor(Math.random()*STAMP_EMOJI.length)];
  card.appendChild(stamp);
  for (var i=0;i<8;i++){
    var s = document.createElement('span');
    s.className = 'spark';
    var angle = Math.random()*Math.PI*2;
    var dist = 30 + Math.random()*30;
    s.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
    s.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
    s.style.left = '50%'; s.style.top = '50%';
    s.style.background = ['#FF7A59','#FFC93C','#2FAE76','#4FA8D8','#F5A623'][i%5];
    card.appendChild(s);
    (function(el){ setTimeout(function(){ el.remove(); }, 650); })(s);
  }
  setTimeout(function(){ stamp.remove(); }, 600);
}

/* ---------- 진행률 링 ---------- */
function computeProgress(){
  var missions = state.session.missions;
  if (!missions.length) return 100;
  var done = 0;
  missions.forEach(function(m){ if (isMissionComplete(m)) done++; });
  return Math.round(done/missions.length*100);
}
function renderProgress(){
  var missions = state.session.missions;
  var doneCount = missions.filter(isMissionComplete).length;
  var pct = computeProgress();
  $('#progressCount').textContent = doneCount + ' / ' + missions.length + ' 완료';
  $('#ringPct').textContent = pct + '%';

  var color = pct >= 100 ? 'var(--leaf)' : (pct >= 75 ? 'var(--sun)' : 'var(--berry)');
  $('#ringEl').style.background = 'conic-gradient(' + color + ' ' + (pct*3.6) + 'deg, #F0E4D0 0deg)';

  var mood = '😐';
  if (pct >= 100) mood = '🎉';
  else if (pct >= 75) mood = '😎';
  else if (pct >= 40) mood = '🙂';
  $('#ringMood').textContent = mood;

  var ringWrap = $('#ringWrap');
  if (pct >= 100) ringWrap.classList.add('pulse'); else ringWrap.classList.remove('pulse');
}
function checkAllDone(){
  renderProgress();
  var pct = computeProgress();
  if (pct === 100 && !state.confettiFired){
    state.confettiFired = true;
    fireConfetti();
    toast('오늘 미션을 모두 완료했어요! 최고예요 🎉');
  } else if (pct < 100){
    state.confettiFired = false;
  }
}

/* ---------- 컨페티 ---------- */
function fireConfetti(){
  var colors = ['#FF7A59','#FFC93C','#2FAE76','#4FA8D8','#F5A623','#9B8AC4'];
  for (var i=0;i<70;i++){
    (function(){
      var p = document.createElement('div');
      p.className = 'confetti-piece';
      var size = 6 + Math.random()*6;
      p.style.width = size + 'px';
      p.style.height = (size*0.4) + 'px';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.left = (Math.random()*100) + 'vw';
      var duration = 1.8 + Math.random()*1.4;
      var rotate = Math.random()*720 - 360;
      p.style.transition = 'transform ' + duration + 's cubic-bezier(.2,.6,.4,1), opacity ' + duration + 's ease';
      document.body.appendChild(p);
      requestAnimationFrame(function(){
        p.style.transform = 'translateY(' + (window.innerHeight+40) + 'px) rotate(' + rotate + 'deg)';
        p.style.opacity = '0.15';
      });
      setTimeout(function(){ p.remove(); }, duration*1000 + 100);
    })();
  }
}

/* ============================================================
   범용 숫자 입력 모달 (점수 입력 / 책번호 입력 공용)
   ============================================================ */
var numEntry = { value:'', maxLen:4, onConfirm:null };
function openNumberEntry(title, maxLen, subtitle, onConfirm){
  numEntry.value = '';
  numEntry.maxLen = maxLen;
  numEntry.onConfirm = onConfirm;
  $('#neTitle').textContent = title;
  $('#neSub').textContent = subtitle || '';
  updateNeDisplay();
  buildKeypad($('#neKeypad'), function(d){
    if (numEntry.value.length < numEntry.maxLen){ numEntry.value += d; updateNeDisplay(); }
  }, function(){
    numEntry.value = numEntry.value.slice(0,-1); updateNeDisplay();
  });
  show('#numEntryModal');
}
function updateNeDisplay(){ $('#neDisplay').textContent = numEntry.value || '−'; }
$('#neCancelBtn').addEventListener('click', function(){ hide('#numEntryModal'); });
$('#neConfirmBtn').addEventListener('click', function(){
  if (!numEntry.value){ toast('숫자를 입력해 주세요.'); return; }
  var v = numEntry.value;
  hide('#numEntryModal');
  if (numEntry.onConfirm) numEntry.onConfirm(v);
});

/* ============================================================
   독서 기록
   ============================================================ */
function renderBooks(){
  var list = $('#bookList');
  var books = state.session.books;
  list.innerHTML = '';
  books.forEach(function(b, i){
    var chip = document.createElement('div');
    chip.className = 'book-chip';
    var stars = '★★★★★'.slice(0, b.rating) + '☆☆☆☆☆'.slice(0, 5-b.rating);
    chip.innerHTML =
      '<button class="bc-del" data-i="' + i + '">✕</button>' +
      '<div class="bc-title">' + escapeHtml(b.title) + '</div>' +
      '<div class="bc-level">번호 ' + b.number + (b.level ? ' · 레벨 ' + escapeHtml(b.level) : '') + '</div>' +
      '<div class="bc-stars">' + stars + '</div>';
    list.appendChild(chip);
    chip.querySelector('.bc-del').addEventListener('click', function(){ removeBook(i); });
  });
}

$('#addBookBtn').addEventListener('click', function(){
  openNumberEntry('읽은 책 번호를 입력하세요', 4, '독서관리시스템에 등록된 원서 고유번호', function(val){
    lookupBook(val);
  });
});

function lookupBook(numStr){
  showLoading('책 정보를 찾는 중...');
  fbGet('booklibrary/' + numStr).then(function(book){
    hideLoading();
    if (!book || !book.title){
      toast('등록되지 않은 책 번호예요. 다시 확인해 주세요.');
      return;
    }
    openStarPicker(numStr, book);
  }).catch(function(){ hideLoading(); toast('연결에 문제가 있어요. 다시 시도해 주세요.'); });
}

var pendingBook = null;
function openStarPicker(numStr, book){
  pendingBook = {
    number: parseInt(numStr, 10),
    title: book.title,
    level: book.level || '',
    wordCount: book.wordCount || 0,
    rating: 0
  };
  $('#bpTitle').textContent = book.title;
  $('#bpLevel').textContent = book.level ? ('레벨 ' + book.level) : '';
  renderStarPicker();
  show('#starModal');
}
function renderStarPicker(){
  var row = $('#starRow');
  row.innerHTML = '';
  for (var i=1;i<=5;i++){
    (function(n){
      var s = document.createElement('span');
      s.className = 'star-pick' + (pendingBook.rating >= n ? ' on' : '');
      s.textContent = '★';
      s.addEventListener('click', function(){ pendingBook.rating = n; renderStarPicker(); });
      row.appendChild(s);
    })(i);
  }
}
$('#starCancelBtn').addEventListener('click', function(){ hide('#starModal'); pendingBook = null; });
$('#starConfirmBtn').addEventListener('click', function(){
  if (!pendingBook || !pendingBook.rating){ toast('별점을 선택해 주세요.'); return; }
  state.session.books.push(pendingBook);
  fbPut('sessions/' + state.sessionId + '/books', state.session.books);
  renderBooks();
  hide('#starModal');
  toast('책 기록 완료! 📖 잘 읽었어요');
  pendingBook = null;
});

function removeBook(i){
  state.session.books.splice(i, 1);
  fbPut('sessions/' + state.sessionId + '/books', state.session.books);
  renderBooks();
}

/* ============================================================
   로그아웃
   ============================================================ */
$('#logoutBtn').addEventListener('click', function(){
  state.student = null;
  state.sessionId = null;
  state.session = null;
  state.confettiFired = false;
  loginVal = '';
  updateLoginDisplay();
  showView('login');
});

</script>
