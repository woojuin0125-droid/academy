<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>먼슬리 리포트 · Hello English Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F8FF;
    --card:#FFFFFF;
    --ink:#1F2937;
    --sub:#6B7686;
    --line:#E7ECF6;
    --primary:#2FAE76;
    --primary-ink:#0F6B45;
    --primary-soft:#E4F7EE;
    --gold:#F5A623;
    --gold-soft:#FFF3DD;
    --violet:#6C63FF;
    --violet-soft:#EEEDFF;
    --danger:#EF5A5A;
    --danger-soft:#FDECEC;
    --radius:18px;
    --shadow:0 8px 24px rgba(31,41,55,.06), 0 2px 6px rgba(31,41,55,.04);
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:'Noto Sans KR',sans-serif; -webkit-font-smoothing:antialiased;}
  .num,.mono{font-family:'Space Grotesk',sans-serif;}

  /* ---------- PIN 게이트 (기존 모듈과 동일 패턴) ---------- */
  #pinGate{position:fixed; inset:0; z-index:999; background:linear-gradient(160deg,#2FAE76 0%,#1F8F5D 100%); display:flex; align-items:center; justify-content:center;}
  .pinCard{background:var(--card); border-radius:24px; padding:40px 36px; width:320px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.25);}
  .pinCard .badge{width:56px;height:56px;border-radius:16px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px;}
  .pinCard h1{font-size:18px;margin:0 0 4px;}
  .pinCard p{font-size:13px;color:var(--sub);margin:0 0 20px;}
  #pinDots{display:flex;gap:10px;justify-content:center;margin-bottom:18px;}
  .pinDot{width:14px;height:14px;border-radius:50%;border:2px solid var(--line);}
  .pinDot.filled{background:var(--primary);border-color:var(--primary);}
  #pinInput{position:absolute; opacity:0; pointer-events:none;}
  .pinErr{color:var(--danger);font-size:12px;height:16px;margin-bottom:4px;}

  #app{display:none;}
  header.top{background:var(--card); border-bottom:1px solid var(--line); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; position:sticky; top:0; z-index:20;}
  header.top .brand{display:flex;align-items:center;gap:10px;}
  header.top .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--primary);}
  header.top h2{font-size:16px;margin:0;font-weight:700;}
  header.top .sub{font-size:12px;color:var(--sub);}
  header.top .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  header.top input[type=month]{border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-family:inherit; font-size:13px;}

  .btn{border:none; border-radius:12px; padding:10px 16px; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; transition:.15s transform;}
  .btn:active{transform:scale(.97);}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .btn-primary{background:var(--primary); color:#fff;}
  .btn-soft{background:var(--primary-soft); color:var(--primary-ink);}
  .btn-ghost{background:transparent; color:var(--sub); border:1px solid var(--line);}
  .btn-danger{background:var(--danger-soft); color:var(--danger);}
  .btn-gold{background:var(--gold-soft); color:#a5720c;}
  .btn-sm{padding:6px 12px; font-size:12px; border-radius:9px;}

  main{display:grid; grid-template-columns:300px 1fr; gap:20px; padding:20px 28px; max-width:1300px; margin:0 auto;}
  @media (max-width:900px){ main{grid-template-columns:1fr;} }

  .panel{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px;}
  .panel h3{margin:0 0 12px; font-size:14px; color:var(--sub);}

  /* ---------- 좌측 학생 리스트 ---------- */
  .stuRow{display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:12px; cursor:pointer; margin-bottom:4px;}
  .stuRow:hover{background:var(--bg);}
  .stuRow.active{background:var(--primary-soft);}
  .stuRow .nm{font-weight:700; font-size:13.5px;}
  .stuRow .no{font-size:11px; color:var(--sub);}
  .statusChip{font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px;}
  .statusChip.none{background:var(--bg); color:var(--sub);}
  .statusChip.draft{background:var(--gold-soft); color:#a5720c;}
  .statusChip.confirmed{background:var(--primary-soft); color:var(--primary-ink);}

  /* ---------- 우측 에디터 ---------- */
  .emptyState{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; color:var(--sub); text-align:center;}
  .emptyState .big{font-size:40px; margin-bottom:10px;}

  .editorHead{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .editorHead h2{margin:0; font-size:18px;}
  .editorHead .actions{display:flex; gap:8px; flex-wrap:wrap;}

  .warnBox{background:var(--danger-soft); color:var(--danger); font-size:12.5px; padding:10px 14px; border-radius:12px; margin-bottom:14px;}
  .lockBox{background:var(--primary-soft); color:var(--primary-ink); font-size:12.5px; padding:10px 14px; border-radius:12px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; gap:10px;}

  .sectionTitle{font-size:12.5px; font-weight:700; color:var(--sub); margin:22px 0 10px; text-transform:uppercase; letter-spacing:.02em;}
  .sectionTitle:first-child{margin-top:0;}

  /* 레이더 + 도메인 점수 */
  .radarWrap{display:grid; grid-template-columns:280px 1fr; gap:20px; align-items:center;}
  @media (max-width:700px){ .radarWrap{grid-template-columns:1fr;} }
  .domainGrid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .domainCard{border:1px solid var(--line); border-radius:12px; padding:10px 12px;}
  .domainCard .dLabel{font-size:11.5px; color:var(--sub); margin-bottom:4px;}
  .domainCard .dRow{display:flex; align-items:center; gap:8px;}
  .domainCard input[type=number]{width:64px; border:1px solid var(--line); border-radius:8px; padding:5px 7px; font-family:inherit; font-size:13px;}
  .domainCard .dRaw{font-size:10.5px; color:var(--sub);}
  .domainCard .dNoData{color:var(--sub); font-size:12px;}

  .hwRow{border:1px solid var(--violet-soft); background:var(--violet-soft); border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .hwRow .lbl{font-weight:700; color:var(--violet); font-size:13.5px;}
  .hwRow input[type=number]{width:60px; border:1px solid var(--line); border-radius:8px; padding:5px 7px; font-family:inherit; font-size:13.5px; font-weight:700; color:var(--violet); text-align:center;}

  /* 코멘트 */
  .commentBox{margin-bottom:14px;}
  .commentBox label{display:block; font-size:12.5px; font-weight:700; color:var(--ink); margin-bottom:6px;}
  .commentBox textarea{width:100%; min-height:90px; border:1px solid var(--line); border-radius:12px; padding:10px 12px; font-family:inherit; font-size:13px; line-height:1.6; resize:vertical;}
  .commentBox .regen{font-size:11px; color:var(--primary-ink); cursor:pointer; margin-top:4px; display:inline-block;}

  /* 독서 리스트 */
  table.readTbl{width:100%; border-collapse:collapse; font-size:13px;}
  table.readTbl th{text-align:left; font-size:11px; color:var(--sub); padding:6px 8px; border-bottom:1px solid var(--line);}
  table.readTbl td{padding:8px; border-bottom:1px solid var(--line); vertical-align:middle;}
  .lvChip{font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:20px; color:#fff;}
  select.tagSelect{border:1px solid var(--line); border-radius:8px; padding:5px 7px; font-family:inherit; font-size:12px;}
  select.tagSelect.needsPick{border-color:var(--danger); background:var(--danger-soft);}
  .noBooks{color:var(--sub); font-size:13px; padding:10px 0;}

  /* 레벨 바 */
  .levelBarOuter{height:22px; border-radius:11px; overflow:hidden; display:flex; position:relative; margin:14px 0 8px;}
  .levelBarOuter .seg{flex:1;}
  .levelMarker{position:absolute; top:-8px; width:2px; height:38px; background:var(--ink);}
  .levelMarker .tip{position:absolute; top:-20px; left:50%; transform:translateX(-50%); font-size:11px; font-weight:700; white-space:nowrap;}
  .levelLegend{display:flex; justify-content:space-between; font-size:9.5px; color:var(--sub);}

  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; opacity:0; pointer-events:none; transition:.25s; z-index:999;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .progressNote{font-size:12px; color:var(--sub); margin-top:8px;}

  /* ---------- 로고 설정 ---------- */
  .logoBtn{display:flex; align-items:center; gap:8px;}
  .logoPreview{height:28px; max-width:90px; object-fit:contain; border-radius:6px; background:#fff; border:1px solid var(--line); padding:2px;}

  /* ---------- 인쇄 미리보기 (A4) ---------- */
  #printOverlay{display:none; position:fixed; inset:0; z-index:900; background:#5a5f6b; overflow:auto; padding:30px 0;}
  #printOverlay.show{display:block;}
  .printToolbar{position:sticky; top:0; z-index:2; display:flex; justify-content:center; gap:10px; padding:10px; background:#5a5f6b;}
  .printPage{
    width:210mm; min-height:297mm; margin:0 auto 24px; background:#fff;
    box-shadow:0 10px 30px rgba(0,0,0,.35); padding:16mm 14mm;
    font-family:'Noto Sans KR',sans-serif; color:var(--ink); box-sizing:border-box;
  }
  .printPage .plogo{max-height:20mm; max-width:60mm; object-fit:contain; margin-bottom:6mm;}
  .printPage .ptitle{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:25px; color:var(--primary); margin:0 0 1.5mm; letter-spacing:.01em; text-align:left;}
  .printPage .psubtitle{font-weight:300; font-size:12.5px; color:#2A2E36; margin:0 0 1.5mm; text-align:right;}
  .printPage .pmonth{font-size:11px; color:var(--sub); margin-bottom:8mm; font-family:'Space Grotesk',sans-serif; text-align:right;}
  .printPage .pbookCount{font-size:12px; color:var(--ink); margin-bottom:6mm; font-weight:700;}
  .printPage .psection{margin-bottom:8mm;}
  .printPage .pchartsRow{display:flex; align-items:center; justify-content:center; gap:14mm; margin-bottom:4mm; flex-wrap:wrap;}
  .printPage .phw{font-size:13.5px; line-height:1.7; background:var(--violet-soft); color:var(--primary-ink); border-radius:10px; padding:4mm 5mm;}
  .printPage .pcomment{font-size:12.5px; line-height:1.8; white-space:pre-wrap;}
  .printPage table.preadTbl{width:100%; border-collapse:collapse; font-size:12px;}
  .printPage table.preadTbl th{text-align:left; font-size:10.5px; color:var(--sub); border-bottom:1px solid var(--line); padding:5px 6px;}
  .printPage table.preadTbl td{padding:6px; border-bottom:1px solid #F0F2F8;}
  .printPage .plvChip{font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; color:#fff;}
  .printPage .ptagChip{font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; background:var(--gold-soft); color:#a5720c;}
  .printPage .plevelBarOuter{height:16px; border-radius:8px; overflow:hidden; display:flex; position:relative; margin:12mm 0 6mm;}
  .printPage .plevelBarOuter .seg{flex:1;}
  .printPage .plevelMarker{position:absolute; top:-6px; width:2px; height:28px; background:var(--ink);}
  .printPage .plevelMarker .ptip{position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:10.5px; font-weight:700; white-space:nowrap;}
  .printPage .plevelLegend{display:flex; justify-content:space-between; font-size:8.5px; color:var(--sub);}

  @media print{
    #pinGate, #app, .toast{ display:none !important; }
    #printOverlay{ position:static !important; inset:auto; padding:0; background:#fff; }
    .printToolbar{ display:none; }
    .printPage{ box-shadow:none; margin:0; page-break-after:always; }
    .printPage:last-child{ page-break-after:auto; }
    @page{ size:A4; margin:0; }
  }
</style>
</head>
<body>

<!-- ============ PIN 게이트 ============ -->
<div id="pinGate">
  <div class="pinCard">
    <div class="badge">🔒</div>
    <h1>관리자 인증</h1>
    <p>PIN 4자리를 입력하세요</p>
    <div id="pinDots">
      <div class="pinDot"></div><div class="pinDot"></div><div class="pinDot"></div><div class="pinDot"></div>
    </div>
    <div class="pinErr" id="pinErr"></div>
    <input type="tel" id="pinInput" maxlength="4" autofocus>
    <button class="btn btn-primary" style="width:100%" onclick="document.getElementById('pinInput').focus()">입력하기</button>
  </div>
</div>

<!-- ============ 메인 앱 ============ -->
<div id="app">
  <header class="top">
    <div class="brand">
      <div class="dot"></div>
      <div>
        <h2>먼슬리 리포트</h2>
        <div class="sub">계산엔진 · 초안 생성 · 검토/수정 · 인쇄(PDF) (2단계) · build 2026-07-04-i (Reading Path + 권수 표시)</div>
      </div>
    </div>
    <div class="toolbar">
      <div class="logoBtn">
        <img id="logoPreviewImg" class="logoPreview" style="display:none;">
        <button class="btn btn-ghost btn-sm" id="logoBtn">학원 로고 설정</button>
        <input type="file" id="logoFileInput" accept="image/jpeg,image/jpg" style="display:none;">
      </div>
      <input type="month" id="monthPicker">
      <button class="btn btn-primary" id="bulkGenBtn">이번 달 전체 초안 생성</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <h3>학생 목록</h3>
      <div id="studentList"></div>
      <div class="progressNote" id="bulkProgress"></div>
    </section>

    <section class="panel" id="editorPanel">
      <div class="emptyState" id="emptyState">
        <div class="big">📄</div>
        <div>왼쪽에서 학생을 선택하세요.<br>리포트가 없으면 자동으로 계산해서 보여드립니다.</div>
      </div>
      <div id="editorForm" style="display:none;"></div>
    </section>
  </main>
</div>

<!-- ============ 인쇄 미리보기 (A4) ============ -->
<div id="printOverlay">
  <div class="printToolbar">
    <button class="btn btn-primary" onclick="window.print()">🖨 인쇄 / PDF로 저장</button>
    <button class="btn btn-ghost" onclick="document.getElementById('printOverlay').classList.remove('show')">닫기</button>
  </div>
  <div id="printPagesHost"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Firebase Realtime Database — REST API 방식 (SDK 미사용)
   ============================================================ */
var FIREBASE = 'https://hakwoncheck-default-rtdb.firebaseio.com';
var ADMIN_PIN = '1234';

function fbGet(path){
  return fetch(FIREBASE + '/' + path + '.json')
    .then(function(r){ return r.json(); })
    .catch(function(err){ console.error('fbGet 실패:', path, err); return null; });
}
function fbSet(path, data){
  return fetch(FIREBASE + '/' + path + '.json', {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  });
}

/* ============================================================
   상수 — 도메인 / 최저점 / 레벨 순서
   (academy_admin.html CATEGORIES, academy_books.html LEVELS 와 동일하게 유지)
   ============================================================ */
var DOMAIN_LABELS = {
  reading:'Reading', writing:'Writing', grammar:'Grammar',
  phonics:'Phonics', words:'Words', listening:'Listening & Speaking'
};
var DOMAIN_ORDER = ['reading','writing','grammar','phonics','words','listening'];
var SCORE_TYPE_DOMAINS = { words:'vocabulary', listening:'listening' }; // domain -> mission.type
var FLOORS = { reading:75, writing:75, grammar:75, phonics:75, words:60, listening:60, homework:70 };

var LEVELS = [
  { en:'Pink',   color:'#FF8FB3' },
  { en:'Red',    color:'#FF6B6B' },
  { en:'Orange', color:'#FFA94D' },
  { en:'Yellow', color:'#FFD43B' },
  { en:'Green',  color:'#51CF66' },
  { en:'Blue',   color:'#4DABF7' },
  { en:'Navy',   color:'#3B5BDB' },
  { en:'Purple', color:'#9775FA' }
];
var LEVEL_ORDER = LEVELS.map(function(l){ return l.en; });

/* ============================================================
   PIN 게이트
   ============================================================ */
var pinInput = document.getElementById('pinInput');
var pinValue = '';
function renderPinDots(){
  var dots = document.querySelectorAll('.pinDot');
  for (var i=0;i<dots.length;i++){ dots[i].classList.toggle('filled', i < pinValue.length); }
}
pinInput.addEventListener('input', function(e){
  pinValue = (e.target.value || '').replace(/\D/g,'').slice(0,4);
  e.target.value = pinValue;
  renderPinDots();
  document.getElementById('pinErr').textContent = '';
  if (pinValue.length === 4){
    if (pinValue === ADMIN_PIN){
      document.getElementById('pinGate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      boot();
    } else {
      document.getElementById('pinErr').textContent = 'PIN이 올바르지 않습니다';
      pinValue = ''; pinInput.value = '';
      renderPinDots();
    }
  }
});
setTimeout(function(){ pinInput.focus(); }, 200);

/* ============================================================
   상태
   ============================================================ */
var roster = [];
var currentLogo = null;
var currentMonth = '';
var currentStudentId = null;
var reportCache = {};      // studentId -> report object (draft or confirmed, in-memory working copy)
var reportStatus = {};     // studentId -> 'none' | 'draft' | 'confirmed'

function pad2(n){ return String(n).padStart(2,'0'); }
function defaultMonth(){
  var d = new Date();
  return d.getFullYear() + '-' + pad2(d.getMonth()+1);
}

/* ============================================================
   초기 로드
   ============================================================ */
function boot(){
  currentMonth = defaultMonth();
  document.getElementById('monthPicker').value = currentMonth;
  document.getElementById('monthPicker').addEventListener('change', function(e){
    currentMonth = e.target.value;
    currentStudentId = null;
    showEmpty();
    loadAllStatuses();
  });
  document.getElementById('bulkGenBtn').addEventListener('click', bulkGenerate);

  fbGet('roster').then(function(data){
    roster = Array.isArray(data) ? data.filter(Boolean) : Object.keys(data||{}).map(function(k){ return data[k]; });
    renderStudentList();
    loadAllStatuses();
  });

  loadLogo();
  document.getElementById('logoBtn').addEventListener('click', function(){
    document.getElementById('logoFileInput').click();
  });
  document.getElementById('logoFileInput').addEventListener('change', function(e){
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      currentLogo = reader.result; // data:image/jpeg;base64,...
      fbSet('config/reportLogo', currentLogo).then(function(){
        updateLogoPreview();
        showToast('로고가 저장되었습니다. 다음 로고를 다시 올리기 전까지 계속 사용됩니다.');
      });
    };
    reader.readAsDataURL(file);
  });
}

function loadLogo(){
  fbGet('config/reportLogo').then(function(val){
    currentLogo = val || null;
    updateLogoPreview();
  });
}
function updateLogoPreview(){
  var img = document.getElementById('logoPreviewImg');
  if (currentLogo){ img.src = currentLogo; img.style.display = 'inline-block'; }
  else { img.style.display = 'none'; }
}

function renderStudentList(){
  var wrap = document.getElementById('studentList');
  wrap.innerHTML = '';
  roster.forEach(function(stu){
    var row = document.createElement('div');
    row.className = 'stuRow' + (stu.id === currentStudentId ? ' active' : '');
    row.innerHTML =
      '<div><div class="nm">' + escapeHtml(stu.name) + '</div><div class="no mono">#' + escapeHtml(stu.number) + '</div></div>' +
      '<span class="statusChip none" id="chip-' + stu.id + '">-</span>';
    row.addEventListener('click', function(){ selectStudent(stu.id); });
    wrap.appendChild(row);
  });
}

function loadAllStatuses(){
  roster.forEach(function(stu){
    fbGet('monthlyReports/' + stu.id + '/' + currentMonth).then(function(rep){
      var chip = document.getElementById('chip-' + stu.id);
      if (!chip) return;
      if (!rep){ reportStatus[stu.id] = 'none'; chip.textContent='미생성'; chip.className='statusChip none'; }
      else if (rep.status === 'confirmed'){ reportStatus[stu.id] = 'confirmed'; chip.textContent='확정'; chip.className='statusChip confirmed'; }
      else { reportStatus[stu.id] = 'draft'; chip.textContent='초안'; chip.className='statusChip draft'; }
    });
  });
}

/* ============================================================
   통계 계산 엔진
   ============================================================ */
function rescale(raw, floor){
  if (raw === null || raw === undefined) return null;
  return Math.round((floor + (raw/100)*(100-floor)) * 10) / 10;
}

// attendanceAll: fbGet('attendance/'+studentId) 결과 전체 (전체 기간, 모든 날짜)
// 학생의 요일별 미션 템플릿(roster에 이미 포함되어 있음 — 추가 호출 없음)에서
// 실제로 배정된 카테고리만 추출. 스케줄에 없는 영역은 리포트에 아예 안 나오게 하기 위함.
function scheduledCategoriesForStudent(stu){
  var set = {};
  ['mon','tue','wed','thu','fri'].forEach(function(day){
    var dayMissions = (stu.missions && stu.missions[day]) || [];
    dayMissions.forEach(function(m){ if (m.category) set[m.category] = true; });
  });
  return set;
}

function computeStats(stu, attendanceAll, monthStr){
  attendanceAll = attendanceAll || {};
  var scheduled = scheduledCategoriesForStudent(stu);
  var activeDomains = DOMAIN_ORDER.filter(function(k){ return scheduled[k]; });
  var hasHomework = !!scheduled.homework;

  var allDates = Object.keys(attendanceAll);
  var monthDates = allDates.filter(function(d){ return d.indexOf(monthStr) === 0; });
  var statDates = monthDates.filter(function(d){ return !attendanceAll[d].autoClosed; });
  var excludedDaysCount = monthDates.length - statDates.length;

  var domainAgg = {}; DOMAIN_ORDER.forEach(function(k){ if (!SCORE_TYPE_DOMAINS[k]) domainAgg[k] = {done:0,total:0}; });
  var scoreAgg = { words:{sum:0,max:0}, listening:{sum:0,max:0} };
  var hwAgg = { success:0, total:0 };

  statDates.forEach(function(d){
    (attendanceAll[d].missions || []).forEach(function(m){
      if (m.category === 'homework'){
        hwAgg.total++;
        if (m.status==='done' || m.status==='none' || m.status==='doneAtAcademy') hwAgg.success++;
        return;
      }
      if (m.type === 'vocabulary'){ scoreAgg.words.sum += (m.score||0); scoreAgg.words.max += (m.scoreMax||0); return; }
      if (m.type === 'listening'){ scoreAgg.listening.sum += (m.score||0); scoreAgg.listening.max += (m.scoreMax||0); return; }
      if (domainAgg[m.category]){ domainAgg[m.category].total++; if (m.done) domainAgg[m.category].done++; }
    });
  });

  var domainScores = {};
  ['reading','writing','grammar','phonics'].forEach(function(k){
    if (!scheduled[k]) return; // 이 학생 스케줄에 없는 영역은 아예 계산/노출하지 않음
    var a = domainAgg[k];
    var raw = a.total > 0 ? (a.done/a.total*100) : null;
    domainScores[k] = { raw: raw===null?null:Math.round(raw*10)/10, display: rescale(raw, FLOORS[k]) };
  });
  ['words','listening'].forEach(function(k){
    if (!scheduled[k]) return;
    var a = scoreAgg[k];
    var raw = a.max > 0 ? (a.sum/a.max*100) : null;
    domainScores[k] = { raw: raw===null?null:Math.round(raw*10)/10, display: rescale(raw, FLOORS[k]) };
  });

  var hwRaw = hwAgg.total > 0 ? (hwAgg.success/hwAgg.total*100) : null;
  var homework = hasHomework
    ? { raw: hwRaw===null?null:Math.round(hwRaw*10)/10, display: rescale(hwRaw, FLOORS.homework) }
    : { raw:null, display:null };

  // ---- 독서 기록: 다회독 판정은 전체 기간(all-time) 기준, 이번달 목록엔 autoClosed 포함 ----
  var allOcc = [], monthOcc = [];
  allDates.forEach(function(d){
    (attendanceAll[d].books || []).forEach(function(b){
      var occ = { bookId:String(b.number), title:b.title, level:b.level||'', date:d };
      allOcc.push(occ);
      if (d.indexOf(monthStr) === 0) monthOcc.push(occ);
    });
  });
  var allTimeCountMap = {};
  allOcc.forEach(function(o){ allTimeCountMap[o.bookId] = (allTimeCountMap[o.bookId]||0) + 1; });

  var seen = {}, readingList = [];
  monthOcc.forEach(function(o){
    if (seen[o.bookId]){ seen[o.bookId].monthCount++; return; }
    var entry = { bookId:o.bookId, title:o.title, level:o.level, monthCount:1 };
    seen[o.bookId] = entry;
    readingList.push(entry);
  });
  readingList.forEach(function(r){
    r.allTimeCount = allTimeCountMap[r.bookId] || r.monthCount;
    r.tag = r.allTimeCount >= 2 ? null : undefined; // null = 교사 선택 필요, undefined = 필요없음(1회만)
  });

  // ---- 레벨 바: 이번달 읽은 책만, 최다 독서 레벨 (동률이면 낮은 단계) ----
  var levelCounts = {};
  monthOcc.forEach(function(o){ if (o.level) levelCounts[o.level] = (levelCounts[o.level]||0) + 1; });
  var mostReadLevel = null, best = 0;
  LEVEL_ORDER.forEach(function(lv){
    var c = levelCounts[lv] || 0;
    if (c > best){ best = c; mostReadLevel = lv; }
  });

  return {
    domainScores: domainScores,
    homework: homework,
    excludedDaysCount: excludedDaysCount,
    readingList: readingList,
    levelBar: { mostReadLevel: mostReadLevel },
    monthReadCount: monthOcc.length,
    monthBooksRead: readingList.length,
    totalBooksRead: Object.keys(allTimeCountMap).length,
    activeDomains: activeDomains,
    hasHomework: hasHomework
  };
}

/* ============================================================
   자동 코멘트 생성 (템플릿 기반 — 외부 API 미사용)
   ============================================================ */
function tier(raw){
  if (raw === null) return null;
  if (raw >= 90) return 'excellent';
  if (raw >= 75) return 'good';
  return 'growing';
}
function bestWorstDomain(domainScores, activeDomains){
  var entries = activeDomains.map(function(k){ return { key:k, raw: domainScores[k].raw }; }).filter(function(e){ return e.raw !== null; });
  if (!entries.length) return { best:null, worst:null };
  entries.sort(function(a,b){ return b.raw - a.raw; });
  return { best: entries[0], worst: entries[entries.length-1] };
}
// 소제목 없이 이어지는 하나의 글로 생성 (공란 처리 시 어색함 방지).
// 이번달 학습영역/과제·독서습관/성장포인트/다음달 계획을 자연스럽게 한 문단에 녹여내고,
// 미래지향적·희망적 어조로 마무리해 학부모가 계속 다니고 싶다는 인상을 주도록 구성.
function generateComment(stu, stats){
  var bw = bestWorstDomain(stats.domainScores, stats.activeDomains);
  var bestLabel = bw.best ? DOMAIN_LABELS[bw.best.key] : null;
  var worstLabel = bw.worst ? DOMAIN_LABELS[bw.worst.key] : null;
  var hwRaw = stats.hasHomework ? stats.homework.raw : null;
  var readCount = stats.monthReadCount;
  var domainLabelList = stats.activeDomains.map(function(k){ return DOMAIN_LABELS[k]; });

  var parts = [];
  parts.push('이번 달 ' + stu.name + '(이)는 ' +
    (domainLabelList.length ? domainLabelList.join(', ') + ' 영역을' : '여러 영역을') +
    ' 꾸준히 학습하며 한 걸음씩 성장해나갔습니다.');

  if (bestLabel){
    parts.push('특히 ' + bestLabel + ' 영역에서 안정적인 실력을 보여주었고, 스스로 해내는 성취감을 느끼는 모습이 인상적이었습니다.');
  }
  if (hwRaw !== null){
    parts.push('과제 성취율은 ' + Math.round(hwRaw) + '%로, ' +
      (hwRaw >= 80 ? '매우 성실한 태도로 꾸준히 참여했습니다.' : '조금씩 책임감을 키워가는 모습을 보였습니다.'));
  }
  if (readCount > 0){
    parts.push('이번 달에는 원서 ' + readCount + '권을 읽으며 독서를 통해 사고력과 배경지식도 함께 넓혀갔습니다.');
  }
  if (worstLabel && worstLabel !== bestLabel){
    parts.push(worstLabel + ' 영역은 앞으로 조금 더 채워나가면 좋을 부분으로, 다음 달에는 이 부분에 좀 더 집중해볼 계획입니다.');
  }
  parts.push('다음 달에는 지금까지 다져온 기초를 바탕으로 한 단계 더 심화된 내용에 도전하며, ' +
    stu.name + '(이)의 가능성을 계속 넓혀갈 예정입니다.');
  parts.push('작은 성장이 쌓여 큰 변화를 만든다는 믿음으로, 앞으로도 ' + stu.name + '(이)의 곁에서 꾸준히 함께하겠습니다.');

  return parts.join(' ');
}

/* ============================================================
   일괄 초안 생성 (기존 draft/confirmed는 건드리지 않음 — 미생성 학생만)
   ============================================================ */
function bulkGenerate(){
  var btn = document.getElementById('bulkGenBtn');
  btn.disabled = true;
  var progressEl = document.getElementById('bulkProgress');
  var targets = roster.filter(function(stu){ return reportStatus[stu.id] === 'none' || !reportStatus[stu.id]; });
  if (!targets.length){
    showToast('이번 달은 이미 모든 학생의 리포트가 생성되어 있습니다.');
    btn.disabled = false;
    return;
  }
  var done = 0;
  progressEl.textContent = '생성 중... 0/' + targets.length;

  function next(i){
    if (i >= targets.length){
      progressEl.textContent = '완료: ' + done + '명 생성됨';
      btn.disabled = false;
      loadAllStatuses();
      showToast('일괄 초안 생성 완료 (' + done + '명)');
      return;
    }
    var stu = targets[i];
    fbGet('attendance/' + stu.id).then(function(att){
      var stats = computeStats(stu, att, currentMonth);
      var comment = generateComment(stu, stats);
      var report = {
        studentId: stu.id, studentName: stu.name, month: currentMonth, status:'draft',
        generatedAt: Date.now(), confirmedAt: null,
        domainScores: stats.domainScores, homework: stats.homework,
        excludedDaysCount: stats.excludedDaysCount,
        comment: comment,
        readingList: stats.readingList,
        levelBar: stats.levelBar,
        monthBooksRead: stats.monthBooksRead,
        totalBooksRead: stats.totalBooksRead,
        activeDomains: stats.activeDomains,
        hasHomework: stats.hasHomework,
        logoRef: 'config/reportLogo'
      };
      return fbSet('monthlyReports/' + stu.id + '/' + currentMonth, report);
    }).then(function(){
      done++;
      progressEl.textContent = '생성 중... ' + done + '/' + targets.length;
      next(i+1);
    }).catch(function(){ next(i+1); });
  }
  next(0);
}

/* ============================================================
   학생 선택 → 리포트 로드 (없으면 그 자리에서 즉시 계산해 보여줌 / 아직 저장은 안 함)
   ============================================================ */
function isValidReportShape(rep){
  return !!(rep && rep.domainScores && rep.homework && Array.isArray(rep.readingList) && rep.levelBar && Array.isArray(rep.activeDomains) && typeof rep.comment === 'string' && typeof rep.totalBooksRead === 'number');
}

function computeFreshDraft(stu, id){
  return fbGet('attendance/' + id).then(function(att){
    var stats = computeStats(stu, att, currentMonth);
    var comment = generateComment(stu, stats);
    return {
      studentId: id, studentName: stu.name, month: currentMonth, status:'draft',
      generatedAt: null, confirmedAt: null,
      domainScores: stats.domainScores, homework: stats.homework,
      excludedDaysCount: stats.excludedDaysCount,
      comment: comment, readingList: stats.readingList,
      levelBar: stats.levelBar,
      monthBooksRead: stats.monthBooksRead, totalBooksRead: stats.totalBooksRead,
      activeDomains: stats.activeDomains, hasHomework: stats.hasHomework,
      logoRef: 'config/reportLogo'
    };
  });
}
function selectStudent(id){
  currentStudentId = id;
  renderStudentList();
  var stu = roster.find(function(s){ return s.id === id; });
  if (!stu){
    console.error('roster에서 id를 찾지 못했습니다:', id);
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('editorForm').style.display = 'none';
    showToast('학생 정보를 찾지 못했습니다 (id 불일치) — 콘솔을 확인해주세요');
    return;
  }
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('editorForm').style.display = 'block';
  document.getElementById('editorForm').innerHTML = '<div class="progressNote">불러오는 중...</div>';

  var slowTimer = setTimeout(function(){
    var el = document.getElementById('editorForm');
    if (el && el.innerHTML.indexOf('불러오는 중') !== -1){
      el.innerHTML = '<div class="progressNote">예상보다 오래 걸리고 있습니다 (10초 이상). 이 학생의 출결 기록이 많거나 네트워크가 느릴 수 있습니다. 브라우저 개발자도구(F12) → Console/Network 탭에서 빨간 에러나 대기 중인 요청이 있는지 확인해주세요.</div>';
    }
  }, 10000);

  fbGet('monthlyReports/' + id + '/' + currentMonth).then(function(rep){
    if (isValidReportShape(rep)){
      clearTimeout(slowTimer);
      reportCache[id] = rep;
      renderEditor(stu, rep);
    } else {
      if (rep) console.warn('저장된 리포트가 예전/불완전한 형태라 무시하고 새로 계산합니다:', id, rep);
      computeFreshDraft(stu, id).then(function(draft){
        clearTimeout(slowTimer);
        reportCache[id] = draft;
        renderEditor(stu, draft);
      }).catch(function(err){
        clearTimeout(slowTimer);
        console.error('attendance 로드 실패:', err);
        document.getElementById('editorForm').innerHTML = '<div class="warnBox">불러오기 중 오류가 발생했습니다. 콘솔(F12)을 확인해주세요.</div>';
      });
    }
  }).catch(function(err){
    clearTimeout(slowTimer);
    console.error('monthlyReports 로드 실패:', err);
    document.getElementById('editorForm').innerHTML = '<div class="warnBox">불러오기 중 오류가 발생했습니다. 콘솔(F12)을 확인해주세요.</div>';
  });
}

function showEmpty(){
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('editorForm').style.display = 'none';
}

/* ============================================================
   에디터 렌더링
   ============================================================ */
function renderEditor(stu, rep){
  var form = document.getElementById('editorForm');
  var locked = rep.status === 'confirmed';
  var needsTagCount = rep.readingList.filter(function(r){ return r.tag === null; }).length;

  var html = '';
  html += '<div class="editorHead"><h2>' + escapeHtml(stu.name) + ' · ' + currentMonth + '</h2>' +
    '<div class="actions">' +
    '<button class="btn btn-gold btn-sm" id="printPreviewBtn">🖨 인쇄 미리보기</button>' +
    (locked
      ? '<button class="btn btn-ghost btn-sm" id="unlockBtn">잠금 해제 (재수정)</button>'
      : ('<button class="btn btn-ghost btn-sm" id="recalcBtn">다시 계산(초기화)</button>' +
         '<button class="btn btn-soft" id="saveDraftBtn">임시저장</button>' +
         '<button class="btn btn-primary" id="confirmBtn">확정</button>')) +
    '</div></div>';

  if (locked){
    html += '<div class="lockBox"><span>✅ 확정된 리포트입니다. 수정하려면 잠금을 해제하세요.</span></div>';
  }
  if (needsTagCount > 0){
    html += '<div class="warnBox">⚠ 같은 책을 여러 번 읽은 기록이 있습니다. 아래 독서 리스트에서 [다회독/정독] 태그를 ' + needsTagCount + '건 선택해야 확정할 수 있습니다.</div>';
  }

  // ---- 영역별 성취도 (레이더 + 개별 수정) — 이 학생 스케줄에 실제로 배정된 영역만 ----
  html += '<div class="sectionTitle">영역별 성취도</div>';
  if (!rep.activeDomains.length){
    html += '<div class="noBooks">이 학생의 요일별 미션 템플릿에 등록된 영역이 없습니다. 관리자 화면에서 스케줄을 확인해주세요.</div>';
  } else {
    html += '<div class="radarWrap"><div id="radarHost"></div><div class="domainGrid">';
    rep.activeDomains.forEach(function(k){
      var d = rep.domainScores[k];
      html += '<div class="domainCard"><div class="dLabel">' + DOMAIN_LABELS[k] + '</div>';
      if (!d || (d.raw === null && d.display === null)){
        html += '<div class="dNoData">이번 달 기록 없음</div>';
      } else {
        html += '<div class="dRow"><input type="number" min="0" max="100" step="0.1" data-domain="' + k + '" class="displayInput" value="' + (d.display===null?'':d.display) + '" ' + (locked?'disabled':'') + '> <span>%</span></div>' +
          '<div class="dRaw">실제: ' + (d.raw===null?'—':d.raw+'%') + '</div>';
      }
      html += '</div>';
    });
    html += '</div></div>';
  }

  // ---- 숙제 (별도 관리) — 이 학생 스케줄에 숙제가 배정된 경우에만 표시, 제목 없이 문장형 ----
  if (rep.hasHomework){
    html += '<div class="hwRow">' +
      (rep.homework.raw === null
        ? '<span class="dNoData">이번 달 숙제 기록이 없습니다.</span>'
        : ('<span class="lbl">이번 달 학습 성실도는</span>' +
           '<input type="number" min="0" max="100" step="0.1" id="hwDisplayInput" value="' + rep.homework.display + '" ' + (locked?'disabled':'') + '>' +
           '<span class="lbl">%입니다.</span>' +
           '<span class="dRaw" style="margin-left:8px;">(실제 완료율: ' + rep.homework.raw + '%)</span>')) +
      '</div>';
  }


  // ---- 코멘트 (소제목 없이 하나의 글 · 공란 가능) ----
  html += '<div class="commentBox"><textarea data-comment="1" placeholder="이 칸을 비워두면 인쇄 시 이 부분 전체가 생략됩니다." style="min-height:160px;" ' + (locked?'disabled':'') + '>' + escapeHtml(rep.comment || '') + '</textarea></div>';

  // ---- 독서 리스트 ----
  html += '<div class="sectionTitle">독서 기록 (이번 달, ' + rep.readingList.length + '권)</div>';
  if (!rep.readingList.length){
    html += '<div class="noBooks">이번 달 독서 기록이 없습니다. (독서 데이터가 없으면 리포트 2페이지는 자동 생략됩니다)</div>';
  } else {
    html += '<table class="readTbl"><thead><tr><th>제목</th><th>레벨</th><th>이번달</th><th>전체</th><th>태그</th></tr></thead><tbody>';
    rep.readingList.forEach(function(r, idx){
      var lv = LEVELS.find(function(l){ return l.en === r.level; });
      html += '<tr><td>' + escapeHtml(r.title) + '</td>' +
        '<td>' + (lv ? '<span class="lvChip" style="background:' + lv.color + '">' + lv.en + '</span>' : '-') + '</td>' +
        '<td class="mono">' + r.monthCount + '회</td>' +
        '<td class="mono">' + r.allTimeCount + '회</td>' +
        '<td>' + (r.tag === undefined
          ? '<span class="dRaw">해당없음(1회)</span>'
          : ('<select class="tagSelect' + (r.tag===null?' needsPick':'') + '" data-tagidx="' + idx + '" ' + (locked?'disabled':'') + '>' +
             '<option value="" ' + (r.tag===null?'selected':'') + '>선택 필요</option>' +
             '<option value="다회독" ' + (r.tag==='다회독'?'selected':'') + '>다회독</option>' +
             '<option value="정독" ' + (r.tag==='정독'?'selected':'') + '>정독</option>' +
             '</select>')) +
        '</td></tr>';
    });
    html += '</tbody></table>';

    // ---- 레벨 바 ----
    html += '<div class="sectionTitle">이번 달 독서 레벨 위치</div>';
    html += buildLevelBarHtml(rep.levelBar.mostReadLevel);
  }

  form.innerHTML = html;
  attachEditorEvents(stu, rep, locked);
  renderRadar(rep.domainScores, rep.activeDomains);
}

function buildLevelBarHtml(mostReadLevel, prefix){
  prefix = prefix || '';
  if (!mostReadLevel) return '<div class="noBooks">레벨 정보가 있는 책이 없습니다.</div>';
  var idx = LEVEL_ORDER.indexOf(mostReadLevel);
  var pct = ((idx + 0.5) / LEVEL_ORDER.length) * 100;
  var html = '<div class="' + prefix + 'levelBarOuter">';
  LEVELS.forEach(function(l){ html += '<div class="seg" style="background:' + l.color + '"></div>'; });
  html += '<div class="' + prefix + 'levelMarker" style="left:' + pct + '%"><div class="' + prefix + 'tip">현재는 ' + mostReadLevel + ' 단계</div></div>';
  html += '</div>';
  html += '<div class="' + prefix + 'levelLegend">' + LEVEL_ORDER.map(function(l){ return '<span>' + l + '</span>'; }).join('') + '</div>';
  return html;
}

/* 6각 레이더 차트 — 외부 라이브러리 없이 SVG 직접 렌더링 */
function buildRadarSvgString(domainScores, activeDomains, size, showValues){
  size = size || 260;
  var cx = size/2, cy = size/2, R = size*0.365;
  var axesCount = activeDomains.length;
  function pt(i, r){
    var ang = (Math.PI*2*i/axesCount) - Math.PI/2;
    return [cx + r*Math.cos(ang), cy + r*Math.sin(ang)];
  }
  var svg = '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">';
  [0.25,0.5,0.75,1].forEach(function(f){
    var ring = activeDomains.map(function(_,i){ var p = pt(i, R*f); return p[0]+','+p[1]; }).join(' ');
    svg += '<polygon points="' + ring + '" fill="none" stroke="#E7ECF6" stroke-width="1"/>';
  });
  activeDomains.forEach(function(_,i){
    var p = pt(i, R);
    svg += '<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0]+'" y2="'+p[1]+'" stroke="#E7ECF6" stroke-width="1"/>';
  });
  var poly = activeDomains.map(function(k,i){
    var d = domainScores[k];
    var val = (d && d.display!==null) ? d.display : 0;
    var p = pt(i, R*(val/100));
    return p[0]+','+p[1];
  }).join(' ');
  svg += '<polygon points="' + poly + '" fill="rgba(47,174,118,.28)" stroke="#2FAE76" stroke-width="2"/>';
  activeDomains.forEach(function(k,i){
    var p = pt(i, R+size*0.07);
    var d = domainScores[k];
    var label = DOMAIN_LABELS[k] + (showValues && d && d.display!==null ? ' ' + d.display + '%' : '');
    svg += '<text x="'+p[0]+'" y="'+p[1]+'" font-size="' + (size*0.04) + '" fill="#6B7686" text-anchor="middle" font-family="Noto Sans KR,sans-serif">' + label + '</text>';
  });
  svg += '</svg>';
  return svg;
}

function renderRadar(domainScores, activeDomains){
  var host = document.getElementById('radarHost');
  if (!host) return;
  if (!activeDomains || activeDomains.length < 3){
    host.innerHTML = '<div class="dRaw" style="max-width:220px;">배정된 영역이 3개 미만이라 레이더 차트 대신 위 개별 카드로만 표시합니다.</div>';
    return;
  }
  host.innerHTML = buildRadarSvgString(domainScores, activeDomains, 260);
}

/* ============================================================
   인쇄 미리보기 (A4, 2페이지) — 2단계
   ============================================================ */
// 종합 성취율: 배정 영역들의 display%(교사 최종 수정값 반영) 단순 평균.
// 참고: 이전에 "왜곡 우려로 단일 점수는 만들지 않기"로 정리했던 부분과 방향이 다름 —
// 이번 요청으로 인쇄본에 한해 별도 원형 그래프로 추가함.
function computeCompositeScore(rep){
  var vals = rep.activeDomains
    .map(function(k){ return rep.domainScores[k]; })
    .filter(function(d){ return d && d.display !== null; })
    .map(function(d){ return d.display; });
  if (!vals.length) return null;
  var sum = vals.reduce(function(a,b){ return a+b; }, 0);
  return Math.round((sum/vals.length) * 10) / 10;
}

function buildCircleGaugeSvgString(percent, size){
  size = size || 150;
  var r = size*0.36, cx = size/2, cy = size/2, sw = size*0.09;
  var circumference = 2*Math.PI*r;
  var offset = circumference * (1 - percent/100);
  var svg = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">';
  svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#EEF1F8" stroke-width="'+sw+'"/>';
  svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#2FAE76" stroke-width="'+sw+'" stroke-linecap="round" ' +
    'stroke-dasharray="'+circumference+'" stroke-dashoffset="'+offset+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
  svg += '<text x="'+cx+'" y="'+(cy+size*0.06)+'" text-anchor="middle" font-size="'+(size*0.2)+'" font-weight="700" fill="#1F2937" font-family=\'Space Grotesk,sans-serif\'>'+Math.round(percent)+'%</text>';
  svg += '<text x="'+cx+'" y="'+(cy+size*0.24)+'" text-anchor="middle" font-size="'+(size*0.075)+'" fill="#6B7686" font-family=\'Noto Sans KR,sans-serif\'>종합 성취율</text>';
  svg += '</svg>';
  return svg;
}

function buildPrintPage1Html(stu, rep){
  var html = '<div class="printPage">';
  if (currentLogo) html += '<img class="plogo" src="' + currentLogo + '">';
  html += '<div class="ptitle">Learning Path</div>';
  html += '<div class="psubtitle">' + escapeHtml(stu.name) + ' 학생의 성장을 함께하겠습니다.</div>';
  html += '<div class="pmonth">' + currentMonth + '</div>';

  var composite = computeCompositeScore(rep);
  if (rep.activeDomains.length || composite !== null){
    html += '<div class="psection"><div class="pchartsRow">';
    if (rep.activeDomains.length >= 3){
      html += buildRadarSvgString(rep.domainScores, rep.activeDomains, 230, true);
    } else if (rep.activeDomains.length){
      // 배정 영역이 3개 미만이면 레이더 대신 영역명·값을 간단히 나열 (그래프 중복 없이)
      html += '<div style="font-size:12.5px; line-height:2;">' + rep.activeDomains.map(function(k){
        var d = rep.domainScores[k];
        return DOMAIN_LABELS[k] + ': ' + (d && d.display!==null ? d.display+'%' : '기록 없음');
      }).join('<br>') + '</div>';
    }
    if (composite !== null){
      html += buildCircleGaugeSvgString(composite, 150);
    }
    html += '</div></div>';
  }

  if (rep.hasHomework && rep.homework.display !== null){
    html += '<div class="psection"><div class="phw">이번 달 학습 성실도는 ' + rep.homework.display + '%입니다.</div></div>';
  }

  if (rep.comment && rep.comment.trim()){
    html += '<div class="psection"><div class="pcomment">' + escapeHtml(rep.comment.trim()) + '</div></div>';
  }

  html += '</div>';
  return html;
}

function buildPrintPage2Html(stu, rep){
  if (!rep.readingList.length) return '';
  var html = '<div class="printPage">';
  if (currentLogo) html += '<img class="plogo" src="' + currentLogo + '">';
  html += '<div class="ptitle">Reading Path</div>';
  html += '<div class="psubtitle">' + escapeHtml(stu.name) + ' 학생의 이번달 독서 목록입니다.</div>';
  html += '<div class="pmonth">' + currentMonth + '</div>';

  html += '<div class="pbookCount">이번 달 읽은 책 ' + rep.monthBooksRead + '권 · 지금까지 읽은 책 ' + rep.totalBooksRead + '권</div>';

  html += '<table class="preadTbl"><thead><tr><th>제목</th><th>레벨</th><th>비고</th></tr></thead><tbody>';
  rep.readingList.forEach(function(r){
    var lv = LEVELS.find(function(l){ return l.en === r.level; });
    html += '<tr><td>' + escapeHtml(r.title) + '</td>' +
      '<td>' + (lv ? '<span class="plvChip" style="background:' + lv.color + '">' + lv.en + '</span>' : '-') + '</td>' +
      '<td>' + (r.tag ? '<span class="ptagChip">' + r.tag + '</span>' : '') + '</td></tr>';
  });
  html += '</tbody></table>';

  html += '<div class="psection">' + buildLevelBarHtml(rep.levelBar.mostReadLevel, 'p') + '</div>';
  html += '</div>';
  return html;
}

function openPrintPreview(stu, rep){
  var host = document.getElementById('printPagesHost');
  var page2 = buildPrintPage2Html(stu, rep);
  host.innerHTML = buildPrintPage1Html(stu, rep) + page2;
  document.getElementById('printOverlay').classList.add('show');
}
function attachEditorEvents(stu, rep, locked){
  document.getElementById('printPreviewBtn').addEventListener('click', function(){
    openPrintPreview(stu, rep);
  });

  if (locked){
    document.getElementById('unlockBtn').addEventListener('click', function(){
      if (!confirm('확정된 리포트의 잠금을 해제하시겠습니까? 다시 수정할 수 있게 됩니다.')) return;
      rep.status = 'draft';
      reportCache[stu.id] = rep;
      renderEditor(stu, rep);
      showToast('잠금 해제됨 (아직 저장 전입니다 — 임시저장을 눌러주세요)');
    });
    return;
  }

  document.querySelectorAll('.displayInput').forEach(function(inp){
    inp.addEventListener('change', function(){
      var k = inp.getAttribute('data-domain');
      var v = parseFloat(inp.value);
      rep.domainScores[k].display = isNaN(v) ? null : v;
    });
  });
  var hwInput = document.getElementById('hwDisplayInput');
  if (hwInput){
    hwInput.addEventListener('change', function(){
      var v = parseFloat(hwInput.value);
      rep.homework.display = isNaN(v) ? null : v;
    });
  }
  var commentTa = document.querySelector('[data-comment]');
  if (commentTa){
    commentTa.addEventListener('input', function(){
      rep.comment = commentTa.value;
    });
  }
  document.querySelectorAll('.tagSelect').forEach(function(sel){
    sel.addEventListener('change', function(){
      var idx = parseInt(sel.getAttribute('data-tagidx'), 10);
      rep.readingList[idx].tag = sel.value || null;
      sel.classList.toggle('needsPick', !sel.value);
    });
  });

  document.getElementById('recalcBtn').addEventListener('click', function(){
    if (!confirm('현재 화면의 수정 내용을 버리고 데이터를 다시 계산할까요?')) return;
    fbGet('attendance/' + stu.id).then(function(att){
      var stats = computeStats(stu, att, currentMonth);
      var comment = generateComment(stu, stats);
      var fresh = {
        studentId: stu.id, studentName: stu.name, month: currentMonth, status:'draft',
        generatedAt: rep.generatedAt, confirmedAt: null,
        domainScores: stats.domainScores, homework: stats.homework,
        excludedDaysCount: stats.excludedDaysCount, comment: comment,
        readingList: stats.readingList, levelBar: stats.levelBar,
        monthBooksRead: stats.monthBooksRead, totalBooksRead: stats.totalBooksRead,
        activeDomains: stats.activeDomains, hasHomework: stats.hasHomework,
        logoRef: 'config/reportLogo'
      };
      reportCache[stu.id] = fresh;
      renderEditor(stu, fresh);
    });
  });

  document.getElementById('saveDraftBtn').addEventListener('click', function(){
    rep.status = 'draft';
    rep.generatedAt = rep.generatedAt || Date.now();
    fbSet('monthlyReports/' + stu.id + '/' + currentMonth, rep).then(function(){
      showToast('임시저장 완료');
      loadAllStatuses();
    });
  });

  document.getElementById('confirmBtn').addEventListener('click', function(){
    var needsTag = rep.readingList.some(function(r){ return r.tag === null; });
    if (needsTag){ showToast('다회독/정독 태그를 모두 선택해야 확정할 수 있습니다.'); return; }
    if (!confirm('리포트를 확정하시겠습니까? 확정 후에는 잠금 해제를 해야 다시 수정할 수 있습니다.')) return;
    rep.status = 'confirmed';
    rep.confirmedAt = Date.now();
    rep.generatedAt = rep.generatedAt || Date.now();
    fbSet('monthlyReports/' + stu.id + '/' + currentMonth, rep).then(function(){
      showToast('리포트 확정 완료');
      reportCache[stu.id] = rep;
      loadAllStatuses();
      renderEditor(stu, rep);
    });
  });
}

/* ============================================================
   유틸
   ============================================================ */
function escapeHtml(s){
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2400);
}
</script>
