<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학원 학습 리포트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@600;700&display=swap');
:root{
  --bg:#FAF8F3;--card:#FFF;--border:#E6E1D6;--text:#232A3B;--muted:#9098A8;
  --green:#2FAE76;--green-bg:#E4F7EE;--blue:#3B6FE0;--blue-bg:#E9EFFD;
  --gold:#E8930A;--gold-bg:#FFF3DC;--red:#C0392B;--red-bg:#FDEDED;
  --purple:#8B5CF6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}

/* PIN */
.pin-overlay{position:fixed;inset:0;background:rgba(10,14,26,.55);display:flex;align-items:center;justify-content:center;z-index:200;}
.pin-box{background:var(--card);border-radius:20px;padding:32px 28px;width:290px;box-shadow:0 8px 40px rgba(0,0,0,.18);}
.pin-box h2{font-size:1.1rem;font-weight:800;margin-bottom:4px;}
.pin-box p{font-size:.82rem;color:var(--muted);margin-bottom:18px;}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:18px;}
.p-dot{width:13px;height:13px;border-radius:50%;background:var(--border);transition:background .2s;}
.p-dot.filled{background:var(--green);}
.pin-kp{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.p-key{height:52px;border-radius:11px;background:var(--bg);border:1px solid var(--border);font-size:1.15rem;font-weight:700;cursor:pointer;}
.p-key:active{background:var(--border);}
.p-key.cancel{color:var(--muted);font-size:.9rem;}
.pin-err{color:var(--red);font-size:.82rem;text-align:center;margin-top:8px;min-height:18px;}

/* SCREEN */
.screen{max-width:900px;margin:0 auto;padding:24px 16px 60px;}
.screen-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;}
.screen-title{font-size:1.5rem;font-weight:900;}
.screen-sub{font-size:.82rem;color:var(--muted);margin-top:3px;}
.btn-settings{padding:7px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:.82rem;color:var(--muted);}
.settings-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px;}
.s-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center;}
.s-row label{font-size:.78rem;color:var(--muted);white-space:nowrap;min-width:70px;}
.s-row input{flex:1;padding:8px 11px;border-radius:8px;border:1px solid var(--border);font-size:.88rem;background:var(--bg);}
.s-row button{padding:8px 14px;background:var(--green);border:none;color:#fff;font-weight:700;border-radius:8px;cursor:pointer;}
.month-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.month-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:.85rem;font-weight:600;}
.month-btn.active{background:var(--green);border-color:var(--green);color:#fff;}
.student-grid{display:flex;flex-direction:column;gap:16px;}
.no-data-msg{text-align:center;padding:40px;color:var(--muted);}

/* STUDENT CARD (screen) */
.sc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.sc-name{font-size:1.1rem;font-weight:900;}
.sc-meta{font-size:.78rem;color:var(--muted);margin-top:2px;}
.btn-pdf{padding:8px 16px;background:var(--blue);border:none;color:#fff;font-weight:700;font-size:.85rem;border-radius:9px;cursor:pointer;}

/* Capability display */
.cap-box{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border-radius:14px;padding:20px 24px;color:#fff;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.cap-month{font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;opacity:.7;margin-bottom:4px;}
.cap-label{font-size:.88rem;opacity:.8;margin-bottom:2px;}
.cap-score{font-size:2.8rem;font-weight:900;font-family:'Space Grotesk',monospace;line-height:1;}
.cap-grade-badge{padding:6px 18px;border-radius:999px;font-size:.88rem;font-weight:800;letter-spacing:.05em;}
.cap-grade-badge.excellent{background:#F5A623;color:#fff;}
.cap-grade-badge.good{background:#2FAE76;color:#fff;}

/* Radar chart */
.radar-wrap{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px;}
.radar-svg-box{flex:0 0 auto;}
.radar-score-list{flex:1;min-width:140px;display:flex;flex-direction:column;gap:6px;justify-content:center;}
.rsl-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg);border-radius:7px;}
.rsl-name{font-size:.82rem;font-weight:600;color:var(--text);}
.rsl-score{font-size:.88rem;font-weight:800;}
.rsl-score.excellent{color:#F5A623;}
.rsl-score.good{color:#2FAE76;}
.comment-section{margin-bottom:12px;}
.comment-label{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.comment-ta{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);font-size:.88rem;font-family:'Noto Sans KR',sans-serif;line-height:1.7;resize:vertical;background:var(--bg);color:var(--text);min-height:90px;}
.comment-ta:focus{outline:none;border-color:var(--green);}
.ai-loading{color:var(--muted);font-style:italic;font-size:.85rem;padding:8px 0;}

/* Book summary */
.book-summary-box{background:var(--blue-bg);border:1px solid var(--blue-bd, #3B6FE0);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.book-summary-stats{display:flex;gap:20px;flex-wrap:wrap;}
.bss{text-align:center;}
.bss .bsv{font-size:1.4rem;font-weight:900;color:var(--blue);}
.bss .bsl{font-size:.72rem;color:var(--muted);}

/* Print ============================== */
@media print{
  body{background:#fff;}
  .pin-overlay,.screen-top,.month-bar,.btn-pdf,.btn-settings,.settings-panel,.comment-label-screen{display:none!important;}
  .screen{padding:0;max-width:100%;}
  .student-grid{display:none;}
  .print-doc{display:block!important;}
}
.print-doc{display:none;}

/* Print Document */
.pt-page{padding:28px 32px;font-family:'Noto Sans KR',sans-serif;background:#fff;min-height:277mm;position:relative;page-break-after:always;}
.pt-page:last-child{page-break-after:auto;}
.pt-header{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #232A3B;padding-bottom:12px;margin-bottom:20px;}
.pt-logo-area{display:flex;align-items:center;gap:10px;}
.pt-logo{max-height:44px;max-width:120px;object-fit:contain;}
.pt-academy-name{font-size:1rem;font-weight:700;color:#232A3B;}
.pt-header-right{text-align:right;}
.pt-report-title{font-size:1.2rem;font-weight:900;}
.pt-report-sub{font-size:.78rem;color:var(--muted);}

.pt-student-name{font-size:1.5rem;font-weight:900;margin-bottom:4px;}

/* Cap display print */
.pt-cap{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border-radius:14px;padding:18px 22px;color:#fff;margin:14px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.pt-cap-left .pt-cap-label{font-size:.78rem;opacity:.7;margin-bottom:2px;}
.pt-cap-left .pt-cap-score{font-size:2.6rem;font-weight:900;font-family:'Space Grotesk',monospace;line-height:1;}
.pt-grade-badge{padding:8px 22px;border-radius:999px;font-size:1rem;font-weight:800;}
.pt-grade-excellent{background:#F5A623;color:#fff;}
.pt-grade-good{background:#2FAE76;color:#fff;}

/* Area grid print */
.pt-section-title{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.pt-area-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px;}
.pt-area-cell{border:1.5px solid #e0e0e0;border-radius:10px;padding:12px 8px;text-align:center;break-inside:avoid;}
.pt-area-ring{width:52px;height:52px;border-radius:50%;margin:0 auto 7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.88rem;position:relative;}
.pt-area-name{font-size:.78rem;font-weight:700;color:#232A3B;}
.pt-area-pct-label{font-size:.72rem;color:var(--muted);margin-top:2px;}

/* Comment print */
.pt-comment-box{background:#f8f9fa;border-left:3px solid #2FAE76;border-radius:0 8px 8px 0;padding:12px 14px;font-size:.88rem;line-height:1.75;margin-top:6px;white-space:pre-wrap;}

/* Footer */
.pt-footer{position:absolute;bottom:22px;left:32px;right:32px;text-align:center;font-size:.72rem;color:#aaa;border-top:1px solid #eee;padding-top:10px;}
.pt-footer .slogan{font-size:.82rem;font-weight:700;color:#888;margin-bottom:2px;}

/* Page 2 book list */
.pt-book-item{display:flex;flex-direction:column;padding:10px 12px;border-bottom:1px solid #f0f0f0;}
.pt-book-item:last-child{border-bottom:none;}
.pt-book-title{font-weight:700;font-size:.92rem;margin-bottom:3px;}
.pt-book-review{font-size:.82rem;color:#666;}
.pt-cum-stats{display:flex;gap:24px;margin-bottom:18px;}
.pt-cum-stat{text-align:center;background:#EBF5FF;border-radius:10px;padding:12px 20px;}
.pt-cum-stat .v{font-size:1.5rem;font-weight:900;color:var(--blue);}
.pt-cum-stat .l{font-size:.72rem;color:var(--muted);margin-top:2px;}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--green);color:var(--text);padding:11px 18px;border-radius:9px;font-size:.88rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<script>
var ADMIN_PIN='1234';
var _pinV='';
function pinKey(k){
  if(k==='취소'){history.back();return;}
  if(k.charCodeAt(0)===9003||k==='⌫'){_pinV=_pinV.slice(0,-1);_updPin();return;}
  if(_pinV.length>=ADMIN_PIN.length)return;
  _pinV+=k;_updPin();
  if(_pinV.length===ADMIN_PIN.length){
    if(_pinV===ADMIN_PIN){
      document.getElementById('pin-overlay').style.display='none';
      document.getElementById('screen').style.display='block';
      if(typeof loadReport==='function') loadReport();
    }else{
      var e=document.getElementById('pin-err');
      if(e) e.textContent='PIN이 틀렸습니다';
      setTimeout(function(){_pinV='';_updPin();var e2=document.getElementById('pin-err');if(e2)e2.textContent='';},1000);
    }
  }
}
function _updPin(){
  for(var i=0;i<4;i++){var d=document.getElementById('pd'+i);if(d)d.classList.toggle('filled',i<_pinV.length);}
}
</script>
<div class="pin-overlay" id="pin-overlay">
  <div class="pin-box">
    <h2>🔒 리포트 확인</h2>
    <p>관리자 PIN을 입력해주세요</p>
    <div class="pin-dots" id="pin-dots">
      <div class="p-dot" id="pd0"></div>
      <div class="p-dot" id="pd1"></div>
      <div class="p-dot" id="pd2"></div>
      <div class="p-dot" id="pd3"></div>
    </div>
    <div class="pin-kp">
      <button class="p-key" onclick="pinKey('1')">1</button>
      <button class="p-key" onclick="pinKey('2')">2</button>
      <button class="p-key" onclick="pinKey('3')">3</button>
      <button class="p-key" onclick="pinKey('4')">4</button>
      <button class="p-key" onclick="pinKey('5')">5</button>
      <button class="p-key" onclick="pinKey('6')">6</button>
      <button class="p-key" onclick="pinKey('7')">7</button>
      <button class="p-key" onclick="pinKey('8')">8</button>
      <button class="p-key" onclick="pinKey('9')">9</button>
      <button class="p-key cancel" onclick="pinKey('취소')">취소</button>
      <button class="p-key" onclick="pinKey('0')">0</button>
      <button class="p-key" onclick="pinKey('⌫')">⌫</button>
    </div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<div class="screen" id="screen" style="display:none;">
  <div class="screen-top">
    <div>
      <div class="screen-title">📊 학습 리포트</div>
      <div class="screen-sub">학생별 카드에서 PDF 저장을 눌러 출력하세요.</div>
    </div>
    <button class="btn-settings" onclick="toggleSettings()">⚙ 학원 설정</button>
  </div>
  <div id="settings-panel" style="display:none;"></div>
  <div class="month-bar" id="month-bar"></div>
  <div class="student-grid" id="student-grid"></div>
</div>

<!-- Print Document (hidden until print) -->
<div class="print-doc" id="print-doc"></div>

<div class="toast" id="toast"></div>

<script>
var FIREBASE="https://hakwoncheck-default-rtdb.firebaseio.com";
var ADMIN_PIN='1234';
var WD_KEYS=['sun','mon','tue','wed','thu','fri','sat'];
var MISSION_CATEGORIES=[
  {value:'phonics',label:'Phonics'},{value:'reading',label:'Reading'},
  {value:'writing',label:'Writing'},{value:'listening',label:'Listening & Speaking'},
  {value:'words',label:'Words'},{value:'grammar',label:'Grammar'},
  {value:'conversation',label:'Conversation'},{value:'fluency',label:'Fluency'},
  {value:'essay',label:'Essay'},{value:'comprehension',label:'Comprehension'},
  {value:'pronunciation',label:'Pronunciation'},{value:'other',label:'Other'}
];

function fbGet(p){return fetch(FIREBASE+'/'+p+'.json').then(function(r){return r.json();}).catch(function(){return null;});}
function fbSet(p,d){return fetch(FIREBASE+'/'+p+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(function(){});}
function loadRoster(){return fbGet('roster').then(function(d){return Array.isArray(d)?d.filter(Boolean):[];});}
function loadAttendance(sid){return fbGet('attendance/'+sid).then(function(d){return (d&&typeof d==='object')?d:{};});}
function loadBookEval(sid,month){return fbGet('bookeval/'+sid+'/'+month).then(function(d){return (d&&typeof d==='object')?d:{};});}
function saveBookEval(sid,month,data){return fbSet('bookeval/'+sid+'/'+month,data);}
function loadSettings(){return fbGet('settings').then(function(d){return (d&&typeof d==='object')?d:{};});}
function saveSettings(d){return fbSet('settings',d);}

function esc(s){return String(s||'').replace(/[&<>"']/g,function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);});}
function monthLabel(m){if(!m)return'';var p=m.split('-');return p[0]+'년 '+parseInt(p[1])+'월';}
function pad2(n){return String(n).padStart(2,'0');}

// 점수 계산 (최소 85)
function calcScore(mDone, mTotal) {
  if(!mTotal) return 85;
  var raw = Math.round(mDone/mTotal*100);
  return Math.max(85, raw);
}
function getGrade(score) { return score >= 93 ? 'Excellent' : 'Good'; }
function gradeColor(score) { return score >= 93 ? '#F5A623' : '#2FAE76'; }

// 카테고리별 성취율 계산
function calcCatPerf(days) {
  var catMap = {};
  days.forEach(function(d) {
    (d[1].missions||[]).forEach(function(m) {
      var cat = m.category||'other';
      if(!catMap[cat]) catMap[cat]={done:0,total:0};
      catMap[cat].total++;
      if(m.done) catMap[cat].done++;
    });
  });
  return catMap;
}

var toastT;
function showToast(msg){var t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2000);}

/* PIN */
var pinV='';
function initPin(){ /* PIN UI is rendered directly in HTML */ }
function pinKey(k){
  if(k==='취소'){history.back();return;}
  if(k==='⌫'){pinV=pinV.slice(0,-1);updDots();return;}
  if(pinV.length>=ADMIN_PIN.length)return;
  pinV+=k;updDots();
  if(pinV.length===ADMIN_PIN.length){
    if(pinV===ADMIN_PIN){document.getElementById('pin-overlay').style.display='none';document.getElementById('screen').style.display='block';loadReport();}
    else{document.getElementById('pin-err').textContent='PIN이 틀렸습니다';setTimeout(function(){pinV='';updDots();document.getElementById('pin-err').textContent='';},1000);}
  }
}
function updDots(){
  var len=pinV.length;
  for(var i=0;i<ADMIN_PIN.length;i++){
    var d=document.getElementById('pd'+i);
    if(d) d.classList.toggle('filled',i<len);
  }
}
window.pinKey=pinKey;

/* SETTINGS */
var settingsData={};
var settingsOpen=false;
function toggleSettings(){
  settingsOpen=!settingsOpen;
  document.getElementById('settings-panel').style.display=settingsOpen?'block':'none';
  if(settingsOpen) drawSettings();
}
function drawSettings(){
  document.getElementById('settings-panel').innerHTML='<div class="settings-panel">'+
    '<div class="s-row"><label>학원 이름</label><input id="s-name" value="'+esc(settingsData.academyName||'')+'" placeholder="예: Hello English"></div>'+
    '<div class="s-row"><label>슬로건</label><input id="s-slogan" value="'+esc(settingsData.slogan||'')+'" placeholder="예: Growing Every Day, One Word at a Time"></div>'+
    '<div class="s-row"><label>로고 파일</label>'+
    (settingsData.logoUrl?'<img src="'+esc(settingsData.logoUrl)+'" style="max-height:40px;max-width:100px;object-fit:contain;border:1px solid var(--border);border-radius:5px;">':'')+
    '<input type="file" id="s-logo-file" accept="image/*" style="font-size:.8rem;flex:1;"></div>'+
    '<div class="s-row"><button onclick="saveSettingsNow()">저장</button></div></div>';
}
function saveSettingsNow(){
  settingsData.academyName=(document.getElementById('s-name')?.value||'').trim();
  settingsData.slogan=(document.getElementById('s-slogan')?.value||'').trim();
  var file=document.getElementById('s-logo-file')?.files?.[0];
  if(file){
    var reader=new FileReader();
    reader.onload=function(e){settingsData.logoUrl=e.target.result;saveSettings(settingsData).then(function(){showToast('저장됨');drawSettings();});};
    reader.readAsDataURL(file);
  } else {
    saveSettings(settingsData).then(function(){showToast('저장됨');});
  }
}
window.toggleSettings=toggleSettings;window.saveSettingsNow=saveSettingsNow;

/* REPORT LOAD */
var allData=[], selectedMonth='';
function loadReport(){
  loadSettings().then(function(s){
    settingsData=s||{};
    loadRoster().then(function(roster){
      Promise.all(roster.map(function(stu){return loadAttendance(stu.id).then(function(att){return{stu:stu,att:att};});})).then(function(data){
        allData=data;
        var months=[].concat.apply([],data.map(function(d){return Object.values(d.att).map(function(v){return v.month||'';}).filter(Boolean);}));
        months=Array.from(new Set(months)).sort().reverse();
        var cur=new Date().getFullYear()+'-'+pad2(new Date().getMonth()+1);
        if(months.indexOf(cur)<0) months.unshift(cur);
        selectedMonth=months[0]||cur;
        renderMonthBar(months);
        renderStudents();
      });
    });
  });
}

function renderMonthBar(months){
  var bar=document.getElementById('month-bar');
  bar.innerHTML='';
  months.forEach(function(m){
    var btn=document.createElement('button');
    btn.className='month-btn'+(m===selectedMonth?' active':'');
    btn.textContent=monthLabel(m);
    btn.dataset.month=m;
    btn.addEventListener('click',function(){selMonth(this.dataset.month);});
    bar.appendChild(btn);
  });
}
window.selMonth=function(m){
  selectedMonth=m;
  document.querySelectorAll('.month-btn').forEach(function(b){b.classList.toggle('active',b.textContent===monthLabel(m));});
  renderStudents();
};

function renderStudents(){
  var grid=document.getElementById('student-grid');
  var items=allData.map(function(d){return buildStudentCard(d.stu,d.att);}).filter(Boolean);
  grid.innerHTML=items.length?items.join(''):'<div class="no-data-msg">'+monthLabel(selectedMonth)+' 출석 데이터가 없습니다</div>';
}

function buildStudentCard(stu, att){
  var days=Object.entries(att).filter(function(e){return e[1].month===selectedMonth;});
  if(!days.length) return null;
  var mTotal=days.reduce(function(s,e){return s+(e[1].missionsTotal||0);},0);
  var mDone=days.reduce(function(s,e){return s+(e[1].missionsDone||0);},0);
  var score=calcScore(mDone,mTotal);
  var grade=getGrade(score);
  var gColor=gradeColor(score);
  var catPerf=calcCatPerf(days);
  var catEntries=Object.entries(catPerf).filter(function(e){return e[1].total>0;});

  var capHtml='<div class="cap-box">'+
    '<div><div class="cap-month">'+monthLabel(selectedMonth)+' 학습수행역량 (Performance Capability)</div>'+
    '<div class="cap-score">'+score+'점</div></div>'+
    '<div class="cap-grade-badge '+(grade==='Excellent'?'excellent':'good')+'">'+grade+'</div></div>';

  var areaHtml='';
  if(catEntries.length){
    areaHtml='<div style="margin-bottom:4px;font-size:.72rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:8px;">학습 영역별 성취 현황</div>'+
      makeRadarSection(catEntries,gColor,false);
  }

  // 독서 여부
  var allBooks={};
  days.forEach(function(d){(d[1].books||[]).forEach(function(b){if(!allBooks[b.number])allBooks[b.number]={title:b.title,reviewEmoji:b.reviewEmoji||'',reviewText:b.reviewText||''};});});
  var bookCount=Object.keys(allBooks).length;
  var cumBooksSet=new Set(); var cumWords=0;
  Object.entries(att).forEach(function(e){(e[1].books||[]).forEach(function(b){if(!cumBooksSet.has(b.number)){cumBooksSet.add(b.number);cumWords+=(b.wordCount||0);}});});

  return '<div class="sc">'+
    '<div class="sc-top"><div>'+
    '<div class="sc-name">'+esc(stu.name)+'</div>'+
    '<div class="sc-meta">'+monthLabel(selectedMonth)+(bookCount?' &nbsp;·&nbsp; 이달 독서 '+bookCount+'권':'')+'</div></div>'+
    '<button class="btn-pdf" onclick="openPrintModal(\''+stu.id+'\')">📄 PDF 저장</button></div>'+
    capHtml+areaHtml+'</div>';
}

/* PRINT MODAL */
function openPrintModal(stuId){
  var d=allData.find(function(x){return x.stu.id===stuId;}); if(!d) return;
  var stu=d.stu; var att=d.att;
  var days=Object.entries(att).filter(function(e){return e[1].month===selectedMonth;});
  if(!days.length){alert('이달 데이터가 없습니다');return;}

  var mTotal=days.reduce(function(s,e){return s+(e[1].missionsTotal||0);},0);
  var mDone=days.reduce(function(s,e){return s+(e[1].missionsDone||0);},0);
  var score=calcScore(mDone,mTotal);
  var grade=getGrade(score);
  var gColor=gradeColor(score);
  var catPerf=calcCatPerf(days);
  var catEntries=Object.entries(catPerf).filter(function(e){return e[1].total>0;});

  var allBooks={};
  days.forEach(function(d){(d[1].books||[]).forEach(function(b){if(!allBooks[b.number])allBooks[b.number]={title:b.title,reviewEmoji:b.reviewEmoji||'',reviewText:b.reviewText||''};});});
  var bookEntries=Object.entries(allBooks);
  var cumBooksSet=new Set(); var cumWords=0;
  Object.entries(att).forEach(function(e){(e[1].books||[]).forEach(function(b){if(!cumBooksSet.has(b.number)){cumBooksSet.add(b.number);cumWords+=(b.wordCount||0);}});});

  loadBookEval(stuId,selectedMonth).then(function(bookEval){
    // Generate AI comment first
    var aiComment=generateAIComment(stu,score,grade,catEntries,bookEntries.length); (function(){
      showPrintModal(stu,score,grade,gColor,catEntries,bookEntries,cumBooksSet.size,cumWords,bookEval,aiComment);
    })();
  });
}
window.openPrintModal=openPrintModal;

function showPrintModal(stu,score,grade,gColor,catEntries,bookEntries,cumBooks,cumWords,bookEval,aiComment){

  box.appendChild(titleRow);

  // Comment section

  commentWrap.style.cssText='background:var(--bg);border-radius:10px;padding:14px;margin-bottom:14px;';
  var commentLabel=document.createElement('div');
  commentLabel.style.cssText='font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;';
  commentLabel.textContent='📝 선생님 코멘트 (수정 가능)';
  var ta=document.createElement('textarea');
  ta.id='modal-comment';
  ta.style.cssText='width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);font-family:Noto Sans KR,sans-serif;font-size:.88rem;line-height:1.7;resize:vertical;min-height:80px;background:#fff;';

    bookNotice.textContent='📚 독서 기록이 있어 2페이지가 포함됩니다.';
    box.appendChild(bookNotice);
  }

  // Buttons
  var btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:8px;justify-content:flex-end;';
  var cancelBtn=document.createElement('button');
  cancelBtn.style.cssText='padding:10px 18px;background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--muted);';
  cancelBtn.textContent='취소';
  cancelBtn.addEventListener('click',function(){ov.remove();});
  var printBtn=document.createElement('button');
  printBtn.style.cssText='padding:10px 20px;background:var(--blue);border:none;color:#fff;font-weight:700;border-radius:8px;cursor:pointer;';

  printBtn.addEventListener('click',function(){doPrint(stu.id);});
  btnRow.appendChild(cancelBtn); btnRow.appendChild(printBtn);

  ov.appendChild(box);

<div class="pin-overlay" id="pin-overlay">

<script>
var FIREBASE="https://hakwoncheck-default-rtdb.firebaseio.com";
var ADMIN_PIN='1234';
var WD_KEYS=['sun','mon','tue','wed','thu','fri','sat'];
var MISSION_CATEGORIES=[
  {value:'phonics',label:'Phonics'},{value:'reading',label:'Reading'},
  {value:'writing',label:'Writing'},{value:'listening',label:'Listening & Speaking'},
  {value:'words',label:'Words'},{value:'grammar',label:'Grammar'},
  {value:'conversation',label:'Conversation'},{value:'fluency',label:'Fluency'},
  {value:'essay',label:'Essay'},{value:'comprehension',label:'Comprehension'},
  {value:'pronunciation',label:'Pronunciation'},{value:'other',label:'Other'}
];

function fbGet(p){return fetch(FIREBASE+'/'+p+'.json').then(function(r){return r.json();}).catch(function(){return null;});}
function fbSet(p,d){return fetch(FIREBASE+'/'+p+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(function(){});}
function loadRoster(){return fbGet('roster').then(function(d){return Array.isArray(d)?d.filter(Boolean):[];});}
function loadAttendance(sid){return fbGet('attendance/'+sid).then(function(d){return (d&&typeof d==='object')?d:{};});}
function loadBookEval(sid,month){return fbGet('bookeval/'+sid+'/'+month).then(function(d){return (d&&typeof d==='object')?d:{};});}
function saveBookEval(sid,month,data){return fbSet('bookeval/'+sid+'/'+month,data);}
function loadSettings(){return fbGet('settings').then(function(d){return (d&&typeof d==='object')?d:{};});}
function saveSettings(d){return fbSet('settings',d);}

function esc(s){return String(s||'').replace(/[&<>"']/g,function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);});}
function monthLabel(m){if(!m)return'';var p=m.split('-');return p[0]+'년 '+parseInt(p[1])+'월';}
function pad2(n){return String(n).padStart(2,'0');}

// 점수 계산 (최소 85)
function calcScore(mDone, mTotal) {
  if(!mTotal) return 85;
  var raw = Math.round(mDone/mTotal*100);
  return Math.max(85, raw);
}
function getGrade(score) { return score >= 93 ? 'Excellent' : 'Good'; }
function gradeColor(score) { return score >= 93 ? '#F5A623' : '#2FAE76'; }

// 카테고리별 성취율 계산
function calcCatPerf(days) {
  var catMap = {};
  days.forEach(function(d) {
    (d[1].missions||[]).forEach(function(m) {
      var cat = m.category||'other';
      if(!catMap[cat]) catMap[cat]={done:0,total:0};
      catMap[cat].total++;
      if(m.done) catMap[cat].done++;
    });
  });
  return catMap;
}

var toastT;
function showToast(msg){var t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2000);}

/* PIN */
var pinV='';
function initPin(){ /* PIN UI is rendered directly in HTML */ }
function pinKey(k){
  if(k==='취소'){history.back();return;}
  if(k==='⌫'){pinV=pinV.slice(0,-1);updDots();return;}
  if(pinV.length>=ADMIN_PIN.length)return;
  pinV+=k;updDots();
  if(pinV.length===ADMIN_PIN.length){

var allData=[], selectedMonth='';
function loadReport(){
  loadSettings().then(function(s){

      Promise.all(roster.map(function(stu){return loadAttendance(stu.id).then(function(att){return{stu:stu,att:att};});})).then(function(data){

function buildStudentCard(stu, att){

  var mDone=days.reduce(function(s,e){return s+(e[1].missionsDone||0);},0);
  var score=calcScore(mDone,mTotal);
  var grade=getGrade(score);
  var gColor=gradeColor(score);
  var catPerf=calcCatPerf(days);
  var catEntries=Object.entries(catPerf).filter(function(e){return e[1].total>0;});

  var capHtml='<div class="cap-box">'+
    '<div><div class="cap-month">'+monthLabel(selectedMonth)+' 학습수행역량 (Performance Capability)</div>'+

    '<div class="sc-meta">'+monthLabel(selectedMonth)+(bookCount?' &nbsp;·&nbsp; 이달 독서 '+bookCount+'권':'')+'</div></div>'+
    '<button class="btn-pdf" onclick="openPrintModal(\''+stu.id+'\')">📄 PDF 저장</button></div>'+

/* AI COMMENT */
function radarChart(cats, size, color){
  size=size||200; color=color||'#3B6FE0';
  var cx=size/2, cy=size/2, r=size/2-28;
  var n=cats.length;
  // 그리드
  var grid=''; var levels=4;
  for(var lv=1;lv<=levels;lv++){
    var gpts=[]; var gr=r*lv/levels;
    for(var i=0;i<n;i++){var a=(i/n)*2*Math.PI-Math.PI/2;gpts.push((cx+gr*Math.cos(a)).toFixed(1)+','+(cy+gr*Math.sin(a)).toFixed(1));}
    grid+='<polygon points="'+gpts.join(' ')+'" fill="none" stroke="#e8e8e8" stroke-width="1"/>';
  }
  // 축선
  var axes=cats.map(function(_,i){var a=(i/n)*2*Math.PI-Math.PI/2;return'<line x1="'+cx.toFixed(1)+'" y1="'+cy.toFixed(1)+'" x2="'+(cx+r*Math.cos(a)).toFixed(1)+'" y2="'+(cy+r*Math.sin(a)).toFixed(1)+'" stroke="#ddd" stroke-width="1"/>';}).join('');
  // 데이터 폴리곤
  var dpts=cats.map(function(c,i){var a=(i/n)*2*Math.PI-Math.PI/2;var s=c.score/100;return(cx+r*s*Math.cos(a)).toFixed(1)+','+(cy+r*s*Math.sin(a)).toFixed(1);});
  var poly='<polygon points="'+dpts.join(' ')+'" fill="'+color+'33" stroke="'+color+'" stroke-width="2" stroke-linejoin="round"/>';
  // 점
  var dots=cats.map(function(c,i){var a=(i/n)*2*Math.PI-Math.PI/2;var s=c.score/100;return'<circle cx="'+(cx+r*s*Math.cos(a)).toFixed(1)+'" cy="'+(cy+r*s*Math.sin(a)).toFixed(1)+'" r="3.5" fill="'+color+'"/>';}).join('');
  // 라벨
  var lpad=22;
  var lbls=cats.map(function(c,i){
    var a=(i/n)*2*Math.PI-Math.PI/2;
    var lx=cx+(r+lpad)*Math.cos(a); var ly=cy+(r+lpad)*Math.sin(a);
    var anchor=Math.abs(lx-cx)<5?'middle':lx<cx?'end':'start';
    return'<text x="'+lx.toFixed(1)+'" y="'+(ly+4).toFixed(1)+'" text-anchor="'+anchor+'" font-size="9.5" fill="#555" font-family="Noto Sans KR,sans-serif">'+esc(c.label)+'</text>';
  }).join('');
  return'<svg width="'+size+'" height="'+size+'" style="overflow:visible">'+grid+axes+poly+dots+lbls+'</svg>';
}

function barChart(cats,color,forPrint){
  return cats.map(function(c){
    var col=c.score>=93?'#F5A623':'#2FAE76';
    if(forPrint){
      return'<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:.82rem;font-weight:700;margin-bottom:4px;"><span>'+esc(c.label)+'</span><span style="color:'+col+';">'+c.score+'점</span></div>'+
        '<div style="height:10px;background:#eee;border-radius:5px;overflow:hidden;"><div style="height:100%;width:'+c.score+'%;background:'+col+';border-radius:5px;"></div></div></div>';
    }
    return'<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:.85rem;font-weight:700;margin-bottom:5px;"><span>'+esc(c.label)+'</span><span style="color:'+col+';">'+c.score+'점</span></div>'+
      '<div style="height:12px;background:var(--border);border-radius:6px;overflow:hidden;"><div style="height:100%;width:'+c.score+'%;background:'+col+';border-radius:6px;"></div></div></div>';
  }).join('');

function makeRadarSection(catEntries, gColor, forPrint){
  if(!catEntries.length) return '';
  var cats=catEntries.map(function(e){
    var cat=e[0]; var perf=e[1];
    var pct=Math.max(85,Math.round(perf.done/perf.total*100));
    var label=(MISSION_CATEGORIES.find(function(c){return c.value===cat;})||{label:cat}).label;
    return{cat:cat,label:label,score:pct};
  });
  var scoreListHtml=cats.map(function(c){
    var col=c.score>=93?'#F5A623':'#2FAE76';
    if(forPrint){
      return'<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 10px;background:#f8f8f8;border-radius:6px;margin-bottom:5px;">'+
        '<span style="font-size:.82rem;font-weight:600;color:#232A3B;">'+esc(c.label)+'</span>'+
        '<span style="font-size:.9rem;font-weight:800;color:'+col+';">'+c.score+'점</span></div>';
    }
    return'<div class="rsl-item"><span class="rsl-name">'+esc(c.label)+'</span><span class="rsl-score '+(c.score>=93?'excellent':'good')+'">'+c.score+'점</span></div>';
  }).join('');
  if(cats.length>=3){
    var sz=forPrint?190:180;
    var svgHtml=radarChart(cats,sz,gColor);
    if(forPrint){
      return'<div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:16px;"><div>'+svgHtml+'</div><div style="flex:1;padding-top:10px;">'+scoreListHtml+'</div></div>';
    }
    return'<div class="radar-wrap"><div class="radar-svg-box">'+svgHtml+'</div><div class="radar-score-list">'+scoreListHtml+'</div></div>';
  }
  if(forPrint){
    return'<div style="margin-bottom:16px;">'+barChart(cats,gColor,true)+scoreListHtml+'</div>';
  }
  return'<div style="margin-bottom:16px;">'+barChart(cats,gColor,false)+'<div class="radar-score-list" style="margin-top:8px;">'+scoreListHtml+'</div></div>';
}

    ' '+bookCount+'권의 영어 원서를 읽으며 폭넓은 어휘력과 독해력을 키워 나가고 있습니다.',
  ]:[''];
  var futures=grade==='Excellent'?[
    '앞으로도 이 훌륭한 성취를 유지하며 더욱 높은 곳을 향해 나아가길 기대합니다.',
    '이 페이스를 꾸준히 이어 나간다면 더욱 놀라운 성장이 기다리고 있을 것입니다.',
    '탁월한 역량을 앞으로도 이어 나가길 응원하며, '+name+' 학생의 무한한 가능성을 믿습니다.',
    '이 훌륭한 성취가 앞으로 더 큰 꿈을 이루는 발판이 되길 진심으로 응원합니다.',
  ]:[
    '지금의 꾸준한 노력을 이어 간다면 반드시 빛나는 결과가 따라올 것입니다.',
    '한 걸음 한 걸음의 노력이 쌓여 큰 성장으로 이어질 것을 믿습니다.',
    '꾸준한 노력이 실력으로 차곡차곡 쌓이고 있습니다. 앞으로의 성장이 더욱 기대됩니다.',
    name+' 학생의 성실한 학습 태도가 반드시 훌륭한 결실을 맺을 것이라 믿습니다.',
  ];
  return pick(intros)+' '+pick(mids)+pick(bookLines)+'
'+pick(futures);
}
